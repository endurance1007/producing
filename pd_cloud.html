<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지혜의 용 | 워크스테이션 v6.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc, deleteDoc, collection, getDocs, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIpM-V52irW0N0Em8qAItvI6L5LYJg8Ik",
            authDomain: "wisdomdragonadapter.firebaseapp.com",
            projectId: "wisdomdragonadapter",
            storageBucket: "wisdomdragonadapter.firebasestorage.app",
            messagingSenderId: "691167217335",
            appId: "1:691167217335:web:0e916f224557bd2c7faf32"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let currentProjectId = null;
        let currentTabId = null;
        let projectsMetadata = [];
        let memos = [];
        let isGridView = false;
        let activeCard = null;
        let dragType = null;
        let dragCardSrc = null;

        // Undo/Redo 스택
        let undoStack = [];
        let redoStack = [];
        const MAX_HISTORY = 50;

        window.onload = () => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('loginOverlay').classList.add('hidden');
                    document.getElementById('userName').innerText = user.displayName;
                    syncGlobalConfig();
                } else {
                    currentUser = null;
                    document.getElementById('loginOverlay').classList.remove('hidden');
                }
            });
            initHotkeys();
        };

        // --- 히스토리 관리 (Undo/Redo) ---
        window.saveHistory = () => {
            const state = {
                title: document.getElementById('episodeTitle').value,
                originalText: document.getElementById('originalView').value,
                boardHTML: document.getElementById('panelContainer').innerHTML
            };
            // 마지막 상태와 같으면 저장 안 함
            if (undoStack.length > 0 && JSON.stringify(undoStack[undoStack.length - 1]) === JSON.stringify(state)) return;
            
            undoStack.push(state);
            if (undoStack.length > MAX_HISTORY) undoStack.shift();
            redoStack = []; // 새로운 동작 시 리두 스택 초기화
        };

        window.performUndo = () => {
            if (undoStack.length <= 1) return; // 현재 상태가 0번에 있으므로 1개 이상일 때만
            const currentState = undoStack.pop();
            redoStack.push(currentState);
            applyState(undoStack[undoStack.length - 1]);
        };

        window.performRedo = () => {
            if (redoStack.length === 0) return;
            const nextState = redoStack.pop();
            undoStack.push(nextState);
            applyState(nextState);
        };

        function applyState(state) {
            document.getElementById('episodeTitle').value = state.title;
            document.getElementById('originalView').value = state.originalText;
            document.getElementById('panelContainer').innerHTML = state.boardHTML;
            reattachEvents();
            updateStats();
            window.saveToCloud();
        }

        // --- 공통 유틸리티 ---
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-2 rounded-full text-xs font-bold z-[300] shadow-2xl animate-bounce";
            setTimeout(() => t.className = "hidden", 2000);
        }

        const setSyncStatus = (status) => {
            const dots = document.querySelectorAll(`.sync-dot`);
            dots.forEach(dot => {
                dot.style.backgroundColor = (status === 'saving' ? '#eab308' : '#22c55e');
                if(status === 'saving') dot.classList.add('animate-pulse');
                else dot.classList.remove('animate-pulse');
            });
        };

        function initHotkeys() {
            window.addEventListener('keydown', (e) => {
                // Undo/Redo
                if (e.ctrlKey && !e.shiftKey && e.key === 'z') { e.preventDefault(); performUndo(); }
                if ((e.ctrlKey && e.shiftKey && e.key === 'Z') || (e.ctrlKey && e.key === 'y')) { e.preventDefault(); performRedo(); }
                
                // 기타 단축키
                if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); processSource('append'); }
                if (e.altKey && e.key === 's') { e.preventDefault(); saveSnapshot(); }
                if (e.ctrlKey && e.key === 'f') { e.preventDefault(); document.getElementById('boardSearchInput').focus(); }
            });
        }

        // --- Firebase Core ---
        async function syncGlobalConfig() {
            const metaRef = doc(db, "users", currentUser.uid, "config", "metadata");
            onSnapshot(metaRef, (docSnap) => {
                if (docSnap.exists()) { projectsMetadata = docSnap.data().projects || []; } 
                else { projectsMetadata = [{ id: Date.now(), name: "새 작품", order: 0, tabs: [{ id: Date.now() + 1, order: 0, title: "" }] }]; saveMetadata(); }
                if (!currentProjectId && projectsMetadata.length > 0) {
                    currentProjectId = projectsMetadata[0].id;
                    currentTabId = projectsMetadata[0].tabs[0].id;
                }
                renderProjectTabs(); renderWorkspaceTabs(); loadContent(); syncMemos();
            });
        }

        async function saveMetadata() {
            if (!currentUser) return;
            await setDoc(doc(db, "users", currentUser.uid, "config", "metadata"), { projects: projectsMetadata });
        }

        window.addProject = async () => {
            const newId = Date.now();
            projectsMetadata.push({ id: newId, name: "새 작품", order: projectsMetadata.length, tabs: [{ id: newId + 1, order: 0, title: "" }] });
            currentProjectId = newId; currentTabId = newId + 1;
            await saveMetadata();
        };

        window.deleteProject = async (id) => {
            if (projectsMetadata.length <= 1) { alert("최소 한 개의 작품은 남겨두어야 합니다."); return; }
            if (!confirm("작품 전체가 삭제됩니다. 정말 삭제할까요?")) return;
            projectsMetadata = projectsMetadata.filter(p => p.id !== id);
            if (currentProjectId === id) { currentProjectId = projectsMetadata[0].id; currentTabId = projectsMetadata[0].tabs[0].id; }
            await saveMetadata();
        };

        window.addTab = async () => {
            const p = projectsMetadata.find(x => x.id === currentProjectId);
            if (p) {
                const newTabId = Date.now();
                p.tabs.push({ id: newTabId, order: p.tabs.length, title: "" });
                currentTabId = newTabId; await saveMetadata();
            }
        };

        window.deleteTab = async (id) => {
            const p = projectsMetadata.find(x => x.id === currentProjectId);
            if (p && p.tabs.length > 1) {
                if (!confirm("슬롯을 삭제하시겠습니까?")) return;
                p.tabs = p.tabs.filter(t => t.id !== id);
                if (currentTabId === id) currentTabId = p.tabs[0].id;
                await saveMetadata();
            } else { alert("최소 하나의 슬롯은 있어야 합니다."); }
        };

        let contentUnsub = null;
        function loadContent() {
            if (contentUnsub) contentUnsub();
            if (!currentProjectId || !currentTabId) return;
            const docRef = doc(db, "users", currentUser.uid, "projects", `p_${currentProjectId}`, "tabs", `t_${currentTabId}`);
            contentUnsub = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('episodeTitle').value = data.title || "";
                    document.getElementById('originalView').value = data.originalText || "";
                    document.getElementById('panelContainer').innerHTML = data.boardHTML || "";
                    reattachEvents(); updateStats();
                } else { 
                    document.getElementById('episodeTitle').value = "";
                    document.getElementById('originalView').value = "";
                    document.getElementById('panelContainer').innerHTML = "";
                    updateStats();
                }
                undoStack = []; redoStack = []; saveHistory(); // 로드 시 초기 히스토리 저장
                renderWorkspaceTabs();
            });
        }

        window.saveToCloud = async () => {
            if (!currentUser || !currentProjectId || !currentTabId) return;
            setSyncStatus('saving');
            const titleVal = document.getElementById('episodeTitle').value;
            const docRef = doc(db, "users", currentUser.uid, "projects", `p_${currentProjectId}`, "tabs", `t_${currentTabId}`);
            await setDoc(docRef, {
                title: titleVal,
                originalText: document.getElementById('originalView').value,
                boardHTML: document.getElementById('panelContainer').innerHTML,
                lastUpdated: new Date()
            }, { merge: true });

            const p = projectsMetadata.find(x => x.id === currentProjectId);
            const t = p.tabs.find(x => x.id === currentTabId);
            if (t && t.title !== titleVal) { t.title = titleVal; await saveMetadata(); }
            setSyncStatus('synced');
        };

        // --- 보드 편집 기능 ---
        window.processSource = (mode) => {
            saveHistory(); // 동작 전 기록
            const input = document.getElementById('sourceInput');
            const text = input.value.trim();
            if (!text && mode !== 'overwrite') return;
            if (mode === 'overwrite' && !confirm("전체 초기화하시겠습니까?")) return;
            if (mode === 'overwrite') { document.getElementById('originalView').value = text; document.getElementById('panelContainer').innerHTML = ''; }
            const sentences = text.split(/(?<=[.!?])\s+/).filter(s => s.length > 0);
            sentences.forEach(s => {
                const card = createCardElement(s);
                if (mode === 'insert' && activeCard) activeCard.after(card);
                else document.getElementById('panelContainer').appendChild(card);
            });
            updateStats(); if(mode !== 'overwrite') input.value = '';
            saveToCloud(); saveHistory(); // 동작 후 기록
        };

        function createCardElement(text) {
            const card = document.createElement('div');
            card.className = 'bg-[#0d0d0d] border border-white/5 rounded-2xl p-6 hover:border-white/10 transition group relative cursor-move card-anim';
            card.draggable = true; card.onclick = (e) => selectCard(card); addCardDragEvents(card);
            card.innerHTML = `
                <div class="flex flex-col gap-3 pointer-events-none">
                    <div class="flex justify-between items-center pointer-events-auto">
                        <div class="flex items-center gap-2"><span class="text-gray-600">☰</span><span class="text-[10px] font-black uppercase tracking-widest cut-num">Cut 00</span></div>
                        <div class="flex gap-3 opacity-40 group-hover:opacity-100 transition">
                            <label class="text-[10px] cursor-pointer hover:text-blue-400"><input type="checkbox" onchange="toggleMemo(this, '앵글/샷')" class="hidden"> 앵글/샷</label>
                            <label class="text-[10px] cursor-pointer hover:text-blue-400"><input type="checkbox" onchange="toggleMemo(this, '배경')" class="hidden"> 배경</label>
                            <label class="text-[10px] cursor-pointer hover:text-blue-400"><input type="checkbox" onchange="toggleMemo(this, '참고')" class="hidden"> 참고</label>
                        </div>
                    </div>
                    <div class="flex gap-5 pointer-events-auto">
                        <div class="w-32 shrink-0 flex flex-col gap-2">
                             <div class="img-container grid grid-cols-2 gap-1 bg-black/50 rounded p-1 min-h-[60px]" ondragover="imgContainerDragOver(event)" ondrop="imgContainerDrop(event, this)"></div>
                             <button onclick="event.stopPropagation(); triggerImageUpload(this)" class="text-[9px] bg-white/5 hover:bg-white/10 py-1 rounded text-gray-500 hover:text-white transition">+ Image</button>
                        </div>
                        <div class="flex-1 space-y-3">
                            <div class="memo-area flex flex-wrap gap-2"></div>
                            <div class="content-area text-[16px] leading-relaxed text-gray-300 outline-none min-h-[1.5em]" contenteditable="true" onpaste="handlePaste(event, this)" onblur="this.innerHTML=highlightText(this.innerText); saveToCloud(); saveHistory();" onclick="event.stopPropagation()">${highlightText(text)}</div>
                            <div class="flex gap-4 pt-3 border-t border-white/5">
                                <button onclick="copyRawText(this.closest('.card-anim').querySelector('.content-area').innerText)" class="text-[9px] text-blue-500 font-bold uppercase">📋 Copy</button>
                                <button onclick="mergeUp(this)" class="text-[9px] text-gray-600 hover:text-blue-400 font-bold uppercase">Merge Up</button>
                                <button onclick="splitAtCursor(this)" class="text-[9px] text-gray-600 hover:text-yellow-400 font-bold uppercase">Split</button>
                                <button onclick="deleteCard(this)" class="text-[9px] text-red-900 font-bold uppercase ml-auto">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            return card;
        }

        window.deleteCard = (btn) => {
            saveHistory();
            btn.closest('.card-anim').remove();
            updateStats(); saveToCloud(); saveHistory();
        };

        window.mergeUp = (btn) => {
            saveHistory();
            const cur = btn.closest('.card-anim'); const prev = cur.previousElementSibling;
            if (prev) {
                const prevArea = prev.querySelector('.content-area');
                prevArea.innerText += " " + cur.querySelector('.content-area').innerText;
                prevArea.innerHTML = highlightText(prevArea.innerText);
                cur.querySelectorAll('.img-container > div').forEach(w => prev.querySelector('.img-container').appendChild(w));
                cur.remove(); updateStats(); saveToCloud(); saveHistory();
            }
        };

        window.splitAtCursor = (btn) => {
            saveHistory();
            const card = btn.closest('.card-anim'); const area = card.querySelector('.content-area');
            const sel = window.getSelection(); if (!sel.rangeCount || !area.contains(sel.getRangeAt(0).commonAncestorContainer)) return;
            const r = sel.getRangeAt(0); const rE = document.createRange();
            rE.setStart(r.endContainer, r.endOffset); rE.setEnd(area, area.childNodes.length);
            const postText = rE.toString(); rE.deleteContents();
            area.innerHTML = highlightText(area.innerText);
            card.after(createCardElement(postText));
            updateStats(); saveToCloud(); saveHistory();
        };

        window.toggleMemo = (cb, label) => {
            saveHistory();
            const mA = cb.closest('.card-anim').querySelector('.memo-area');
            if (cb.checked) {
                const i = document.createElement('input');
                i.className = 'memo-input bg-transparent border-b border-white/10 text-[11px] text-gray-500 outline-none w-24';
                i.placeholder = label + "..."; i.oninput = () => saveToCloud(); i.dataset.type = label;
                mA.appendChild(i); i.focus();
            } else { const i = mA.querySelector(`input[data-type="${label}"]`); if (i) i.remove(); }
            saveToCloud(); saveHistory();
        };

        window.triggerImageUpload = (btn) => {
            const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
            input.onchange = e => { if (e.target.files[0]) compressImage(e.target.files[0], (src) => { saveHistory(); addImageToCard(btn.closest('.card-anim'), src); saveHistory(); }); };
            input.click();
        };

        function addImageToCard(card, src) {
            const container = card.querySelector('.img-container');
            const w = document.createElement('div');
            w.className = "relative aspect-square bg-gray-900 rounded overflow-hidden cursor-pointer";
            w.draggable = true; w.setAttribute('ondragstart', 'window.imgDragStart(event, this)');
            w.innerHTML = `<img src="${src}" class="w-full h-full object-cover"><button onclick="saveHistory(); this.parentElement.remove(); window.saveToCloud(); saveHistory();" class="absolute top-0 right-0 bg-red-600 text-[8px] p-0.5">×</button>`;
            container.appendChild(w); window.saveToCloud();
        }

        function compressImage(file, callback) {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const cvs = document.createElement('canvas'); const MAX = 500; const sc = MAX / img.width;
                    cvs.width = MAX; cvs.height = img.height * sc;
                    cvs.getContext('2d').drawImage(img, 0, 0, cvs.width, cvs.height);
                    callback(cvs.toDataURL('image/jpeg', 0.6));
                }
            }
        }

        window.handlePaste = (e, el) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) { if (item.kind === 'file') { saveHistory(); compressImage(item.getAsFile(), (src) => { addImageToCard(el.closest('.card-anim'), src); saveHistory(); }); } }
        };

        // --- 드래그 앤 드롭 ---
        function addCardDragEvents(c) {
            c.ondragstart = (e) => { if (dragType === 'image') return; saveHistory(); dragType = 'card'; dragCardSrc = c; c.classList.add('opacity-30'); };
            c.ondragover = (e) => e.preventDefault();
            c.ondrop = (e) => {
                if (dragType === 'card' && dragCardSrc !== c) {
                    const all = [...document.getElementById('panelContainer').children];
                    if (all.indexOf(dragCardSrc) < all.indexOf(c)) c.after(dragCardSrc); else c.before(dragCardSrc);
                    updateStats(); saveToCloud(); saveHistory();
                }
            };
            c.ondragend = () => { dragType = null; c.classList.remove('opacity-30'); };
        }

        window.imgDragStart = (e, w) => { dragType = 'image'; dragImgEl = w; e.stopPropagation(); };
        window.imgContainerDragOver = (e) => { if (dragType === 'image') e.preventDefault(); };
        window.imgContainerDrop = (e, c) => { e.preventDefault(); if (dragType === 'image') { saveHistory(); c.appendChild(dragImgEl); saveToCloud(); saveHistory(); } };

        // --- 공유 메모 ---
        let memoUnsub = null;
        function syncMemos() {
            if (memoUnsub) memoUnsub(); if (!currentProjectId) return;
            const q = query(collection(db, "users", currentUser.uid, "projects", `p_${currentProjectId}`, "memos"), orderBy("order", "asc"));
            memoUnsub = onSnapshot(q, (qs) => {
                memos = []; qs.forEach(doc => memos.push({id: doc.id, ...doc.data()}));
                renderMemos();
            });
        }

        window.addMemo = async () => {
            const tabTitle = document.getElementById('episodeTitle').value || "새 슬롯";
            await addDoc(collection(db, "users", currentUser.uid, "projects", `p_${currentProjectId}`, "memos"), {
                title: `[${tabTitle}] 메모`, content: "", order: memos.length, collapsed: false
            });
        };

        function renderMemos() {
            const container = document.getElementById('memoContainer'); container.innerHTML = "";
            memos.forEach(m => {
                const div = document.createElement('div'); div.className = "bg-white/5 border border-white/10 rounded-lg mb-3 overflow-hidden";
                div.innerHTML = `
                    <div class="flex items-center justify-between p-2 bg-white/5 cursor-pointer" onclick="this.nextElementSibling.classList.toggle('hidden')">
                        <input value="${m.title}" class="bg-transparent border-none outline-none text-[11px] font-bold w-full truncate" onchange="window.updateMemo('${m.id}', 'title', this.value)" onclick="event.stopPropagation()">
                        <button onclick="event.stopPropagation(); window.deleteMemo('${m.id}')" class="text-xs text-red-500 ml-2">×</button>
                    </div>
                    <textarea class="w-full bg-transparent p-2 text-[11px] text-gray-400 outline-none h-24 ${m.collapsed ? 'hidden' : ''}" onchange="window.updateMemo('${m.id}', 'content', this.value)">${m.content}</textarea>
                `;
                container.appendChild(div);
            });
        }

        // --- 탭 렌더링 및 유틸 ---
        function reattachEvents() {
            const cards = document.getElementById('panelContainer').querySelectorAll('.card-anim');
            cards.forEach(card => { card.onclick = (e) => selectCard(card); addCardDragEvents(card); });
        }
        function selectCard(c) { if (activeCard) activeCard.classList.remove('card-selected'); activeCard = c; activeCard.classList.add('card-selected'); }
        function updateStats() {
            const cards = document.getElementById('panelContainer').querySelectorAll('.card-anim');
            cards.forEach((c, i) => { const num = c.querySelector('.cut-num'); if(num) num.innerText = `Cut ${String(i+1).padStart(2, '0')}`; });
        }
        function highlightText(text) { return text.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, '<span class="hl-dialog">$&</span>').replace(/[\(\[][가-힣a-zA-Z\s]+[\)\]]/g, '<span class="hl-sfx">$&</span>'); }
        
        function renderProjectTabs() {
            const container = document.getElementById('projectTabContainer'); container.innerHTML = "";
            projectsMetadata.forEach(p => {
                const div = document.createElement('div');
                div.className = `group flex items-center h-full px-5 border-r border-white/5 cursor-pointer transition ${currentProjectId === p.id ? 'bg-white/10 text-blue-400' : 'text-gray-500'}`;
                div.innerHTML = `<input value="${p.name}" class="bg-transparent border-none outline-none w-24 text-[11px] font-bold" onchange="window.renameProject(${p.id}, this.value)" onclick="event.stopPropagation()">
                                <button onclick="event.stopPropagation(); window.deleteProject(${p.id})" class="ml-2 opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 text-xs transition-opacity">×</button>`;
                div.onclick = () => { currentProjectId = p.id; currentTabId = p.tabs[0].id; syncGlobalConfig(); };
                container.appendChild(div);
            });
        }

        function renderWorkspaceTabs() {
            const container = document.getElementById('workspaceTabContainer'); container.innerHTML = "";
            const p = projectsMetadata.find(x => x.id === currentProjectId); if(!p) return;
            p.tabs.forEach(t => {
                const active = currentTabId === t.id;
                const div = document.createElement('div');
                div.className = `px-4 h-full flex items-center border-r border-white/5 cursor-pointer text-[10px] font-bold whitespace-nowrap transition-all ${active ? 'bg-black text-blue-400 border-t-2 border-t-blue-500' : 'text-gray-600 bg-white/5'}`;
                div.innerHTML = `<span class="sync-dot w-1.5 h-1.5 rounded-full bg-green-500 mr-2 flex-shrink-0"></span><span class="mr-2">${t.title || 'SLOT ' + (p.tabs.indexOf(t)+1)}</span>
                                <button onclick="event.stopPropagation(); window.deleteTab(${t.id})" class="ml-1 opacity-40 hover:opacity-100 hover:text-red-500">×</button>`;
                div.onclick = () => { currentTabId = t.id; loadContent(); };
                container.appendChild(div);
            });
        }

        window.renameProject = async (id, val) => { const p=projectsMetadata.find(x=>x.id===id); if(p){p.name=val; await saveMetadata();} };
        window.clipCopy = async (id, isVal=true) => { const el=document.getElementById(id); await navigator.clipboard.writeText(isVal?el.value:el.innerText); showToast("복사되었습니다!"); };
        window.copyRawText = async (txt) => { await navigator.clipboard.writeText(txt); showToast("복사되었습니다!"); };
        window.logOut = () => { signOut(auth); location.reload(); };
        window.signIn = () => signInWithPopup(auth, provider);
        window.deleteMemo = async (id) => { if(confirm("삭제?")) await deleteDoc(doc(db, "users", currentUser.uid, "projects", `p_${currentProjectId}`, "memos", id)); };
        window.updateMemo = async (id, field, val) => { await setDoc(doc(db, "users", currentUser.uid, "projects", `p_${currentProjectId}`, "memos", id), { [field]: val }, { merge: true }); };
        window.toggleGrid = () => { isGridView = !isGridView; document.getElementById('panelContainer').classList.toggle('grid-view', isGridView); };
        window.saveSnapshot = async () => { /* 이전 스냅샷 로직 그대로 유지 */ };
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .grid-view { display: grid !important; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card-selected { border-color: #3b82f6 !important; background: #111 !important; }
        .hl-dialog { color: #60a5fa; font-weight: 600; } .hl-sfx { color: #fbbf24; font-style: italic; }
        .no-scrollbar::-webkit-scrollbar { display: none; } [contenteditable]:focus { outline: none; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="bg-[#050505] text-gray-200 h-screen overflow-hidden flex flex-col font-sans">
    <div id="loginOverlay" class="fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center gap-6">
        <span class="text-6xl animate-bounce">🐲</span>
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Dragon Adapter v6.5</h1>
        <button onclick="signIn()" class="px-10 py-4 bg-white text-black font-black rounded-full shadow-2xl">Google 로그인</button>
    </div>
    <nav class="h-10 border-b border-white/5 flex items-center px-4 bg-black/20 shrink-0 overflow-x-auto no-scrollbar"><div id="projectTabContainer" class="flex h-full items-center"></div><button onclick="addProject()" class="px-5 text-blue-500 font-black text-lg">+</button><div class="ml-auto flex items-center gap-4 shrink-0"><span id="userName" class="text-[9px] font-bold text-gray-600 uppercase tracking-widest"></span><button onclick="logOut()" class="text-[9px] text-red-900 font-bold hover:text-red-500">LOGOUT</button></div></nav>
    <nav class="h-9 border-b border-white/5 bg-black/40 flex items-center shrink-0 overflow-x-auto no-scrollbar"><div id="workspaceTabContainer" class="flex h-full items-center"></div><button onclick="addTab()" class="px-6 text-gray-600 font-bold hover:text-white">+</button><div class="ml-auto flex h-full items-center shrink-0"><button onclick="toggleGrid()" class="px-5 text-[9px] font-black border-l border-white/5 hover:text-blue-400 uppercase tracking-tighter">그리드 뷰</button><button onclick="saveSnapshot()" class="px-5 h-full bg-blue-600/10 text-blue-400 text-[9px] font-black border-l border-white/5 hover:bg-blue-600 shadow-inner uppercase tracking-tighter">스냅샷 저장</button></div></nav>
    <main class="flex flex-1 overflow-hidden">
        <section class="w-1/4 flex flex-col border-r border-white/5 bg-black/10">
            <div class="h-1/2 flex flex-col border-b border-white/5"><div class="p-2 text-[9px] font-black text-gray-500 flex justify-between bg-white/5 italic">ORIGINAL HISTORY <button onclick="clipCopy('originalView')">📋</button></div><textarea id="originalView" class="flex-1 bg-transparent p-4 outline-none resize-none text-[11px] text-gray-500" readonly></textarea></div>
            <div class="h-1/2 flex flex-col p-4 gap-3">
                <div class="text-[9px] font-black text-blue-500 uppercase tracking-widest flex justify-between">ACTIVE INPUT <button onclick="clipCopy('sourceInput')">📋</button></div>
                <textarea id="sourceInput" class="flex-1 bg-white/5 rounded-xl p-4 outline-none text-sm placeholder-gray-800 focus:ring-1 ring-blue-500 transition-all" placeholder="새로운 텍스트를 입력하세요..."></textarea>
                <div class="grid grid-cols-2 gap-2"><button onclick="window.processSource('append')" class="py-2.5 bg-blue-600 text-[10px] font-black rounded-lg uppercase shadow-lg">맨 뒤에 추가</button><button onclick="window.processSource('insert')" class="py-2.5 bg-yellow-600 text-[10px] font-black rounded-lg uppercase text-black shadow-lg">선택 컷 뒤 삽입</button></div>
                <button onclick="window.processSource('overwrite')" class="py-2 bg-red-900/10 text-red-700 text-[10px] font-black rounded-lg uppercase hover:bg-red-900 hover:text-white transition border border-red-900/20">⚠️ 보드 전체 초기화</button>
            </div>
        </section>
        <section class="flex-1 flex flex-col overflow-hidden bg-black/5"><div class="p-8 flex items-center gap-6"><input type="text" id="episodeTitle" placeholder="회차 제목을 입력하세요" class="w-full bg-transparent text-4xl font-black outline-none tracking-tighter" oninput="saveToCloud()"><div class="flex items-center gap-2 bg-black/40 p-2.5 rounded-xl border border-white/5 shadow-inner"><input id="boardSearchInput" type="text" placeholder="검색..." class="bg-transparent border-none text-xs w-24 outline-none"></div></div><div id="panelContainer" class="flex-1 overflow-y-auto p-10 pt-0 space-y-6 no-scrollbar"></div></section>
        <section class="w-1/5 flex flex-col border-l border-white/5 bg-black/20 p-5"><div class="flex justify-between items-center mb-6"><h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Shared Memos</h4><button onclick="addMemo()" class="w-6 h-6 flex items-center justify-center bg-blue-600 text-white rounded-full font-bold shadow-lg">+</button></div><div id="memoContainer" class="flex-1 overflow-y-auto no-scrollbar space-y-4"></div></section>
    </main>
    <div id="toast" class="hidden"></div>
</body>
</html>
