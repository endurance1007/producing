<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>지혜의 용 | 워크스테이션 v9.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            GoogleAuthProvider, 
            signInWithPopup, 
            signInWithRedirect, 
            getRedirectResult, 
            onAuthStateChanged, 
            signOut, 
            setPersistence, 
            browserLocalPersistence 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            onSnapshot, 
            getDoc, 
            deleteDoc, 
            collection, 
            getDocs, 
            addDoc, 
            query, 
            orderBy, 
            limit, 
            writeBatch, 
            enableIndexedDbPersistence 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // [인증] 작가님의 Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyDIpM-V52irW0N0Em8qAItvI6L5LYJg8Ik",
            authDomain: "wisdomdragonadapter.firebaseapp.com",
            projectId: "wisdomdragonadapter",
            storageBucket: "wisdomdragonadapter.firebasestorage.app",
            messagingSenderId: "691167217335",
            appId: "1:691167217335:web:0e916f224557bd2c7faf32"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // [필수] 사파리 인증 정보 유실 방지
        setPersistence(auth, browserLocalPersistence);

        // [심리스] 오프라인 작업 환경 활성화
        enableIndexedDbPersistence(db).catch((err) => {
            if (err.code == 'failed-precondition') { console.warn("오프라인 중복 모드"); }
        });

        // 시스템 전역 변수 (명시적 긴 선언)
        let currentUser = null;
        let currentProjectId = null;
        let currentTabId = null;
        let projectsMetadata = [];
        let memos = [];
        let activeCard = null;
        let undoStack = [];
        let redoStack = [];
        const MAX_HISTORY = 50;
        let isGridView = false;
        let isAuthChecking = true; // iOS 로그인 루프 방지를 위한 가드
        
        let dragCardSrc = null;
        let dragProjectSrcId = null;
        let dragSlotSrcId = null;
        let dragSnapshotSrcId = null;

        // --- 1. 초기 시스템 로드 및 iOS 로그인 최적화 ---
        window.onload = function() {
            console.log("Starting Sovereign System v9.2...");
            
            // iOS 사파리에서 리다이렉트 후 돌아오는 인증 결과를 끈질기게 확인합니다.
            getRedirectResult(auth)
                .then((result) => {
                    if (result) {
                        console.log("Redirect Result Processed Successfully");
                        // 결과가 있다면 즉시 로딩 해제
                        isAuthChecking = false;
                    }
                })
                .catch((error) => {
                    console.error("Auth Error:", error.message);
                    isAuthChecking = false;
                });

            // 인증 상태 변화를 실시간으로 감시합니다.
            onAuthStateChanged(auth, async (user) => {
                const overlay = document.getElementById('loginOverlay');
                const loadingIndicator = document.getElementById('authLoading');
                
                if (user) {
                    currentUser = user;
                    overlay.classList.add('hidden');
                    document.getElementById('userName').innerText = user.displayName;
                    isAuthChecking = false;
                    bootstrapUserSystem(); // 데이터베이스 로드
                } else {
                    currentUser = null;
                    // 인증 확인이 끝날 때까지는 로그인 창을 띄우지 않습니다.
                    if (!isAuthChecking) {
                        overlay.classList.remove('hidden');
                        loadingIndicator.classList.add('hidden');
                    }
                }
            });

            // 3초 후에도 인증 확인이 안 끝난다면 강제로 로딩 해제 (네트워크 지연 대비)
            setTimeout(() => {
                if (isAuthChecking) {
                    isAuthChecking = false;
                    if (!currentUser) document.getElementById('loginOverlay').classList.remove('hidden');
                    document.getElementById('authLoading').classList.add('hidden');
                }
            }, 3000);

            initializeHotkeys();
        };

        // 데이터베이스 부팅 및 메타데이터 로드
        async function bootstrapUserSystem() {
            const metaRef = doc(db, "users", currentUser.uid, "config", "metadata");
            
            onSnapshot(metaRef, (docSnap) => {
                if (docSnap.exists()) {
                    projectsMetadata = docSnap.data().projects || [];
                } else {
                    // 최초 접속자를 위한 명시적 초기 구조
                    projectsMetadata = [
                        { 
                            id: Date.now(), 
                            name: "새 작품", 
                            order: 0, 
                            tabs: [{ id: Date.now() + 1, order: 0, title: "" }] 
                        }
                    ];
                    saveGlobalMetaToFirestore();
                }

                // 현재 선택 작품 유효성 점검
                if (!currentProjectId || !projectsMetadata.find(p => p.id === currentProjectId)) {
                    if (projectsMetadata.length > 0) {
                        currentProjectId = projectsMetadata[0].id;
                        currentTabId = projectsMetadata[0].tabs[0].id;
                    }
                }
                refreshFullInterfaceUI();
            });
        }

        async function saveGlobalMetaToFirestore() {
            if (!currentUser) return;
            try {
                await setDoc(doc(db, "users", currentUser.uid, "config", "metadata"), { projects: projectsMetadata });
            } catch (err) {
                console.error("Meta Save Error:", err);
            }
        }

        function refreshFullInterfaceUI() {
            renderProjectTabs();
            renderSlotTabs();
            loadActiveEditorContent();
            syncProjectMemos();
        }

        // --- 2. 탭 가변 너비 계산 엔진 ---
        function calculateTextPxWidth(text, font) {
            const canvas = calculateTextPxWidth.canvas || (calculateTextPxWidth.canvas = document.createElement("canvas"));
            const context = canvas.getContext("2d");
            context.font = font;
            return context.measureText(text).width;
        }

        window.updateAutoTabWidth = function(inputElement) {
            const style = window.getComputedStyle(inputElement);
            const w = calculateTextPxWidth(inputElement.value, style.font);
            inputElement.style.width = (w + 22) + "px"; // 22px 여유 공간
        };

        // --- 3. 작품 탭 관리 (드래그앤드롭 순서 변경) ---
        function renderProjectTabs() {
            const container = document.getElementById('projectTabContainer');
            container.innerHTML = "";
            projectsMetadata.sort((a, b) => (a.order || 0) - (b.order || 0));

            projectsMetadata.forEach(p => {
                const isActive = (currentProjectId === p.id);
                const tabDiv = document.createElement('div');
                tabDiv.className = `group flex items-center h-full px-4 border-r border-white/5 cursor-move transition-all ${isActive ? 'bg-white/10 text-blue-400 shadow-inner' : 'text-gray-500 hover:bg-white/5'}`;
                tabDiv.draggable = true;

                // 작품 탭 드래그 앤 드롭 (전부 풀어서 작성)
                tabDiv.ondragstart = function(e) {
                    dragProjectSrcId = p.id;
                    e.dataTransfer.effectAllowed = 'move';
                    tabDiv.classList.add('opacity-30');
                };
                tabDiv.ondragover = function(e) {
                    e.preventDefault();
                };
                tabDiv.ondrop = async function(e) {
                    e.preventDefault();
                    if (dragProjectSrcId && dragProjectSrcId !== p.id) {
                        const sIdx = projectsMetadata.findIndex(x => x.id === dragProjectSrcId);
                        const dIdx = projectsMetadata.findIndex(x => x.id === p.id);
                        const [movedItem] = projectsMetadata.splice(sIdx, 1);
                        projectsMetadata.splice(dIdx, 0, movedItem);
                        projectsMetadata.forEach((item, index) => item.order = index);
                        await saveGlobalMetaToFirestore();
                    }
                };
                tabDiv.ondragend = function() {
                    tabDiv.classList.remove('opacity-30');
                };

                // 작품 선택 도트 (●)
                const dot = document.createElement('span');
                dot.className = `w-2 h-2 rounded-full mr-2 flex-shrink-0 ${isActive ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : 'bg-gray-700'}`;
                
                const titleInput = document.createElement('input');
                titleInput.value = p.name;
                titleInput.className = "bg-transparent border-none outline-none font-bold text-[11px] cursor-text";
                titleInput.oninput = function() { updateAutoTabWidth(titleInput); };
                titleInput.onchange = function() {
                    p.name = titleInput.value;
                    saveGlobalMetaToFirestore();
                };
                titleInput.onclick = function(e) { e.stopPropagation(); };

                const delBtn = document.createElement('button');
                delBtn.innerHTML = "×";
                delBtn.className = "ml-2 opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 text-xs transition-opacity";
                delBtn.onclick = function(e) {
                    e.stopPropagation();
                    window.killProjectEntry(p.id);
                };

                tabDiv.onclick = function() {
                    currentProjectId = p.id;
                    currentTabId = p.tabs[0].id;
                    refreshFullInterfaceUI();
                };

                tabDiv.appendChild(dot);
                tabDiv.appendChild(titleInput);
                tabDiv.appendChild(delBtn);
                container.appendChild(tabDiv);
                updateAutoTabWidth(titleInput);
            });
        }

        // --- 4. 슬롯 탭 관리 (드래그앤드롭 순서 변경) ---
        function renderSlotTabs() {
            const container = document.getElementById('workspaceTabContainer');
            container.innerHTML = "";
            const currProj = projectsMetadata.find(p => p.id === currentProjectId);
            if (!currProj) return;

            // 슬롯 정렬 적용
            currProj.tabs.sort((a, b) => (a.order || 0) - (b.order || 0));

            currProj.tabs.forEach(t => {
                const isActive = (currentTabId === t.id);
                const slotDiv = document.createElement('div');
                slotDiv.className = `px-5 h-full flex items-center border-r border-white/5 cursor-move text-[10px] font-bold whitespace-nowrap flex-shrink-0 transition-all ${isActive ? 'bg-black text-blue-400 border-t-2 border-t-blue-500 shadow-xl' : 'text-gray-600 bg-white/5 hover:text-gray-400'}`;
                slotDiv.draggable = true;

                // 슬롯 탭 드래그 앤 드롭 (전부 풀어서 작성)
                slotDiv.ondragstart = function(e) {
                    dragSlotSrcId = t.id;
                    e.dataTransfer.effectAllowed = 'move';
                    slotDiv.classList.add('opacity-30');
                };
                slotDiv.ondragover = function(e) {
                    e.preventDefault();
                };
                slotDiv.ondrop = async function(e) {
                    e.preventDefault();
                    if (dragSlotSrcId && dragSlotSrcId !== t.id) {
                        const sIdx = currProj.tabs.findIndex(x => x.id === dragSlotSrcId);
                        const dIdx = currProj.tabs.findIndex(x => x.id === t.id);
                        const [movedTab] = currProj.tabs.splice(sIdx, 1);
                        currProj.tabs.splice(dIdx, 0, movedTab);
                        currProj.tabs.forEach((item, index) => item.order = index);
                        await saveGlobalMetaToFirestore();
                    }
                };
                slotDiv.ondragend = function() {
                    slotDiv.classList.remove('opacity-30');
                };

                slotDiv.innerHTML = `
                    <span class="sync-dot-${t.id} w-1.5 h-1.5 rounded-full bg-green-500 mr-3 flex-shrink-0"></span>
                    <span class="mr-2">${t.title || 'SLOT ' + (currProj.tabs.indexOf(t) + 1)}</span>
                    <button onclick="event.stopPropagation(); window.killSlotEntry(${t.id})" class="ml-2 opacity-40 hover:opacity-100 hover:text-red-500 transition-opacity">×</button>
                `;

                slotDiv.onclick = function() {
                    currentTabId = t.id;
                    loadActiveEditorContent();
                };

                container.appendChild(slotDiv);
            });
        }

        // --- 5. 에디터 엔진 (소환 후 즉시 부활 엔진 장착) ---
        function loadActiveEditorContent() {
            if (!currentProjectId || !currentTabId) return;
            const docRef = doc(db, "users", currentUser.uid, "projects", `p_${currentProjectId}`, "tabs", `t_${currentTabId}`);
            
            getDoc(docRef).then((docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('episodeTitle').value = data.title || "";
                    document.getElementById('originalView').value = data.originalText || "";
                    document.getElementById('panelContainer').innerHTML = data.boardHTML || "";
                    
                    // [핵심] 불러온 직후 기능을 심습니다 (2중 렌더링 대기)
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            reviveAllCutFeatures();
                            updateLiveCutStats(); // 카운팅 엔진 즉시 가동
                        });
                    });
                } else {
                    resetMainEditorUI();
                }
                
                undoStack = []; 
                redoStack = []; 
                window.saveSnapshotToHistory();
                renderSlotTabs();
            });
        }

        // 모든 컷(Card)에 기능을 다시 주입하는 소생 엔진
        function reviveAllCutFeatures() {
            const cards = document.querySelectorAll('.card-unit');
            cards.forEach(card => {
                card.draggable = true;
                card.onclick = function(e) {
                    e.stopPropagation();
                    focusCutCard(card);
                };
                
                // 드래그앤드롭 리스너 강제 바인딩
                card.ondragstart = function(e) {
                    if (e.target.tagName === 'IMG' || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    dragCardSrc = card;
                    e.dataTransfer.effectAllowed = 'move';
                    setTimeout(() => { card.classList.add('opacity-20'); }, 0);
                };
                card.ondragover = function(e) { e.preventDefault(); };
                card.ondrop = function(e) {
                    e.preventDefault();
                    if (dragCardSrc && dragCardSrc !== card) {
                        window.saveSnapshotToHistory();
                        const container = document.getElementById('panelContainer');
                        const allNodes = Array.from(container.children);
                        if (allNodes.indexOf(dragCardSrc) < allNodes.indexOf(card)) card.after(dragCardSrc);
                        else card.before(dragCardSrc);
                        updateLiveCutStats(); 
                        window.saveEditorContentToCloud(); 
                        window.saveSnapshotToHistory();
                    }
                };
                card.ondragend = function() { card.classList.remove('opacity-20'); dragCardSrc = null; };

                // 텍스트 편집기 및 붙여넣기 엔진 재가동
                const ed = card.querySelector('.c-editor');
                if (ed) {
                    ed.onblur = function() {
                        window.saveSnapshotToHistory();
                        window.saveEditorContentToCloud();
                    };
                    ed.onpaste = function(e) {
                        window.handleClipboardPaste(e, ed);
                    };
                }
            });
            console.log("Total " + cards.length + " Cuts Revived.");
        }

        window.saveEditorContentToCloud = async function() {
            if (!currentUser || !currentProjectId || !currentTabId) return;
            setSyncStatusIndicator('saving');
            
            // 모든 컷의 최신 값을 DOM 속성에 강제 각인
            document.querySelectorAll('.card-unit').forEach(card => {
                card.querySelectorAll('input[type="text"]').forEach(i => i.setAttribute('value', i.value));
                card.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked ? c.setAttribute('checked', 'true') : c.removeAttribute('checked'));
            });

            const titleVal = document.getElementById('episodeTitle').value;
            const docRef = doc(db, "users", currentUser.uid, "projects", `p_${currentProjectId}`, "tabs", `t_${currentTabId}`);
            
            await setDoc(docRef, {
                title: titleVal,
                originalText: document.getElementById('originalView').value,
                boardHTML: document.getElementById('panelContainer').innerHTML,
                lastUpdated: new Date()
            }, { merge: true });

            const p = projectsMetadata.find(x => x.id === currentProjectId);
            const t = p?.tabs.find(x => x.id === currentTabId);
            if (t && t.title !== titleVal) {
                t.title = titleVal;
                await saveGlobalMetaToFirestore();
            }
            setSyncStatusIndicator('synced');
        };

        // --- 6. 히스토리 시스템 (Undo/Redo) ---
        window.saveSnapshotToHistory = function() {
            const snapshot = {
                title: document.getElementById('episodeTitle').value,
                originalText: document.getElementById('originalView').value,
                boardHTML: document.getElementById('panelContainer').innerHTML
            };
            if (undoStack.length > 0) {
                const last = undoStack[undoStack.length - 1];
                if (last.boardHTML === snapshot.boardHTML && last.title === snapshot.title) return;
            }
            undoStack.push(snapshot);
            if (undoStack.length > MAX_HISTORY) undoStack.shift();
            redoStack = []; 
        };

        window.triggerUndoAction = function() {
            if (undoStack.length <= 1) return;
            redoStack.push(undoStack.pop());
            const previous = undoStack[undoStack.length - 1];
            applyStateFromSnapshot(previous);
        };

        window.triggerRedoAction = function() {
            if (redoStack.length === 0) return;
            const next = redoStack.pop();
            undoStack.push(next);
            applyStateFromSnapshot(next);
        };

        function applyStateFromSnapshot(state) {
            document.getElementById('episodeTitle').value = state.title;
            document.getElementById('originalView').value = state.originalText;
            document.getElementById('panelContainer').innerHTML = state.boardHTML;
            requestAnimationFrame(() => {
                reviveAllCutFeatures(); 
                updateLiveCutStats(); // 언두 후 즉시 카운팅
                window.saveEditorContentToCloud();
            });
        }

        // --- 7. 원고 편집 및 가공 (카운팅 무결성 엔진) ---
        window.processRawTextSource = (mode) => {
            const input = document.getElementById('sourceInput');
            const text = input.value.trim();
            if (!text && mode !== 'overwrite') return;
            if (mode === 'overwrite' && !confirm("전체 초기화하시겠습니까?")) return;
            
            window.saveSnapshotToHistory();
            const originalHistArea = document.getElementById('originalView');
            
            if (mode === 'overwrite') { 
                originalHistArea.value = text; 
                document.getElementById('panelContainer').innerHTML = ""; 
            } else {
                originalHistArea.value += `\n[${new Date().toLocaleTimeString()}] 추가 원고:\n${text}\n`;
            }

            const sentenceArray = text.split(/(?<=[.!?])\s+/).filter(s => s.length > 0);
            sentenceArray.forEach(s => {
                const newCutElement = createCutElement(s);
                if (mode === 'insert' && activeCard) activeCard.after(newCutElement);
                else document.getElementById('panelContainer').appendChild(newCutElement);
            });

            updateLiveCutStats(); // 카운팅 엔진 가동
            if (mode !== 'overwrite') input.value = "";
            window.saveEditorContentToCloud(); 
            window.saveSnapshotToHistory();
        };

        function createCutElement(content) {
            const card = document.createElement('div');
            card.className = 'bg-[#0d0d0d] border border-white/5 rounded-2xl p-6 hover:border-white/10 transition group relative cursor-move card-unit';
            
            card.innerHTML = `
                <div class="flex flex-col gap-3 pointer-events-none">
                    <div class="flex justify-between items-center pointer-events-auto">
                        <div class="flex items-center gap-2 text-gray-600"><span class="text-sm">☰</span><span class="text-[10px] font-black uppercase tracking-widest c-id-label">Cut 00</span></div>
                        <div class="flex gap-3">
                            <label class="text-[10px] cursor-pointer hover:text-blue-400 flex items-center gap-1"><input type="checkbox" onchange="window.toggleCardMemoOption(this, '앵글/샷')" class="hidden"> 앵글/샷</label>
                            <label class="text-[10px] cursor-pointer hover:text-blue-400 flex items-center gap-1"><input type="checkbox" onchange="window.toggleCardMemoOption(this, '배경')" class="hidden"> 배경</label>
                            <label class="text-[10px] cursor-pointer hover:text-blue-400 flex items-center gap-1"><input type="checkbox" onchange="window.toggleCardMemoOption(this, '참고')" class="hidden"> 참고</label>
                        </div>
                    </div>
                    <div class="flex gap-6 pointer-events-auto layout-row">
                        <div class="w-32 shrink-0 flex flex-col gap-2">
                             <div class="img-slot-area grid grid-cols-2 gap-1 bg-black/50 rounded p-1 min-h-[60px]" ondragover="event.preventDefault()" ondrop="window.handleImageDropOnSlot(event, this)"></div>
                             <button onclick="event.stopPropagation(); window.openCutImgPicker(this)" class="text-[9px] bg-white/5 hover:bg-white/10 py-1.5 rounded text-gray-500 transition">+ Image</button>
                        </div>
                        <div class="flex-1 space-y-4">
                            <div class="memo-slot-area flex flex-wrap gap-2"></div>
                            <div class="c-editor text-[16px] leading-relaxed text-gray-300 outline-none min-h-[1.5em]" contenteditable="true" onpaste="window.handleClipboardPaste(event, this)">${highlightDialogue(content)}</div>
                            <div class="flex gap-4 pt-3 border-t border-white/5">
                                <button onclick="event.stopPropagation(); window.copyThisCut(this)" class="text-[9px] text-blue-500 font-bold uppercase">📋 Copy</button>
                                <button onclick="event.stopPropagation(); window.mergeCutUp(this)" class="text-[9px] text-gray-600 hover:text-blue-400 font-bold uppercase">Merge Up</button>
                                <button onclick="event.stopPropagation(); window.splitCutAtCursor(this)" class="text-[9px] text-gray-600 hover:text-yellow-400 font-bold uppercase">Split</button>
                                <button onclick="event.stopPropagation(); window.killCardUnit(this)" class="text-[9px] text-red-900 font-bold uppercase ml-auto">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            
            setTimeout(() => { reviveSingleCutFeature(card); updateLiveCutStats(); }, 0);
            return card;
        }

        function reviveSingleCutFeature(card) {
            card.draggable = true;
            card.onclick = (e) => { e.stopPropagation(); focusCutCard(card); };
            card.addEventListener('dragstart', (e) => {
                if (e.target.tagName === 'IMG' || e.target.tagName === 'INPUT') return;
                dragCardSrc = card;
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => card.classList.add('opacity-20'), 0);
            });
            const editor = card.querySelector('.c-editor');
            if (editor) {
                editor.onblur = function() { window.saveSnapshotToHistory(); window.saveEditorContentToCloud(); };
                editor.onpaste = function(e) { window.handleClipboardPaste(e, editor); };
            }
        }

        // --- 8. 창고 관리 엔진 (iOS 정렬 무반응 해결 및 드래그) ---
        window.openArchiveManagerUI = async function() {
            const modal = document.getElementById('archiveModal');
            modal.classList.remove('hidden');
            const list = document.getElementById('archiveList');
            list.innerHTML = "<div class='p-10 text-center opacity-50 font-black text-xs tracking-widest uppercase'>Connecting to Archives...</div>";
            
            try {
                const q_simple = query(collection(db, "users", currentUser.uid, "archives"), orderBy("timestamp", "desc"), limit(60));
                const qs = await getDocs(q_simple);
                list.innerHTML = "";
                if (qs.empty) { list.innerHTML = "<div class='p-10 text-center opacity-30 text-xs'>No records.</div>"; return; }

                const archiveItems = [];
                qs.forEach(docSnap => archiveItems.push({ id: docSnap.id, ...docSnap.data() }));
                archiveItems.sort((a, b) => (a.order || 0) - (b.order || 0));

                archiveItems.forEach((item) => {
                    const div = document.createElement('div');
                    div.className = "bg-[#111] p-5 rounded-2xl border border-white/5 flex justify-between items-center hover:border-blue-500 transition mb-3 cursor-move snapshot-entry";
                    div.draggable = true;
                    div.dataset.id = item.id;

                    div.ondragstart = (e) => { dragSnapshotSrcId = item.id; e.dataTransfer.effectAllowed = 'move'; div.classList.add('opacity-30'); };
                    div.ondragover = (e) => e.preventDefault();
                    div.ondrop = async (e) => {
                        e.preventDefault();
                        if (dragSnapshotSrcId && dragSnapshotSrcId !== item.id) {
                            const entries = [...list.querySelectorAll('.snapshot-entry')];
                            const sIdx = entries.findIndex(u => u.dataset.id === dragSnapshotSrcId);
                            const tIdx = entries.findIndex(u => u.dataset.id === item.id);
                            const srcEl = entries[sIdx];
                            if (sIdx < tIdx) div.after(srcEl); else div.before(srcEl);
                            await commitArchiveOrderToCloud(list);
                        }
                    };
                    div.ondragend = () => div.classList.remove('opacity-30');

                    div.innerHTML = `<div><div class="text-[9px] text-blue-500 font-bold uppercase tracking-widest">${item.projectName || '미분류'}</div>
                        <div class="text-base font-black text-white">${item.title}</div>
                        <div class="text-[10px] text-gray-600">${item.timestamp.toDate().toLocaleString()}</div></div>
                        <div class="flex gap-2"><button onclick="window.summonSnapshotNow('${item.id}')" class="bg-blue-600/20 text-blue-400 px-5 py-2 rounded-xl font-bold hover:bg-blue-600 transition">소환</button>
                        <button onclick="window.killSnapshotNow('${item.id}')" class="bg-red-900/10 text-red-700 px-4 py-2 rounded-xl font-bold hover:bg-red-900 transition">삭제</button></div>`;
                    list.appendChild(div);
                });
            } catch (err) { list.innerHTML = `<div class='p-10 text-center text-red-500'>Error: ${err.message}</div>`; }
        };

        async function commitArchiveOrderToCloud(container) {
            const batch = writeBatch(db);
            const items = container.querySelectorAll('.snapshot-entry');
            items.forEach((item, index) => {
                const ref = doc(db, "users", currentUser.uid, "archives", item.dataset.id);
                batch.update(ref, { order: index });
            });
            await batch.commit();
        }

        window.summonSnapshotNow = async function(id) {
            if (!confirm("소환하시겠습니까? 데이터가 교체되고 편집 기능이 활성화됩니다.")) return;
            const docSnap = await getDoc(doc(db, "users", currentUser.uid, "archives", id));
            if (docSnap.exists()) {
                window.saveSnapshotToHistory();
                const d = docSnap.data();
                document.getElementById('episodeTitle').value = d.title;
                document.getElementById('originalView').value = d.originalText;
                document.getElementById('panelContainer').innerHTML = d.boardHTML;
                
                // 소환 후 0.15초 대기 후 기능과 숫자 리프레시
                setTimeout(() => { 
                    reviveAllCutFeatures(); 
                    updateLiveCutStats(); 
                    window.saveEditorContentToCloud(); 
                    window.saveSnapshotToHistory(); 
                }, 150);
                document.getElementById('archiveModal').classList.add('hidden');
            }
        };

        // --- 9. 전역 함수 바인딩 (TypeError 완전 박멸 / 생략 없음) ---
        window.googleSignIn = function() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            if (isIOS) {
                // iOS 사파리 루프 방지의 최후 수단: 리다이렉트만 사용
                signInWithRedirect(auth, provider);
            } else {
                signInWithPopup(auth, provider).catch(err => {
                    if(err.code === 'auth/popup-blocked') signInWithRedirect(auth, provider);
                });
            }
        };

        window.userLogOutAction = function() {
            signOut(auth).then(() => location.reload());
        };

        window.killProjectEntry = async function(id) {
            if (projectsMetadata.length <= 1) return;
            if (confirm("정말 작품을 삭제할까요? 모든 슬롯이 사라집니다.")) {
                projectsMetadata = projectsMetadata.filter(p => p.id !== id);
                await saveGlobalMetaToFirestore();
            }
        };

        window.killSlotEntry = async function(id) {
            const p = projectsMetadata.find(x => x.id === currentProjectId);
            if (p && p.tabs.length > 1) {
                if (confirm("이 슬롯을 삭제할까요?")) {
                    p.tabs = p.tabs.filter(t => t.id !== id);
                    if (currentTabId === id) currentTabId = p.tabs[0].id;
                    await saveGlobalMetaToFirestore();
                }
            }
        };

        window.createProject = async function() {
            const id = Date.now();
            projectsMetadata.push({ id, name: "새 작품", order: projectsMetadata.length, tabs: [{ id: id + 1, order: 0, title: "" }] });
            currentProjectId = id; currentTabId = id + 1;
            await saveGlobalMetaToFirestore();
        };

        window.createSlot = async function() {
            const p = projectsMetadata.find(x => x.id === currentProjectId);
            if (p) {
                const id = Date.now();
                p.tabs.push({ id, order: p.tabs.length, title: "" });
                currentTabId = id;
                await saveGlobalMetaToFirestore();
            }
        };
        
        window.killCardUnit = function(btn) { 
            window.saveSnapshotToHistory(); 
            btn.closest('.card-unit').remove(); 
            updateLiveCutStats(); 
            window.saveEditorContentToCloud(); 
            window.saveSnapshotToHistory(); 
        };
        
        window.mergeCutUp = function(btn) {
            const cur = btn.closest('.card-unit');
            const prev = cur.previousElementSibling;
            if (prev) {
                window.saveSnapshotToHistory();
                const ed = prev.querySelector('.c-editor');
                ed.innerText += " " + cur.querySelector('.c-editor').innerText;
                ed.innerHTML = highlightDialogue(ed.innerText);
                cur.querySelectorAll('.img-slot-area > div').forEach(img => prev.querySelector('.img-slot-area').appendChild(img));
                cur.remove();
                updateLiveCutStats(); 
                window.saveEditorContentToCloud(); 
                window.saveSnapshotToHistory();
            }
        };

        window.splitCutAtCursor = function(btn) {
            const cur = btn.closest('.card-unit');
            const ed = cur.querySelector('.c-editor');
            const sel = window.getSelection();
            if (!sel.rangeCount || !ed.contains(sel.getRangeAt(0).commonAncestorContainer)) return;
            
            window.saveSnapshotToHistory();
            const r = sel.getRangeAt(0);
            const ext = document.createRange();
            ext.setStart(r.endContainer, r.endOffset);
            ext.setEnd(ed, ed.childNodes.length);
            const rem = ext.toString();
            ext.deleteContents();
            ed.innerHTML = highlightDialogue(ed.innerText);
            cur.after(createCutElement(rem));
            updateLiveCutStats(); 
            window.saveEditorContentToCloud(); 
            window.saveSnapshotToHistory();
        };

        window.toggleCardMemoOption = function(cb, label) {
            window.saveSnapshotToHistory();
            const wrap = cb.closest('.card-unit').querySelector('.memo-slot-area');
            if (cb.checked) {
                const i = document.createElement('input');
                i.className = 'bg-transparent border-b border-white/10 text-[11px] text-gray-500 outline-none w-24 focus:border-blue-500';
                i.placeholder = label + "...";
                i.dataset.type = label;
                i.onblur = function() { window.saveSnapshotToHistory(); window.saveEditorContentToCloud(); };
                wrap.appendChild(i);
                i.focus();
            } else {
                const ex = wrap.querySelector(`input[data-type="${label}"]`);
                if (ex) ex.remove();
            }
            window.saveEditorContentToCloud();
        };

        window.saveArchiveSnapshot = async function() {
            const title = document.getElementById('episodeTitle').value || "무제";
            const name = prompt("창고 보관 이름을 정해주세요", title);
            if (!name) return;
            try {
                const qs = await getDocs(collection(db, "users", currentUser.uid, "archives"));
                await addDoc(collection(db, "users", currentUser.uid, "archives"), { 
                    title: name, 
                    originalText: document.getElementById('originalView').value, 
                    boardHTML: document.getElementById('panelContainer').innerHTML, 
                    timestamp: new Date(), 
                    projectName: projectsMetadata.find(p => p.id === currentProjectId)?.name || "Unknown", 
                    order: qs.size 
                });
                alert("보관 완료.");
            } catch (err) { alert("저장 실패: " + err.message); }
        };

        window.killSnapshotNow = async function(id) {
            if (confirm("영구 삭제하시겠습니까?")) {
                await deleteDoc(doc(db, "users", currentUser.uid, "archives", id));
                window.openArchiveManagerUI();
            }
        };

        window.copyThisCut = async function(btn) {
            const txt = btn.closest('.card-unit').querySelector('.c-editor').innerText;
            await navigator.clipboard.writeText(txt);
            alert("컷 내용 복사됨.");
        };

        window.clipCopyRaw = async function(id) {
            const el = document.getElementById(id);
            await navigator.clipboard.writeText(el.value);
            alert("원문 복사 완료.");
        };

        window.toggleGridViewMode = function() {
            isGridView = !isGridView;
            const container = document.getElementById('panelContainer');
            const btn = document.getElementById('gridBtn');
            container.classList.toggle('grid-view', isGridView);
            btn.innerText = isGridView ? "리스트 뷰" : "그리드 뷰";
            btn.classList.toggle('text-blue-400', isGridView);
        };

        window.openCutImgPicker = function(btn) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) { if (e.target.files[0]) compressAndInjectImg(e.target.files[0], btn.closest('.card-unit')); };
            input.click();
        };

        function compressAndInjectImg(file, card) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    cvs.width = 500;
                    cvs.height = img.height * (500 / img.width);
                    cvs.getContext('2d').drawImage(img, 0, 0, cvs.width, cvs.height);
                    const resSrc = cvs.toDataURL('image/jpeg', 0.6);
                    window.saveSnapshotToHistory();
                    const slot = card.querySelector('.img-slot-area');
                    const wrap = document.createElement('div');
                    wrap.className = "relative aspect-square bg-gray-900 rounded overflow-hidden cursor-pointer";
                    wrap.innerHTML = `<img src="${resSrc}" class="w-full h-full object-cover">
                                      <button onclick="window.saveSnapshotToHistory(); this.parentElement.remove(); window.saveEditorContentToCloud(); window.saveSnapshotToHistory();" class="absolute top-0 right-0 bg-red-600 text-[8px] p-0.5">×</button>`;
                    slot.appendChild(wrap);
                    window.saveEditorContentToCloud();
                    window.saveSnapshotToHistory();
                };
            };
        }

        window.handleImageDropOnSlot = function(e, slot) {
            e.preventDefault();
            if (e.dataTransfer.files[0]) compressAndInjectImg(e.dataTransfer.files[0], slot.closest('.card-unit'));
        };

        window.handleClipboardPaste = function(e, el) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.kind === 'file') {
                    e.preventDefault();
                    compressAndInjectImg(item.getAsFile(), el.closest('.card-unit'));
                }
            }
        };

        // --- 10. 프로젝트 메모 시스템 ---
        async function syncProjectMemos() {
            if (!currentProjectId) return;
            const q = query(collection(db, "users", currentUser.uid, "projects", `p_${currentProjectId}`, "memos"), orderBy("order", "asc"));
            onSnapshot(q, (qs) => {
                memos = [];
                qs.forEach(doc => memos.push({id: doc.id, ...doc.data()}));
                renderMemoListUI();
            });
        }

        window.addNewProjectMemo = async function() {
            const slotTitle = document.getElementById('episodeTitle').value || "새 슬롯";
            await addDoc(collection(db, "users", currentUser.uid, "projects", `p_${currentProjectId}`, "memos"), { 
                title: `[${slotTitle}] 메모`, content: "", order: memos.length 
            });
        };

        function renderMemoListUI() {
            const container = document.getElementById('memoContainer');
            container.innerHTML = "";
            memos.forEach(m => {
                const div = document.createElement('div');
                div.className = "bg-white/5 border border-white/10 rounded-xl mb-4 overflow-hidden shadow-lg transition hover:border-white/20";
                div.innerHTML = `
                    <div class="flex items-center justify-between p-3 bg-white/5 cursor-pointer" onclick="this.nextElementSibling.classList.toggle('hidden')">
                        <input value="${m.title}" class="bg-transparent border-none outline-none text-[11px] font-bold w-full truncate" onchange="window.saveSharedMemoData('${m.id}', 'title', this.value)" onclick="event.stopPropagation()">
                        <button onclick="event.stopPropagation(); window.killSharedMemoData('${m.id}')" class="text-red-900 ml-2 font-black text-lg">×</button>
                    </div>
                    <textarea class="w-full bg-transparent p-3 text-[11px] text-gray-400 outline-none h-28" onchange="window.saveSharedMemoData('${m.id}', 'content', this.value)">${m.content}</textarea>`;
                container.appendChild(div);
            });
        }

        window.saveSharedMemoData = async function(id, f, v) {
            await setDoc(doc(db, "users", currentUser.uid, "projects", `p_${currentProjectId}`, "memos", id), { [f]: v }, { merge: true });
        };

        window.killSharedMemoData = async function(id) {
            if (confirm("메모를 삭제하시겠습니까?")) await deleteDoc(doc(db, "users", currentUser.uid, "projects", `p_${currentProjectId}`, "memos", id));
        };

        // --- 시스템 유틸리티 ---
        function initializeHotkeys() {
            window.addEventListener('keydown', (e) => {
                if (e.ctrlKey && !e.shiftKey && e.key === 'z') { e.preventDefault(); window.undoAction(); }
                if ((e.ctrlKey && e.shiftKey && e.key === 'Z') || (e.ctrlKey && e.key === 'y')) { e.preventDefault(); window.redoAction(); }
                if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); window.processRawTextSource('append'); }
                if (e.altKey && e.key === 's') { e.preventDefault(); window.saveArchiveSnapshot(); }
                if (e.ctrlKey && e.key === 'f') { e.preventDefault(); document.getElementById('boardSearchInput').focus(); }
            });
        }

        function setSyncStatusIndicator(status) {
            const dot = document.querySelector(`.sync-dot-${currentTabId}`);
            if (dot) {
                dot.style.backgroundColor = (status === 'saving' ? '#eab308' : '#22c55e');
                if (status === 'saving') dot.classList.add('animate-pulse'); else dot.classList.remove('animate-pulse');
            }
        }

        function updateLiveCutStats() {
            const units = document.getElementById('panelContainer').querySelectorAll('.card-unit');
            units.forEach((u, i) => {
                const badge = u.querySelector('.c-id-label');
                if (badge) badge.innerText = `Cut ${String(i+1).padStart(2, '0')}`;
            });
            const counter = document.getElementById('globalCutCount');
            if (counter) counter.innerText = `${units.length} Cuts Synchronized`;
        }

        function focusCutCard(c) {
            document.querySelectorAll('.card-unit').forEach(u => u.classList.remove('card-focused'));
            c.classList.add('card-focused');
            activeCard = c;
        }

        window.clearEditorFocus = function() {
            document.querySelectorAll('.card-unit').forEach(u => u.classList.remove('card-focused'));
            activeCard = null;
        };

        function highlightDialogue(t) {
            if (!t) return "";
            return t.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, '<span class="hl-dialog">$&</span>')
                    .replace(/[\(\[][가-힣a-zA-Z\s]+[\)\]]/g, '<span class="hl-sfx">$&</span>');
        }

        function resetMainEditorUI() {
            document.getElementById('episodeTitle').value = "";
            document.getElementById('originalView').value = "";
            document.getElementById('panelContainer').innerHTML = "";
            updateLiveCutStats();
        }

    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .card-focused { border-color: #3b82f6 !important; background: #111 !important; box-shadow: 0 0 25px rgba(59,130,246,0.2); }
        .hl-dialog { color: #60a5fa; font-weight: 600; } .hl-sfx { color: #fbbf24; font-style: italic; }
        .no-scrollbar::-webkit-scrollbar { display: none; } [contenteditable]:focus { outline: none; background: rgba(59, 130, 246, 0.05); }

        .grid-view .layout-row { flex-direction: column !important; }
        #authLoading { transition: opacity 0.5s ease-out; }

</head>

    <main class="flex flex-1 overflow-hidden relative">
        <section class="w-1/4 flex flex-col border-r border-white/5 bg-black/10">

                        <div id="globalCutCount" class="px-4 py-1.5 bg-blue-600/10 border border-blue-500/20 text-blue-500 rounded-full text-[10px] font-mono whitespace-nowrap">0 Cuts Synchronized</div>
