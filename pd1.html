<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>지혜의 용 | 워크스테이션 v19.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* [공통 테마] */
        body { background-color: #050505; color: #e2e8f0; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        
        /* [스크롤바 제어] */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* [카드 포커스 및 하이라이트] */
        .card-focused { border-color: #3b82f6 !important; background: #0a0a0a !important; box-shadow: 0 0 25px rgba(59,130,246,0.15); }
        .hl-dialog { color: #60a5fa; font-weight: 700; }
        .hl-sfx { color: #fbbf24; font-style: italic; }
        
        /* [탭 디자인] */
        .tab-active { background-color: #0f172a !important; color: #3b82f6 !important; border-top: 3px solid #3b82f6; }
        .tab-item { transition: all 0.2s ease; white-space: nowrap; min-width: 130px; }
        
        /* [드래그 상태 시각화] */
        .dragging { opacity: 0.3; transform: scale(0.98); }
        .drag-over { border-top: 3px solid #3b82f6 !important; }

        /* [에디터 및 기타] */
        [contenteditable]:focus { outline: none; background: rgba(30, 41, 59, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .memo-sidebar { width: 320px; }
        .hidden-content { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col" onclick="clearActiveFocus()">

    <nav class="h-12 border-b border-white/10 flex items-center px-4 bg-black/60 shrink-0">
        <div class="flex items-center gap-2 mr-6">
            <span class="text-blue-500 font-black italic tracking-tighter text-base">DRAGON v19.0</span>
        </div>
        
        <div id="projectTabList" class="flex h-full items-center overflow-x-auto no-scrollbar">
            </div>
        
        <button onclick="createNewProject()" class="ml-4 w-7 h-7 flex items-center justify-center bg-white/5 hover:bg-blue-600 rounded-full text-gray-400 transition-colors">+</button>

        <div class="ml-auto flex items-center gap-3">
            <div class="flex items-center bg-white/5 rounded-lg px-2 mr-4">
                <span class="text-[10px] text-gray-500 mr-2 uppercase font-black">Search</span>
                <input type="text" id="boardSearch" placeholder="대사 검색..." oninput="filterCards()" class="bg-transparent border-none outline-none text-xs p-1 w-32">
            </div>
            <button onclick="exportDataWithDialog()" class="text-[10px] font-bold text-gray-500 hover:text-blue-400 uppercase tracking-widest">Save As</button>
            <button onclick="importFullData()" class="text-[10px] font-bold text-gray-500 hover:text-gray-200 uppercase tracking-widest">Restore</button>
        </div>
    </nav>

    <nav class="h-10 border-b border-white/5 flex items-center px-4 bg-[#0a0a0a] shrink-0">
        <div id="slotTabList" class="flex h-full items-center overflow-x-auto no-scrollbar">
            </div>
        <button onclick="createNewSlot()" class="ml-4 px-3 h-full text-gray-600 hover:text-white font-bold text-lg">+</button>
        
        <div class="ml-auto flex gap-4">
            <button onclick="performUndo()" class="text-[10px] font-bold text-gray-600 hover:text-yellow-500 uppercase">Undo</button>
            <button onclick="performRedo()" class="text-[10px] font-bold text-gray-600 hover:text-yellow-500 uppercase">Redo</button>
            <button onclick="resetCurrentBoard()" class="text-[10px] font-bold text-red-900 hover:text-red-500 uppercase ml-4">Reset Board</button>
        </div>
    </nav>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="w-80 flex flex-col border-r border-white/5 bg-black/20">
            <div class="h-1/2 flex flex-col border-b border-white/5">
                <div class="p-3 text-[9px] font-black text-gray-600 uppercase bg-white/5 flex justify-between">
                    History Record
                    <button onclick="copyFullHistory()" class="text-blue-500 hover:text-blue-300">Copy</button>
                </div>
                <textarea id="originalView" class="flex-1 bg-transparent p-4 outline-none resize-none text-[11px] leading-relaxed text-gray-500" readonly></textarea>
            </div>
            <div class="h-1/2 flex flex-col p-5 gap-4">
                <div class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Input Engine</div>
                <textarea id="sourceInput" class="flex-1 bg-white/5 rounded-2xl p-4 outline-none text-sm focus:ring-1 ring-blue-500 transition-all border border-white/5" placeholder="원고 내용을 입력하세요..."></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="processScript('append')" class="py-3 bg-blue-600 rounded-xl text-[10px] font-black uppercase">맨 뒤 추가</button>
                    <button onclick="processScript('insert')" class="py-3 bg-yellow-600 text-black rounded-xl text-[10px] font-black uppercase">컷 뒤 삽입</button>
                </div>
            </div>
        </section>

        <section class="flex-1 flex flex-col overflow-hidden">
            <div class="p-10 pb-4 flex items-end gap-6 shrink-0">
                <div class="flex-1">
                    <div class="text-[10px] font-bold text-blue-900 uppercase mb-1">
                        <span id="pathProject">PROJECT</span> / <span id="pathSlot">SLOT</span>
                    </div>
                    <input type="text" id="boardTitle" class="w-full bg-transparent text-4xl font-black outline-none tracking-tighter placeholder-gray-900" placeholder="회차 제목..." oninput="syncSlotTitle()">
                </div>
                <div id="statsDisplay" class="text-[10px] font-mono text-blue-500 mb-2 px-3 py-1 border border-blue-900/30 rounded-full">0 Cuts Sovereign</div>
            </div>
            <div id="panelContainer" class="flex-1 overflow-y-auto p-10 pt-4 space-y-8 no-scrollbar">
                </div>
        </section>

        <aside class="memo-sidebar border-l border-white/5 bg-black/40 p-5 shrink-0 flex flex-col gap-6">
            <div class="flex justify-between items-center border-b border-white/10 pb-4">
                <h4 class="text-[10px] font-black text-gray-500 uppercase italic">Project Settings</h4>
                <button onclick="addProjectMemo()" class="w-7 h-7 flex items-center justify-center bg-blue-600 rounded-full text-white font-bold shadow-lg">+</button>
            </div>
            <div id="memoListContainer" class="flex-1 overflow-y-auto no-scrollbar space-y-3">
                </div>
        </aside>
    </main>

    <script>
        // -----------------------------------------------------------------------------------------
        // [CORE LOGIC] Dragon Sovereign v19.0
        // -----------------------------------------------------------------------------------------

        // 1. 상태 변수 명시적 선언
        let storage = JSON.parse(localStorage.getItem('dragon_sovereign_v19')) || {
            projects: [],
            currentProjectId: null,
            currentSlotId: null
        };

        let undoStack = [];
        let redoStack = [];
        let dragSourceId = null;
        let dragSourceType = null;
        let activeCardNode = null;

        // 2. 초기 기동 시스템
        window.onload = function() {
            if (storage.projects.length === 0) {
                const pId = Date.now();
                const sId = pId + 1;
                storage.projects.push({
                    id: pId, name: "첫 작품", order: 0, memos: [],
                    slots: [{ id: sId, title: '', original: '', cards: [], order: 0 }]
                });
                storage.currentProjectId = pId;
                storage.currentSlotId = sId;
                saveToDisk();
            }
            refreshUI();
        };

        // 3. UI 리프레시 엔진 (데이터 침범 방지 로직 포함)
        function refreshUI() {
            renderProjectTabs();
            renderSlotTabs();
            loadActiveSlotContent();
            renderMemos();
            updateStats();
            
            const p = getActiveProject();
            const s = getActiveSlot();
            document.getElementById('pathProject').innerText = p ? p.name : "UNTITLED";
            document.getElementById('pathSlot').innerText = s ? s.title : "WORKPLACE";
        }

        // 4. 데이터 헬퍼 함수
        function getActiveProject() {
            return storage.projects.find(x => x.id === storage.currentProjectId);
        }

        function getActiveSlot() {
            const p = getActiveProject();
            return p ? p.slots.find(x => x.id === storage.currentSlotId) : null;
        }

        // 5. 탭 시스템 (정밀하게 분리된 드래그 앤 드롭)
        function renderProjectTabs() {
            const container = document.getElementById('projectTabList');
            container.innerHTML = "";
            storage.projects.sort((a, b) => a.order - b.order);

            storage.projects.forEach(p => {
                const isActive = (storage.currentProjectId === p.id);
                const tab = document.createElement('div');
                tab.className = `tab-item group flex items-center h-full px-5 border-r border-white/5 cursor-move ${isActive ? 'tab-active' : 'text-gray-500 hover:bg-white/5'}`;
                tab.draggable = true;
                tab.dataset.dragType = "project";
                tab.dataset.dragId = p.id;

                tab.ondragstart = onDragStart;
                tab.ondragover = (e) => e.preventDefault();
                tab.ondrop = onDrop;

                const input = document.createElement('input');
                input.value = p.name;
                input.className = "bg-transparent border-none outline-none font-black text-[11px] cursor-text mr-4";
                input.oninput = function() {
                    p.name = this.value;
                    window.executeAutoTabResize(this);
                    saveToDisk();
                };
                input.onclick = (e) => e.stopPropagation();

                const del = document.createElement('button');
                del.innerHTML = "×";
                del.className = "opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 font-black";
                del.onclick = (e) => { e.stopPropagation(); deleteProject(p.id); };

                tab.onclick = () => switchProject(p.id);
                tab.appendChild(input);
                tab.appendChild(del);
                container.appendChild(tab);
                window.executeAutoTabResize(input);
            });
        }

        function switchProject(id) {
            if (storage.currentProjectId === id) return;
            // 1. 현재 화면 저장
            saveCurrentContentToState();
            // 2. 프로젝트 ID 변경
            storage.currentProjectId = id;
            // 3. 해당 프로젝트의 첫 번째 슬롯으로 ID 변경
            const p = getActiveProject();
            storage.currentSlotId = p.slots[0].id;
            // 4. 화면 리프레시
            saveToDisk();
            refreshUI();
        }

        function renderSlotTabs() {
            const container = document.getElementById('slotTabList');
            container.innerHTML = "";
            const p = getActiveProject();
            if (!p) return;

            p.slots.sort((a, b) => a.order - b.order);

            p.slots.forEach(s => {
                const isActive = (storage.currentSlotId === s.id);
                const tab = document.createElement('div');
                tab.className = `tab-item group flex items-center h-full px-6 border-r border-white/5 cursor-move text-[10px] font-bold ${isActive ? 'bg-black text-blue-400 border-t-2 border-t-blue-600' : 'text-gray-600 hover:text-gray-300'}`;
                tab.draggable = true;
                tab.dataset.dragType = "slot";
                tab.dataset.dragId = s.id;

                tab.ondragstart = onDragStart;
                tab.ondragover = (e) => e.preventDefault();
                tab.ondrop = onDrop;

                tab.innerHTML = `
                    <span class="mr-4">${s.title || 'WORKPLACE'}</span>
                    <button onclick="event.stopPropagation(); deleteSlot(${s.id})" class="opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 font-black">×</button>
                `;
                tab.onclick = () => switchSlot(s.id);
                container.appendChild(tab);
            });
        }

        function switchSlot(id) {
            if (storage.currentSlotId === id) return;
            saveCurrentContentToState();
            storage.currentSlotId = id;
            saveToDisk();
            refreshUI();
        }

        // 6. 에디터 메인 로직 (구조적 언두 포함)
        function loadActiveSlotContent() {
            const s = getActiveSlot();
            if (!s) return;
            
            document.getElementById('boardTitle').value = s.title || "";
            document.getElementById('originalView').value = s.original || "";
            
            const container = document.getElementById('panelContainer');
            container.innerHTML = "";
            
            s.cards.forEach(c => {
                container.appendChild(createCardNode(c.id, c.text, c.tags, c.images));
            });
        }

        function saveCurrentContentToState() {
            const s = getActiveSlot();
            if (!s) return;
            
            const cardData = [];
            document.querySelectorAll('.card-unit').forEach(node => {
                cardData.push({
                    id: parseFloat(node.dataset.dragId),
                    text: node.querySelector('.c-editor').innerText,
                    tags: Array.from(node.querySelectorAll('.tag-input')).map(i => i.value),
                    images: Array.from(node.querySelectorAll('.card-img-vault img')).map(img => img.src)
                });
            });
            
            s.title = document.getElementById('boardTitle').value;
            s.original = document.getElementById('originalView').value;
            s.cards = cardData;
        }

        function createCardNode(id, text, tags = [], images = []) {
            const card = document.createElement('div');
            card.className = 'card-unit bg-[#0d0d0d] border border-white/5 rounded-3xl p-8 transition-all group relative cursor-move';
            card.dataset.dragId = id;
            card.dataset.dragType = "card";
            card.draggable = true;

            card.ondragstart = onDragStart;
            card.ondragover = (e) => e.preventDefault();
            card.ondrop = onDrop;
            
            card.onclick = (e) => { e.stopPropagation(); focusCard(card); };

            let tagHtml = "";
            tags.forEach(t => {
                tagHtml += `<input class="tag-input bg-transparent border-b border-white/10 text-[11px] text-blue-400 outline-none w-24 mr-2" value="${t}" oninput="saveToDisk()">`;
            });

            let imgHtml = "";
            images.forEach(src => {
                imgHtml += `<div class="relative w-full aspect-square bg-black rounded overflow-hidden">
                    <img src="${src}" class="w-full h-full object-cover">
                    <button onclick="pushState(); this.parentElement.remove(); saveToDisk()" class="absolute top-0 right-0 bg-red-600 text-[8px] p-1 font-black">×</button>
                </div>`;
            });

            card.innerHTML = `
                <div class="flex justify-between items-center mb-6 pointer-events-none">
                    <div class="flex items-center gap-3">
                        <span class="text-blue-900 font-black text-xs opacity-40">☰</span>
                        <span class="text-[10px] font-black text-gray-700 uppercase c-cut-badge">Cut 00</span>
                    </div>
                    <div class="flex gap-4 pointer-events-auto">
                        <button onclick="addTag(this)" class="text-[9px] font-black text-gray-500 hover:text-white uppercase">+ TAG</button>
                        <button onclick="addImage(this)" class="text-[9px] font-black text-gray-500 hover:text-white uppercase">+ IMAGE</button>
                    </div>
                </div>
                <div class="flex gap-8">
                    <div class="card-img-vault w-32 grid grid-cols-2 gap-2 empty:hidden">${imgHtml}</div>
                    <div class="flex-1 space-y-4">
                        <div class="card-tag-area flex flex-wrap gap-2">${tagHtml}</div>
                        <div class="c-editor text-[17px] leading-relaxed text-gray-300 outline-none min-h-[1.5em]" contenteditable="true" onblur="saveToDisk()">${applyHighlight(text)}</div>
                        <div class="flex gap-6 pt-6 border-t border-white/5 opacity-30 group-hover:opacity-100 transition-opacity">
                            <button onclick="copyCut(this)" class="text-[10px] font-black text-blue-500 uppercase">Copy</button>
                            <button onclick="mergeCut(this)" class="text-[10px] font-black text-gray-600 hover:text-white uppercase">Merge Up</button>
                            <button onclick="splitCut(this)" class="text-[10px] font-black text-gray-600 hover:text-white uppercase">Split</button>
                            <button onclick="deleteCut(this)" class="text-[10px] font-black text-red-900 hover:text-red-500 uppercase ml-auto">Delete</button>
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        // 7. 컷 물리적 조작 (언두 스택 연동)
        function mergeCut(btn) {
            const cur = btn.closest('.card-unit');
            const prev = cur.previousElementSibling;
            if (prev && prev.classList.contains('card-unit')) {
                pushState();
                const targetEd = prev.querySelector('.c-editor');
                targetEd.innerText += " " + cur.querySelector('.c-editor').innerText;
                targetEd.innerHTML = applyHighlight(targetEd.innerText);
                cur.querySelectorAll('.card-img-vault > div').forEach(div => prev.querySelector('.card-img-vault').appendChild(div));
                cur.remove();
                saveToDisk();
                updateStats();
            }
        }

        function splitCut(btn) {
            const cur = btn.closest('.card-unit');
            const ed = cur.querySelector('.c-editor');
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            
            pushState();
            const range = sel.getRangeAt(0);
            const extraRange = document.createRange();
            extraRange.setStart(range.endContainer, range.endOffset);
            extraRange.setEnd(ed, ed.childNodes.length);
            
            const extraText = extraRange.toString();
            extraRange.deleteContents();
            ed.innerHTML = applyHighlight(ed.innerText);
            
            const newNode = createCardNode(Date.now(), extraText);
            cur.after(newNode);
            saveToDisk();
            updateStats();
        }

        function deleteCut(btn) {
            if (confirm("컷을 삭제할까요?")) {
                pushState();
                btn.closest('.card-unit').remove();
                saveToDisk();
                updateStats();
            }
        }

        // 8. 드래그 앤 드롭 핸들러
        function onDragStart(e) {
            dragSourceId = parseInt(this.dataset.dragId);
            dragSourceType = this.dataset.dragType;
            this.classList.add('dragging');
        }

        function onDrop(e) {
            e.preventDefault();
            this.classList.remove('dragging');
            const tid = parseInt(this.dataset.dragId);
            const tType = this.dataset.dragType;

            if (dragSourceType !== tType || dragSourceId === tid) return;

            pushState();
            if (dragSourceType === 'project') {
                const sIdx = storage.projects.findIndex(x => x.id === dragSourceId);
                const tIdx = storage.projects.findIndex(x => x.id === tid);
                const [m] = storage.projects.splice(sIdx, 1);
                storage.projects.splice(tIdx, 0, m);
                storage.projects.forEach((p, i) => p.order = i);
                renderProjectTabs();
            } else if (dragSourceType === 'slot') {
                const p = getActiveProject();
                const sIdx = p.slots.findIndex(x => x.id === dragSourceId);
                const tIdx = p.slots.findIndex(x => x.id === tid);
                const [m] = p.slots.splice(sIdx, 1);
                p.slots.splice(tIdx, 0, m);
                p.slots.forEach((s, i) => s.order = i);
                renderSlotTabs();
            } else if (dragSourceType === 'card') {
                const board = document.getElementById('panelContainer');
                const src = board.querySelector(`[data-drag-id="${dragSourceId}"]`);
                const all = Array.from(board.querySelectorAll('.card-unit'));
                if (all.indexOf(src) < all.indexOf(this)) this.after(src);
                else board.insertBefore(src, this);
            }
            saveToDisk();
            updateStats();
        }

        // 9. 언두/리두 시스템 (스냅샷 방식)
        function pushState() {
            saveCurrentContentToState();
            undoStack.push(JSON.stringify(storage));
            if (undoStack.length > MAX_HISTORY_LIMIT) undoStack.shift();
            redoStack = [];
        }

        function performUndo() {
            if (undoStack.length === 0) return;
            saveCurrentContentToState();
            redoStack.push(JSON.stringify(storage));
            storage = JSON.parse(undoStack.pop());
            saveToDisk();
            refreshUI();
        }

        function performRedo() {
            if (redoStack.length === 0) return;
            saveCurrentContentToState();
            undoStack.push(JSON.stringify(storage));
            storage = JSON.parse(redoStack.pop());
            saveToDisk();
            refreshUI();
        }

        // 10. 메모 및 기타 유틸리티
        function renderMemos() {
            const container = document.getElementById('memoListContainer');
            container.innerHTML = "";
            const p = getActiveProject();
            if (!p || !p.memos) return;

            p.memos.forEach((m, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white/5 border border-white/10 rounded-2xl overflow-hidden";
                div.innerHTML = `
                    <div class="flex items-center justify-between p-4 cursor-pointer" onclick="toggleFold(${idx})">
                        <input value="${m.title}" class="bg-transparent border-none outline-none font-bold text-[11px] text-blue-400 w-full" 
                               oninput="updateMData(${idx}, 'title', this.value)" onclick="event.stopPropagation()">
                        <button onclick="event.stopPropagation(); deleteM(${idx})" class="text-red-900 font-black ml-2">×</button>
                    </div>
                    <div class="p-4 ${m.folded ? 'hidden' : ''}">
                        <textarea class="w-full bg-transparent text-[11px] text-gray-500 outline-none h-32 resize-none" 
                                  oninput="updateMData(${idx}, 'content', this.value)">${m.content}</textarea>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function addProjectMemo() {
            const p = getActiveProject();
            if (!p.memos) p.memos = [];
            p.memos.unshift({ title: 'New Memo', content: '', folded: false });
            saveToDisk();
            renderMemos();
        }

        window.toggleFold = (idx) => {
            const p = getActiveProject();
            p.memos[idx].folded = !p.memos[idx].folded;
            saveToDisk();
            renderMemos();
        };

        window.updateMData = (idx, k, v) => {
            getActiveProject().memos[idx][k] = v;
            saveToDisk();
        };

        function resetCurrentBoard() {
            if (confirm("현재 보드의 모든 컷을 삭제할까요?")) {
                pushState();
                document.getElementById('panelContainer').innerHTML = "";
                saveToDisk();
                updateStats();
            }
        }

        function filterCards() {
            const query = document.getElementById('boardSearch').value.toLowerCase();
            document.querySelectorAll('.card-unit').forEach(card => {
                const text = card.querySelector('.c-editor').innerText.toLowerCase();
                card.style.display = text.includes(query) ? "block" : "none";
            });
        }

        // 11. 저장 엔진
        function saveToDisk() {
            localStorage.setItem('dragon_sovereign_v19', JSON.stringify(storage));
        }

        window.exportDataWithDialog = function() {
            saveCurrentContentToState();
            const p = getActiveProject();
            const s = getActiveSlot();
            const fileName = `[${p.name}] ${s.title || 'Draft'}_${new Date().toLocaleDateString()}.json`;
            
            const blob = new Blob([JSON.stringify(storage)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click(); // 브라우저 설정에 따라 저장 위치 창이 뜹니다.
        };

        window.importFullData = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = re => {
                    storage = JSON.parse(re.target.result);
                    saveToDisk();
                    window.location.reload();
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        };

        // 12. 보조 함수
        function updateStats() {
            const all = document.querySelectorAll('.card-unit');
            all.forEach((n, i) => {
                const b = n.querySelector('.c-cut-badge');
                if (b) b.innerText = `Cut ${String(i + 1).padStart(2, '0')}`;
            });
            document.getElementById('statsDisplay').innerText = `${all.length} Cuts Sovereign`;
        }

        function applyHighlight(t) {
            return t.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, '<span class="hl-dialog">$&</span>')
                    .replace(/[\(\[][가-힣a-zA-Z\s]+[\)\]]/g, '<span class="hl-sfx">$&</span>');
        }

        window.executeAutoTabResize = function(i) {
            const c = document.createElement("canvas");
            const x = c.getContext("2d");
            x.font = window.getComputedStyle(i).font;
            i.style.width = (x.measureText(i.value).width + 40) + "px";
        };

        function applyGlobalHotkeys() {
            window.addEventListener('keydown', e => {
                if (e.ctrlKey && e.key === 'Enter') processScript('append');
                if (e.ctrlKey && e.key === 'z') { e.preventDefault(); performUndo(); }
                if (e.ctrlKey && e.key === 'y') { e.preventDefault(); performRedo(); }
            });
        }
        applyGlobalHotkeys();

    </script>
</body>
</html>
