<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>지혜의 용 | 워크스테이션 v1.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* [Pretendard 폰트 로드] */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { 
            background-color: #050505; 
            color: #e5e7eb; 
            font-family: 'Pretendard', sans-serif; 
            overflow: hidden; 
            margin: 0;
            padding: 0;
        }

        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* 카드 포커스 효과 */
        .card-focused { 
            border-color: #3b82f6 !important; 
            background: #0a0a0a !important; 
            box-shadow: 0 0 40px rgba(59,130,246,0.2); 
            transform: translateY(-2px);
        }

        /* 하이라이팅 */
        .hl-dialog { color: #60a5fa; font-weight: 700; text-shadow: 0 0 5px rgba(96,165,250,0.2); }
        .hl-sfx { color: #fbbf24; font-style: italic; }
        
        /* 탭 디자인 */
        .tab-active { 
            background-color: #0f172a !important; 
            color: #3b82f6 !important; 
            border-top: 3px solid #3b82f6; 
        }
        .tab-item { 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            white-space: nowrap; 
            min-width: 160px; 
            cursor: pointer;
        }
        
        /* [중요] 드래그 시각화 수정: 변색 방지를 위해 배경색과 투명도 명시적 관리 */
        .dragging { 
            opacity: 0.3 !important; 
            transform: scale(0.95); 
            border: 2px dashed #3b82f6 !important;
            background-color: #111 !important;
        }
        .drag-over { border-top: 5px solid #3b82f6 !important; }

        /* 에디터 설정 */
        [contenteditable]:focus { outline: none; background: rgba(30, 41, 59, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .memo-sidebar { 
            width: 360px; 
            border-left: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.4);
        }

/* 이미지 크게 보기 모달 스타일 */
.image-modal {
    display: none; 
    position: fixed; 
    z-index: 1000; 
    inset: 0; 
    background: rgba(0,0,0,0.9); 
    align-items: center; 
    justify-content: center; 
    cursor: zoom-out;
}
.image-modal img { 
    max-width: 90%; 
    max-height: 90%; 
    box-shadow: 0 0 50px rgba(0,0,0,0.5); 
    border-radius: 10px;
}

        
    </style>
</head>
<body class="h-screen flex flex-col" onclick="window.globalClearFocus()">

    <nav class="h-12 border-b border-white/10 flex items-center px-4 bg-black/80 shrink-0">
        <div class="flex items-center gap-2 mr-6 shrink-0">
            <span class="text-blue-600 font-black italic tracking-tighter text-lg select-none">SOVEREIGN v1.1</span>
        </div>
        
        <div id="projectTabContainer" class="flex h-full items-center overflow-x-auto no-scrollbar"></div>
        
        <button id="btnNewProject" class="ml-4 w-7 h-7 flex items-center justify-center bg-white/5 hover:bg-blue-600 rounded-full text-gray-400 transition-all active:scale-90">+</button>

        <div class="ml-auto flex items-center gap-4">
            <div class="flex items-center bg-white/5 rounded-xl px-3 border border-white/5">
                <span class="text-[9px] text-gray-600 uppercase font-black mr-2">Search</span>
                <input type="text" id="engineSearchInput" placeholder="컷 검색..." class="bg-transparent border-none outline-none text-xs p-2 w-40 text-gray-300">
            </div>
            <button id="btnSaveAs" class="text-[10px] font-black text-blue-500 hover:text-white uppercase tracking-widest border border-blue-900/40 px-4 py-2 rounded-xl">Save As</button>
            <button id="btnRestore" class="text-[10px] font-bold text-gray-600 hover:text-gray-200 uppercase tracking-widest">Restore</button>
        </div>
    </nav>

    <nav class="h-10 border-b border-white/5 flex items-center px-4 bg-[#070707] shrink-0">
        <div id="slotTabContainer" class="flex h-full items-center overflow-x-auto no-scrollbar"></div>
        <button id="btnNewSlot" class="ml-4 px-4 h-full text-gray-700 hover:text-white font-bold text-xl">+</button>
        
     <div class="ml-auto flex gap-6 items-center pr-2">
    <div class="flex gap-5 border-r border-white/10 pr-6">
        <button id="btnUndo" ...>Undo (Ctrl+Z)</button>
        <button id="btnRedo" ...>Redo (Ctrl+Y)</button>
    </div>
    
    <button onclick="window.executeSaveSlotOnly()" class="text-[10px] font-black text-yellow-600 hover:text-yellow-400 uppercase tracking-widest border border-yellow-900/30 px-3 py-1.5 rounded-lg transition-colors">Slot Save</button>
    <button onclick="window.executeImportToCurrentSlot()" class="text-[10px] font-black text-yellow-600 hover:text-yellow-400 uppercase tracking-widest border border-yellow-900/30 px-3 py-1.5 rounded-lg transition-colors">Slot Load</button>
<button onclick="window.executeCopyToNotion()" class="text-[10px] font-black text-blue-400 hover:text-white uppercase tracking-widest border border-blue-900/30 px-3 py-1.5 rounded-lg ml-1 transition-colors">Notion Copy</button>
    <button id="btnResetBoard" class="text-[10px] font-black text-red-900 hover:text-red-500 uppercase tracking-widest">Reset Board</button>
</div>
    </nav>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="w-80 flex flex-col border-r border-white/5 bg-black/20">
            <div class="h-1/2 flex flex-col border-b border-white/5">
                <div class="p-3 text-[9px] font-black text-gray-600 uppercase bg-white/5 flex justify-between items-center tracking-widest italic">
                    Original History
                    <button id="btnCopyRawLog" class="text-blue-700 hover:text-blue-400 font-bold text-[10px]">COPY</button>
                </div>
                <textarea id="originalLogView" class="flex-1 bg-transparent p-5 outline-none resize-none text-[11px] leading-relaxed text-gray-600 font-mono" readonly></textarea>
            </div>
            <div class="h-1/2 flex flex-col p-6 gap-4 bg-black/10">
                <div class="text-[9px] font-black text-blue-800 uppercase tracking-widest italic mb-1">Manuscript Input</div>
                <textarea id="mainSourceInput" class="flex-1 bg-white/5 rounded-3xl p-5 outline-none text-sm focus:ring-2 ring-blue-900/40 transition-all border border-white/5 placeholder-gray-800 text-gray-300" placeholder="새 원고 내용을 입력하세요..."></textarea>
                <div class="grid grid-cols-2 gap-3">
                    <button id="btnAppendManuscript" class="py-3.5 bg-blue-700 rounded-2xl text-[10px] font-black uppercase shadow-xl hover:bg-blue-600">맨 뒤 추가</button>
                    <button id="btnInsertManuscript" class="py-3.5 bg-yellow-600 text-black rounded-2xl text-[10px] font-black uppercase shadow-xl hover:bg-yellow-500">선택 컷 뒤 삽입</button>
                </div>
            </div>
        </section>

        <section class="flex-1 flex flex-col overflow-hidden bg-black/5 relative">
            <div class="p-12 pb-6 flex items-end gap-10 shrink-0 bg-transparent">
                <div class="flex-1">
                    <div class="text-[10px] font-bold text-blue-950 uppercase mb-3 tracking-[0.3em]">
                        <span id="displayProjectName">PROJECT</span> / <span id="displaySlotName">WORKPLACE</span>
                    </div>
                    <input type="text" id="activeBoardTitle" class="w-full bg-transparent text-5xl font-black outline-none tracking-tighter placeholder-gray-900 text-white" placeholder="회차 제목 입력...">
                </div>
                <div id="displayCutCount" class="text-[10px] font-mono text-blue-500 mb-2 px-5 py-2 border border-blue-900/20 rounded-full bg-blue-900/5 select-none">0 Cuts Secured</div>
            </div>
            <div id="manuscriptPanelContainer" class="flex-1 overflow-y-auto p-12 pt-6 space-y-16 no-scrollbar"></div>
        </section>

        <aside class="memo-sidebar p-6 shrink-0 flex flex-col gap-6">
            <div class="flex justify-between items-center border-b border-white/10 pb-5">
                <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Shared Memos</h4>
                <button id="btnNewProjectMemo" class="w-8 h-8 flex items-center justify-center bg-blue-700 rounded-full text-white font-bold shadow-2xl hover:bg-blue-600 transition-transform active:scale-90">+</button>
            </div>
            <div id="memoStackContainer" class="flex-1 overflow-y-auto no-scrollbar space-y-5"></div>
        </aside>
    </main>

    <script>
        // -----------------------------------------------------------------------------------------
        // [SOVEREIGN CORE] v1.1 - 언두 및 변색 수정 패치
        // -----------------------------------------------------------------------------------------
        
        window.sovereignDb = JSON.parse(localStorage.getItem('dragon_v1_sovereign_db')) || {
            projects: [],
            activeProjectId: null,
            activeSlotId: null
        };

        window.undoStack = [];
        window.redoStack = [];
        window.dragSourceId = null;
        window.dragSourceType = null;
        window.focusedCardNode = null;

        // [부팅]
        window.bootSovereign = function() {
            if (window.sovereignDb.projects.length === 0) {
                const pId = Date.now();
                const sId = pId + 100;
                window.sovereignDb.projects.push({
                    id: pId, name: "새 작품", order: 0, memos: [],
                    slots: [{ id: sId, title: '1화', original: '', cards: [], order: 0 }]
                });
                window.sovereignDb.activeProjectId = pId;
                window.sovereignDb.activeSlotId = sId;
                window.executeInternalDiskSave();
            }
            window.executeFullUIRenderCycle();
            window.bindSovereignListeners();
        };

        // [핵심 렌더링]
        window.executeFullUIRenderCycle = function() {
            window.renderProjectTabList();
            window.renderSlotTabList();
            window.renderProjectMemoStack();
            window.loadBoardFromMemory();
            
            const p = window.getSafeActiveProject();
            const s = window.getSafeActiveSlot();
            document.getElementById('displayProjectName').innerText = p ? p.name : "PROJECT";
            document.getElementById('displaySlotName').innerText = s ? (s.title || "WORKPLACE") : "WORKPLACE";
            window.recalculateStatsDisplay();
        };

        window.getSafeActiveProject = function() { return window.sovereignDb.projects.find(function(x) { return x.id === window.sovereignDb.activeProjectId; }); };
        window.getSafeActiveSlot = function() { 
            const proj = window.getSafeActiveProject();
            return proj ? proj.slots.find(function(x) { return x.id === window.sovereignDb.activeSlotId; }) : null; 
        };

        // [저장 및 캡처]
window.executeCurrentViewCapture = function() {
    const slot = window.getSafeActiveSlot();
    if (!slot) return;
    const collected = [];
    const nodes = document.querySelectorAll('.card-unit');
    for (let i = 0; i < nodes.length; i++) {
        const el = nodes[i];
        collected.push({
            id: parseFloat(el.dataset.dragId),
            text: el.querySelector('.c-editor').innerText,
            // [수정] 메모 입력창의 값 수집
            tags: Array.from(el.querySelectorAll('.memo-input-item')).map(function(inNode) { return inNode.value; }),
            images: Array.from(el.querySelectorAll('.asset-img-item img')).map(function(imgNode) { return imgNode.src; })
        });
    }
    slot.title = document.getElementById('activeBoardTitle').value;
    slot.original = document.getElementById('originalLogView').value;
    slot.cards = collected;
};

        window.executeInternalDiskSave = function() {
            localStorage.setItem('dragon_v1_sovereign_db', JSON.stringify(window.sovereignDb));
        };

        // [언두/리두 엔진: 수정됨]
        window.executeDeepSnapshot = function() {
            // 변화가 일어나기 전의 현재 뷰를 캡처하여 스택에 쌓습니다.
            window.executeCurrentViewCapture();
            window.undoStack.push(JSON.stringify(window.sovereignDb));
            if (window.undoStack.length > 80) window.undoStack.shift();
            window.redoStack = []; 
            console.log("Snapshot taken. Stack size:", window.undoStack.length);
        };

        window.executeUndoAction = function() {
            if (window.undoStack.length === 0) return;
            // 리두를 위해 현재 상태 보관
            window.executeCurrentViewCapture();
            window.redoStack.push(JSON.stringify(window.sovereignDb));
            // 복구
            window.sovereignDb = JSON.parse(window.undoStack.pop());
            window.executeInternalDiskSave();
            window.executeFullUIRenderCycle();
        };

        window.executeRedoAction = function() {
            if (window.redoStack.length === 0) return;
            window.executeCurrentViewCapture();
            window.undoStack.push(JSON.stringify(window.sovereignDb));
            window.sovereignDb = JSON.parse(window.redoStack.pop());
            window.executeInternalDiskSave();
            window.executeFullUIRenderCycle();
        };

        // [드래그 앤 드롭: 변색 수정됨]
        window.handleDragStartStep = function(e) {
            window.dragSourceId = parseFloat(this.dataset.dragId);
            window.dragSourceType = this.dataset.dragType;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        };

window.handleDragEndStep = function() {
            // [패치] 모든 컷과 메모에서 드래깅 상태를 강제 제거하여 검게 변하는 현상 방지
            // .card-unit(컷)과 [data-drag-type="memo"](메모)를 모두 선택합니다.
            const allItems = document.querySelectorAll('.card-unit, [data-drag-type="memo"]');
            
            for (let i = 0; i < allItems.length; i++) {
                allItems[i].classList.remove('dragging');
                allItems[i].style.opacity = "1"; // 투명도를 다시 100%로 (선명하게)
            }
            
            // 드래그 상태 정보 초기화
            window.dragSourceId = null;
            window.dragSourceType = null;
        };
      window.handleDropStep = function(e) {
    e.preventDefault();
    this.classList.remove('dragging');
    const targetIdVal = parseFloat(this.dataset.dragId);
    const targetTypeVal = this.dataset.dragType;

    // 타입이 다르거나 자기 자신일 경우 무시
    if (window.dragSourceType !== targetTypeVal || window.dragSourceId === targetIdVal) return;

    // 물리적 변화 전 스냅샷 (Undo용)
    window.executeDeepSnapshot();

    if (window.dragSourceType === 'project') {
        const sIdx = window.sovereignDb.projects.findIndex(x => x.id === window.dragSourceId);
        const tIdx = window.sovereignDb.projects.findIndex(x => x.id === targetIdVal);
        const [moved] = window.sovereignDb.projects.splice(sIdx, 1);
        window.sovereignDb.projects.splice(tIdx, 0, moved);
        window.sovereignDb.projects.forEach((p, i) => { p.order = i; });
        window.renderProjectTabList();
    } else if (window.dragSourceType === 'slot') {
        const activeP = window.getSafeActiveProject();
        const sIdx = activeP.slots.findIndex(x => x.id === window.dragSourceId);
        const tIdx = activeP.slots.findIndex(x => x.id === targetIdVal);
        const [moved] = activeP.slots.splice(sIdx, 1);
        activeP.slots.splice(tIdx, 0, moved);
        activeP.slots.forEach((s, i) => { s.order = i; });
        window.renderSlotTabList();
    } else if (window.dragSourceType === 'card') {
        const board = document.getElementById('manuscriptPanelContainer');
        const srcNode = board.querySelector(`[data-drag-id="${window.dragSourceId}"]`);
        const allNodes = Array.from(board.querySelectorAll('.card-unit'));
        const sIdx = allNodes.indexOf(srcNode);
        const tIdx = allNodes.indexOf(this);
        if (sIdx < tIdx) this.after(srcNode);
        else board.insertBefore(srcNode, this);
        
        window.executeCurrentViewCapture();
    } else if (window.dragSourceType === 'memo') { // <-- 여기서 꼬였던 괄호를 정리했습니다.
        const p = window.getSafeActiveProject();
        const sIdx = parseInt(window.dragSourceId);
        const tIdx = parseInt(this.dataset.dragId);

        if (sIdx !== tIdx) {
            window.executeDeepSnapshot();
            const [movedMemo] = p.memos.splice(sIdx, 1);
            p.memos.splice(tIdx, 0, movedMemo);
            window.renderProjectMemoStack();
        }
    }

    // 데이터 저장 및 통계 갱신
    window.executeInternalDiskSave();
    window.recalculateStatsDisplay();
};
        // [탭 엔진]
        window.renderProjectTabList = function() {
            const container = document.getElementById('projectTabContainer');
            container.innerHTML = "";
            window.sovereignDb.projects.sort(function(a, b) { return a.order - b.order; });

            for (let i = 0; i < window.sovereignDb.projects.length; i++) {
                const proj = window.sovereignDb.projects[i];
                const active = (window.sovereignDb.activeProjectId === proj.id);
                const tab = document.createElement('div');
                tab.className = "tab-item group flex items-center h-full px-6 border-r border-white/5 cursor-move " + (active ? 'tab-active' : 'text-gray-600 hover:bg-white/5');
                tab.draggable = true;
                tab.dataset.dragType = "project";
                tab.dataset.dragId = proj.id;

                tab.ondragstart = window.handleDragStartStep;
                tab.ondragend = window.handleDragEndStep;
                tab.ondragover = function(e) { e.preventDefault(); };
                tab.ondrop = window.handleDropStep;

                const input = document.createElement('input');
                input.value = proj.name;
                input.className = "bg-transparent border-none outline-none font-black text-[11px] cursor-text mr-4 text-inherit";
                input.oninput = function() { proj.name = this.value; window.executeAutoTabResize(this); window.executeInternalDiskSave(); };
                input.onclick = function(e) { e.stopPropagation(); };

                const del = document.createElement('button');
                del.innerHTML = "×";
                del.className = "opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 font-black text-sm";
                del.onclick = function(e) { e.stopPropagation(); window.executeKillProjectProcess(proj.id); };

                tab.onclick = function() { window.executeSwitchProject(proj.id); };
                tab.appendChild(input);
                tab.appendChild(del);
                container.appendChild(tab);
                window.executeAutoTabResize(input);
            }
        };

        window.executeSwitchProject = function(id) {
            if (window.sovereignDb.activeProjectId === id) return;
            window.executeCurrentViewCapture();
            window.sovereignDb.activeProjectId = id;
            window.sovereignDb.activeSlotId = window.getSafeActiveProject().slots[0].id;
            window.executeInternalDiskSave();
            window.executeFullUIRenderCycle();
        };

        window.renderSlotTabList = function() {
            const container = document.getElementById('slotTabContainer');
            container.innerHTML = "";
            const p = window.getSafeActiveProject();
            if (!p) return;
            p.slots.sort((a, b) => a.order - b.order);
            for (let i = 0; i < p.slots.length; i++) {
                const s = p.slots[i];
                const active = (window.sovereignDb.activeSlotId === s.id);
                const tab = document.createElement('div');
                tab.className = "tab-item group flex items-center h-full px-7 border-r border-white/5 cursor-move text-[10px] font-black tracking-widest " + (active ? 'bg-black text-blue-500 border-t-2 border-t-blue-700' : 'text-gray-700 hover:text-gray-400');
                tab.draggable = true;
                tab.dataset.dragType = "slot";
                tab.dataset.dragId = s.id;
                tab.ondragstart = window.handleDragStartStep;
                tab.ondragend = window.handleDragEndStep;
                tab.ondragover = (e) => e.preventDefault();
                tab.ondrop = window.handleDropStep;
                const span = document.createElement('span');
                span.innerText = s.title || 'WORKPLACE';
                const del = document.createElement('button');
                del.innerHTML = "×";
                del.className = "opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 font-black ml-4";
                del.onclick = (e) => { e.stopPropagation(); window.executeKillSlotProcess(s.id); };
                tab.onclick = () => window.executeSwitchSlot(s.id);
                tab.appendChild(span);
                tab.appendChild(del);
                container.appendChild(tab);
            }
        };

        window.executeSwitchSlot = function(id) {
            if (window.sovereignDb.activeSlotId === id) return;
            window.executeCurrentViewCapture();
            window.sovereignDb.activeSlotId = id;
            window.executeInternalDiskSave();
            window.executeFullUIRenderCycle();
        };

        // [에디터 및 컷 로직]
        window.loadBoardFromMemory = function() {
            const s = window.getSafeActiveSlot();
            if (!s) return;
            document.getElementById('activeBoardTitle').value = s.title || "";
            document.getElementById('originalLogView').value = s.original || "";
            const board = document.getElementById('manuscriptPanelContainer');
            board.innerHTML = "";
            for (let i = 0; i < s.cards.length; i++) {
                const c = s.cards[i];
                board.appendChild(window.createCardNodePhysical(c.id, c.text, c.tags, c.images));
            }
            window.recalculateStatsDisplay();
        };

window.createCardNodePhysical = function(id, text, memos, images) {
    const card = document.createElement('div');
    card.className = 'card-unit bg-[#0d0d0d] border border-white/5 rounded-[2.5rem] p-10 transition-all group relative cursor-move';
    card.dataset.dragId = id;
    card.dataset.dragType = "card";
    card.draggable = true;

    card.ondragstart = window.handleDragStartStep;
    card.ondragend = window.handleDragEndStep;
    card.ondragover = (e) => e.preventDefault();
    card.ondrop = window.handleDropStep;
    card.onclick = (e) => { e.stopPropagation(); window.globalFocusCardStep(card); };

    const top = document.createElement('div');
    top.className = "flex justify-between items-center mb-8 pointer-events-none";
    top.innerHTML = `<div class="flex items-center gap-4"><span class="text-blue-900 font-black text-sm opacity-30 select-none">☰</span><span class="text-[11px] font-black text-gray-700 uppercase tracking-[0.3em] c-cut-badge">Cut 00</span></div>`;
    
    const tools = document.createElement('div');
    tools.className = "flex gap-4 pointer-events-auto";
    
    // [수정] TAG -> MEMO로 변경
    const btnM = document.createElement('button');
    btnM.className = "text-[10px] font-black text-gray-600 hover:text-white uppercase";
    btnM.innerText = "+ MEMO"; btnM.onclick = () => window.executeAddCardMemoStep(card);
    
    
    tools.appendChild(btnM); 
    top.appendChild(tools); card.appendChild(top);

    const body = document.createElement('div');
    body.className = "flex gap-10";
    
    // [수정] 이미지 클릭 시 크게 보기(showFullImage) 연결
    const vault = document.createElement('div');
    vault.className = "card-img-vault-area w-36 grid grid-cols-2 gap-3 empty:hidden";
    if (images) {
        images.forEach(src => {
            const div = document.createElement('div');

        window.processManuscriptInput = function(mode) {
            const input = document.getElementById('mainSourceInput');
            const text = input.value.trim();
            if (!text) return;
            window.executeDeepSnapshot();
            const s = window.getSafeActiveSlot();
            s.original += `\n[${new Date().toLocaleTimeString()}] 추가:\n${text}\n`;
            document.getElementById('originalLogView').value = s.original;
            const lines = text.split(/(?<=[.!?])\s+/).filter(l => l.length > 0);
            const board = document.getElementById('manuscriptPanelContainer');
            lines.forEach(line => {
                const node = window.createCardNodePhysical(Date.now() + Math.random(), line, [], []);
                if (mode === 'insert' && window.focusedCardNode) window.focusedCardNode.after(node);
                else board.appendChild(node);
            });
            input.value = ""; window.executeInternalDiskSave(); window.recalculateStatsDisplay();
        };

        window.processMergeUp = function(card) {
            const prev = card.previousElementSibling;
            if (prev && prev.classList.contains('card-unit')) {
                window.executeDeepSnapshot();
                const tEd = prev.querySelector('.c-editor');
                const sEd = card.querySelector('.c-editor');
                tEd.innerText += " " + sEd.innerText;
                tEd.innerHTML = window.applySyntaxHighlightEngine(tEd.innerText);
                const sImgs = card.querySelectorAll('.asset-img-item');
                const tVault = prev.querySelector('.card-img-vault-area');
                for (let i = 0; i < sImgs.length; i++) { tVault.appendChild(sImgs[i]); }
                card.remove(); window.executeInternalDiskSave(); window.recalculateStatsDisplay();
            }
        };

        window.processSplit = function(card) {
            const ed = card.querySelector('.c-editor');
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            window.executeDeepSnapshot();
            const r = sel.getRangeAt(0);
            const extraR = document.createRange();
            extraR.setStart(r.endContainer, r.endOffset);
            extraR.setEnd(ed, ed.childNodes.length);
            const extraText = extraR.toString();
            extraR.deleteContents();
            ed.innerHTML = window.applySyntaxHighlightEngine(ed.innerText);
            card.after(window.createCardNodePhysical(Date.now(), extraText, [], []));
            window.executeInternalDiskSave(); window.recalculateStatsDisplay();
        };

        window.processKillCut = function(card) {

// [파일 및 공통 도구 - 로컬/웹 공용 지능형 전체 백업 엔진]
        window.executeSaveAsProcess = async function() {
            // 1. 저장 직전 현재 화면 상태를 완벽히 캡처
            window.executeCurrentViewCapture();
            
            // 2. 파일 추출 전, 현재 활성화된 프로젝트와 슬롯의 ID를 강제로 심어줍니다.
            // 이 처리가 되어야 집/노트북 간 복구 시 마지막 위치가 그대로 기억됩니다.
            const p = window.getSafeActiveProject();
            if (p) {
                window.sovereignDb.activeProjectId = window.sovereignDb.activeProjectId || p.id;
                const s = window.getSafeActiveSlot();
                if (s) {
                    window.sovereignDb.activeSlotId = window.sovereignDb.activeSlotId || s.id;
                }
            }
            
            const dataStr = JSON.stringify(window.sovereignDb, null, 2);
            const dateStr = new Date().toLocaleDateString().replace(/\. /g, '-').replace('.', '');
            const defaultName = `[${p ? p.name : '전체백업'}] Sovereign_${dateStr}.json`;

            // 3. 깃허브 등 웹 보안 환경(NotAllowedError)에 대응하는 안전망 작동
            try {
                if ('showSaveFilePicker' in window) {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: defaultName,
                        types: [{ description: 'JSON 백업 파일', accept: { 'application/json': ['.json'] } }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(dataStr);
                    await writable.close();
                    return; // 최신 창 띄우기 성공 시 여기서 종료
                }
            } catch (err) {
                console.warn("웹 환경 보안 정책으로 인해 저장창 API가 제한되었습니다. 예비 다운로드 방식으로 우회합니다.", err);
            }

            // 4. [웹용 예비 장치] 외부 서버 환경에서 막혔을 때 에러 없이 강제 파일 다운로드로 전환
            const blob = new Blob([dataStr], { type: 'application/json' });
            const a = document.createElement('a');
            a.download = defaultName;
            a.href = URL.createObjectURL(blob);
            a.click();
        };

// [단축키 엔진] 기존 1150라인 부근의 window.addEventListener('keydown', ...) 부분을 아래로 교체하세요.
window.addEventListener('keydown', function(e) {
    const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
    const ctrl = isMac ? e.metaKey : e.ctrlKey; // Mac은 Cmd, PC는 Ctrl 감지

    // 1. [Undo] Ctrl + Z
    if (ctrl && !e.shiftKey && e.key.toLowerCase() === 'z') {
        e.preventDefault(); // 브라우저 기본 텍스트 언두 방지 (우리 시스템 언두 실행을 위해)
        window.executeUndoAction();
    }

    // 2. [Redo] Ctrl + Y 또는 Ctrl + Shift + Z
    if ((ctrl && e.key.toLowerCase() === 'y') || (ctrl && e.shiftKey && e.key.toLowerCase() === 'z')) {
        e.preventDefault(); // 브라우저 기본 리두 방지
        window.executeRedoAction();
    }

    // 3. [원고 추가] Ctrl + Enter (작성 중인 원고를 즉시 컷으로 분할)
    if (ctrl && e.key === 'Enter') {
        e.preventDefault();
        window.processManuscriptInput('append');
    }

// 4. [저장] Ctrl + S (파일 저장 창 호출)
    if (ctrl && e.key.toLowerCase() === 's') {
        e.preventDefault();
        window.executeSaveAsProcess();
    }
});

// --- [개선] 전체 데이터 복구 및 마지막 작업 위치 지능형 정렬 엔진 ---
window.executeRestoreProcess = function() {
    const fileIn = document.createElement('input');
    fileIn.type = 'file';
    fileIn.accept = '.json';
    
    fileIn.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = JSON.parse(evt.target.result);
                
                if (!data.projects || data.projects.length === 0) {
                    alert("올바른 전체 백업 파일이 아닙니다. (슬롯 전용 파일인지 확인하세요)");
                    return;
                }
                
                if (confirm("기존 작업실의 모든 데이터가 사라지고 백업 파일로 교체됩니다. 진행할까요?")) {
                    window.executeDeepSnapshot(); 
                    
                    // 데이터 이식
                    window.sovereignDb = data;
                    
                    // [지능형 포인터 복원 메커니즘] 파일에 남겨진 마지막 프로젝트와 슬롯 추적
                    let targetProj = window.sovereignDb.projects.find(p => p.id === data.activeProjectId);
                    
                    if (targetProj) {
                        window.sovereignDb.activeProjectId = targetProj.id;
                        let targetSlot = targetProj.slots.find(s => s.id === data.activeSlotId);
                        if (targetSlot) {
                            window.sovereignDb.activeSlotId = targetSlot.id; // 마지막 작업 회차로 정확히 이동
                        } else if (targetProj.slots.length > 0) {
                            window.sovereignDb.activeSlotId = targetProj.slots[0].id; // 슬롯 유실 시 해당 프로젝트의 첫 화
                        }
                    } else {
                        // 정보가 꼬여있을 때만 첫 번째 안전 구역으로 착륙
                        if (window.sovereignDb.projects.length > 0) {
                            window.sovereignDb.activeProjectId = window.sovereignDb.projects[0].id;
                            if (window.sovereignDb.projects[0].slots.length > 0) {
                                window.sovereignDb.activeSlotId = window.sovereignDb.projects[0].slots[0].id;
                            }
                        }
                    }
                    
                    window.executeInternalDiskSave();
                    window.executeFullUIRenderCycle();
                    
                    if (typeof window.renderProjectMemoStack === 'function') {
                        window.renderProjectMemoStack();
                    }
                    alert("동기화 완료! 마지막으로 작업하시던 위치로 복구되었습니다.");
                }
            } catch (err) {
                alert("불러오기 실패: 데이터 구조가 손상되었거나 올바른 JSON이 아닙니다.\n" + err.message);
            }
        };
        reader.readAsText(file);
    };
    fileIn.click();
};

        reader.readAsText(file);
    };
    filePicker.click();

// 1. 작품(Project) 삭제 실제 기능
window.executeKillProjectProcess = function(id) {
    if (window.sovereignDb.projects.length <= 1) {
        alert("최소 하나의 작품은 남겨두어야 합니다.");
        return;
    }
    
    if (confirm("이 작품의 모든 워크플레이스와 원고가 영구 삭제됩니다. 정말 삭제할까요?")) {
        window.executeDeepSnapshot(); // 삭제 전 상태 저장 (언두 가능)
        
        // 데이터에서 해당 ID 삭제
        window.sovereignDb.projects = window.sovereignDb.projects.filter(function(p) { return p.id !== id; });
        
        // 현재 보고 있던 작품을 지웠다면 다른 작품으로 강제 이동
        if (window.sovereignDb.activeProjectId === id) {
            window.sovereignDb.activeProjectId = window.sovereignDb.projects[0].id;
            window.sovereignDb.activeSlotId = window.sovereignDb.projects[0].slots[0].id;
        }
        
        window.executeInternalDiskSave(); // 로컬 저장소 저장
        window.executeFullUIRenderCycle(); // 화면 새로고침
    }
};

// 2. 워크플레이스(Slot) 삭제 실제 기능
window.executeKillSlotProcess = function(id) {
    const p = window.getSafeActiveProject();
    if (!p) return;
    
    if (p.slots.length <= 1) {
        alert("최소 하나의 워크플레이스는 남겨두어야 합니다.");
        return;
    }
    
    if (confirm("이 슬롯의 원고가 모두 사라집니다. 정말 삭제할까요?")) {
        window.executeDeepSnapshot();
        
        p.slots = p.slots.filter(function(s) { return s.id !== id; });
        
        if (window.sovereignDb.activeSlotId === id) {
            window.sovereignDb.activeSlotId = p.slots[0].id;
        }
        
        window.executeInternalDiskSave();
        window.executeFullUIRenderCycle();
    }
};        
        // --- [IMAGE & MEMO 가동 엔진] ---

// 1. 메모 입력창 추가
window.executeAddCardMemoStep = function(card) {
    const area = card.querySelector('.card-memo-stack');
    const i = document.createElement('input');
    i.className = 'memo-input-item bg-transparent border-b border-white/10 text-[11px] text-yellow-600 outline-none w-full py-1 fade-in';
    i.placeholder = "참고 지문/메모 입력..."; 
    i.oninput = window.executeInternalDiskSave;
    area.appendChild(i); 
    i.focus();
};

// 2. 이미지 에셋 추가
window.executeAddCardImageStep = function(card) {
    const fileIn = document.createElement('input'); 
    fileIn.type = 'file'; 
    fileIn.accept = 'image/*';
    fileIn.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(re) {
            window.executeDeepSnapshot(); // 변경 전 스냅샷
            const vault = card.querySelector('.card-img-vault-area');
            const div = document.createElement('div');
            div.className = "asset-img-item relative w-full aspect-square bg-black rounded-2xl overflow-hidden border border-white/5 cursor-zoom-in fade-in";
            div.innerHTML = `<img src="${re.target.result}" class="w-full h-full object-cover" onclick="window.showFullImage('${re.target.result}')">
                             <button onclick="window.executeDeepSnapshot(); this.parentElement.remove(); window.executeInternalDiskSave()" class="absolute top-1 right-1 bg-red-600 text-[9px] p-1.5 font-black rounded-lg">×</button>`;
            vault.appendChild(div); 
            window.executeInternalDiskSave();
        };
        reader.readAsDataURL(file);
    };
    fileIn.click();
};

// 3. 이미지 크게 보기 모달 엔진
window.showFullImage = function(src) {
    let modal = document.getElementById('imgModal');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'imgModal';
        modal.className = 'image-modal';
        modal.onclick = () => modal.style.display = 'none';
        document.body.appendChild(modal);
    }
    modal.innerHTML = `<img src="${src}" class="fade-in">`;
    modal.style.display = 'flex';
};

// --- [노션 전용 '표' 데이터 복사 엔진] ---
window.executeCopyToNotion = function() {
    // 1. 현재 화면의 수정사항을 데이터로 동기화
    window.executeCurrentViewCapture();
    
    const slot = window.getSafeActiveSlot();
    if (!slot || !slot.cards || slot.cards.length === 0) {
        alert("복사할 원고가 없습니다.");
        return;
    }

    // 2. 표 헤더 생성 (번호 | 메모 | 원고 내용)
    let tableText = "| 컷 번호 | 지문 | 원고 내용 |\n";
    tableText += "| --- | --- | --- |\n";
    
    // 3. 각 컷을 표의 행(Row)으로 변환
    slot.cards.forEach((card, index) => {
        const cutNum = (index + 1).toString().padStart(2, '0');
        
        // 표 안에서 줄바꿈이 일어나면 행이 깨지므로, 엔터를 공백으로 치환합니다.
        const cleanText = card.text.replace(/\n/g, " ").trim();
        
        // 여러 개의 메모가 있을 경우 ' / ' 로 구분하여 한 칸에 넣습니다.
        const cleanMemos = (card.tags && card.tags.length > 0) 
            ? card.tags.filter(m => m.trim() !== "").join(" / ") 
            : "";
            
        tableText += `| ${cutNum} | ${cleanMemos}| ${cleanText} |\n`;
    });

    // 4. 클립보드 복사
    navigator.clipboard.writeText(tableText.trim()).then(() => {
        alert("노션 표 형식이 복사되었습니다!\n노션에서 붙여넣기(Ctrl+V) 하세요.");
    }).catch(err => {
        alert("복사 실패: " + err);
    });
};
// --- [클립보드 복사 엔진] ---
window.copyTextToClip = function(text) {
    if (!text) {
        alert("복사할 내용이 없습니다.");
        return;
    }

    // 1. 최신 브라우저 방식 (Clipboard API)
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => {
            console.log("복사 성공");
            // 성공 알림을 조용히 띄우고 싶다면 아래 주석을 해제하세요.
            // alert("복사되었습니다."); 
        }).catch(err => {
            console.error("복사 실패, 폴백 시도:", err);
            window.executeFallbackCopy(text);
        });
    } else {
        // 2. 구식 방식 (로컬 파일이나 보안 연결이 아닐 때)
        window.executeFallbackCopy(text);
    }
};

// 구식 복사 방식 (임시 텍스트 영역 생성)
window.executeFallbackCopy = function(text) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    
    // 화면 밖으로 숨기기
    textArea.style.position = "fixed";
    textArea.style.left = "-9999px";
    textArea.style.top = "0";
    
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();

    try {
        const successful = document.execCommand('copy');
        if (successful) console.log("폴백 복사 성공");
    } catch (err) {
        console.error("복사 최종 실패:", err);
    }

    document.body.removeChild(textArea);
};
