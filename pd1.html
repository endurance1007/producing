<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>지혜의 용 | 워크스테이션 v1.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* 폰트 및 기본 테마 설정 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { background-color: #050505; color: #e5e7eb; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        
        /* 스크롤바 정밀 디자인 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* 카드 포커스 효과 (작가님의 집중을 돕기 위한 은은한 발광) */
        .card-focused { border-color: #3b82f6 !important; background: #0a0a0a !important; box-shadow: 0 0 40px rgba(59,130,246,0.2); }
        
        /* 대사 및 효과음 하이라이팅 스타일 */
        .hl-dialog { color: #60a5fa; font-weight: 700; text-shadow: 0 0 5px rgba(96,165,250,0.2); }
        .hl-sfx { color: #fbbf24; font-style: italic; }
        
        /* 탭 디자인: 무한 생성을 고려한 넓은 너비와 가독성 중심 */
        .tab-active { background-color: #0f172a !important; color: #3b82f6 !important; border-top: 3px solid #3b82f6; }
        .tab-item { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap; min-width: 140px; }
        
        /* 드래그 앤 드롭 상태 시각화 */
        .dragging { opacity: 0.2 !important; transform: scale(0.95); }
        .drag-over { border-top: 5px solid #3b82f6 !important; }

        /* 에디터 미세 조정 */
        [contenteditable]:focus { outline: none; background: rgba(30, 41, 59, 0.25); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 메모 사이드바 전용 애니메이션 */
        .memo-sidebar { width: 340px; transition: width 0.3s ease-in-out; }
    </style>
</head>
<body class="h-screen flex flex-col" onclick="clearActiveFocusStep()">

    <nav class="h-12 border-b border-white/10 flex items-center px-4 bg-black/60 shrink-0">
        <div class="flex items-center gap-2 mr-6 shrink-0">
            <span class="text-blue-600 font-black italic tracking-tighter text-lg select-none">SOVEREIGN v1.0</span>
        </div>
        
        <div id="projectTabContainer" class="flex h-full items-center overflow-x-auto no-scrollbar">
            </div>
        
        <button onclick="executeCreateNewProject()" class="ml-4 w-7 h-7 flex items-center justify-center bg-white/5 hover:bg-blue-600 rounded-full text-gray-400 transition-all active:scale-90">+</button>

        <div class="ml-auto flex items-center gap-4">
            <div class="flex items-center bg-white/5 rounded-xl px-3 border border-white/5">
                <span class="text-[9px] text-gray-600 uppercase font-black mr-2 select-none">Search</span>
                <input type="text" id="engineSearchInput" placeholder="컷 대사 검색..." oninput="triggerSearchFilterEngine()" class="bg-transparent border-none outline-none text-xs p-2 w-40">
            </div>
            <button onclick="executeSaveAsDialog()" class="text-[10px] font-black text-blue-500 hover:text-white uppercase tracking-widest border border-blue-900/40 px-4 py-2 rounded-xl transition-colors">Save As</button>
            <button onclick="triggerImportFullBackup()" class="text-[10px] font-bold text-gray-600 hover:text-gray-200 uppercase tracking-widest">Restore</button>
        </div>
    </nav>

    <nav class="h-10 border-b border-white/5 flex items-center px-4 bg-[#080808] shrink-0">
        <div id="slotTabContainer" class="flex h-full items-center overflow-x-auto no-scrollbar">
            </div>
        <button onclick="executeCreateNewSlot()" class="ml-4 px-4 h-full text-gray-700 hover:text-white font-bold text-xl transition-colors">+</button>
        
        <div class="ml-auto flex gap-6 items-center pr-2">
            <div class="flex gap-4 border-r border-white/10 pr-6">
                <button onclick="executeUndoStep()" class="text-[10px] font-black text-gray-600 hover:text-yellow-500 uppercase tracking-widest transition-colors">Undo (Ctrl+Z)</button>
                <button onclick="executeRedoStep()" class="text-[10px] font-black text-gray-600 hover:text-yellow-500 uppercase tracking-widest transition-colors">Redo (Ctrl+Y)</button>
            </div>
            <button onclick="executeBoardClearProcess()" class="text-[10px] font-black text-red-900 hover:text-red-500 uppercase tracking-widest">Reset Board</button>
        </div>
    </nav>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="w-80 flex flex-col border-r border-white/5 bg-black/20">
            <div class="h-1/2 flex flex-col border-b border-white/5">
                <div class="p-3 text-[9px] font-black text-gray-600 uppercase bg-white/5 flex justify-between items-center tracking-widest italic">
                    Original Log History
                    <button onclick="copyRawLogToClipboard()" class="text-blue-600 hover:text-blue-400 font-bold">COPY</button>
                </div>
                <textarea id="originalLogView" class="flex-1 bg-transparent p-5 outline-none resize-none text-[11px] leading-relaxed text-gray-600" readonly></textarea>
            </div>
            <div class="h-1/2 flex flex-col p-6 gap-4 bg-black/10">
                <div class="text-[9px] font-black text-blue-700 uppercase tracking-widest mb-1">Active Manuscript Input</div>
                <textarea id="mainSourceInput" class="flex-1 bg-white/5 rounded-3xl p-5 outline-none text-sm focus:ring-2 ring-blue-900/50 transition-all border border-white/5 placeholder-gray-800" placeholder="여기에 새 원고 내용을 입력하고 분할 명령을 내리세요..."></textarea>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="executeManuscriptSplitProcess('append')" class="py-3.5 bg-blue-700 rounded-2xl text-[10px] font-black uppercase shadow-xl hover:bg-blue-600 transition-all">맨 뒤에 추가</button>
                    <button onclick="executeManuscriptSplitProcess('insert')" class="py-3.5 bg-yellow-600 text-black rounded-2xl text-[10px] font-black uppercase shadow-xl hover:bg-yellow-500 transition-all">선택 컷 뒤 삽입</button>
                </div>
            </div>
        </section>

        <section class="flex-1 flex flex-col overflow-hidden bg-black/5 relative">
            <div class="p-12 pb-6 flex items-end gap-10 shrink-0 bg-transparent">
                <div class="flex-1">
                    <div class="text-[10px] font-bold text-blue-950 uppercase mb-3 tracking-[0.2em]">
                        <span id="breadcrumbProject">PROJECT NAME</span> / <span id="breadcrumbSlot">CURRENT WORKPLACE</span>
                    </div>
                    <input type="text" id="activeBoardTitle" class="w-full bg-transparent text-5xl font-black outline-none tracking-tighter placeholder-gray-900 text-white" placeholder="회차 제목을 입력하세요..." oninput="syncActiveTitleToTabEngine()">
                </div>
                <div id="globalCutCountArea" class="text-[10px] font-mono text-blue-500 mb-2 px-5 py-2 border border-blue-900/20 rounded-full bg-blue-900/5 select-none">0 Cuts Sovereign Protected</div>
            </div>
            <div id="manuscriptPanelContainer" class="flex-1 overflow-y-auto p-12 pt-6 space-y-16 no-scrollbar">
                </div>
        </section>

        <aside class="memo-sidebar border-l border-white/5 bg-black/40 p-6 shrink-0 flex flex-col gap-6">
            <div class="flex justify-between items-center border-b border-white/10 pb-5">
                <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Shared World Memos</h4>
                <button onclick="executeAddNewProjectMemo()" class="w-8 h-8 flex items-center justify-center bg-blue-700 rounded-full text-white font-bold shadow-2xl hover:bg-blue-600 transition-transform active:scale-90">+</button>
            </div>
            <div id="memoStackContainer" class="flex-1 overflow-y-auto no-scrollbar space-y-5">
                </div>
        </aside>
    </main>

    <script>
        // -----------------------------------------------------------------------------------------
        // [CORE SCRIPT] Sovereign v1.0 - 정직한 무결성 엔진
        // -----------------------------------------------------------------------------------------
        
        // --- 1. 시스템 전역 데이터 상태 (JSON 기반) ---
        let sovereignDb = JSON.parse(localStorage.getItem('dragon_v1_sovereign_db')) || {
            projects: [],
            activeProjectId: null,
            activeSlotId: null
        };

        // --- 2. 언두/리두 및 드래그 전역 변수 ---
        let sovereignUndoStack = [];
        let sovereignRedoStack = [];
        let currentDragSourceId = null;
        let currentDragSourceType = null; // 'project', 'slot', 'card'
        let focusedCardElement = null;

        // --- 3. 초기화 가동 엔진 (Startup Sequence) ---
        window.onload = function() {
            console.log("v1.0 무결성 시스템 초기화 중...");
            
            // 최초 접속 시 기본 구조 강제 형성
            if (sovereignDb.projects.length === 0) {
                const initProjectId = Date.now();
                const initSlotId = initProjectId + 100;
                sovereignDb.projects.push({
                    id: initProjectId,
                    name: "새 작품",
                    order: 0,
                    memos: [{ title: '세계관 및 설정', content: '', folded: false }],
                    slots: [{ id: initSlotId, title: '1화', original: '', cards: [], order: 0 }]
                });
                sovereignDb.activeProjectId = initProjectId;
                sovereignDb.activeSlotId = initSlotId;
                executeSovereignSave();
            }
            
            executeFullUIRefreshEngine();
        };

        // --- 4. UI 갱신 엔진 (The Restoration Cycle) ---
        // 탭 전환 시 데이터 오염을 막기 위해 모든 렌더링 전에 현재 상태를 완벽히 저장합니다.
        function executeFullUIRefreshEngine() {
            renderProjectTabsList();
            renderSlotTabsList();
            renderSharedMemosArea();
            loadBoardContentFromData();
            
            // 브레드크럼 및 상태 정보 업데이트
            const p = getActiveProjectData();
            const s = getActiveSlotData();
            document.getElementById('breadcrumbProject').innerText = p ? p.name : "PROJECT";
            document.getElementById('breadcrumbSlot').innerText = s ? (s.title || "WORKPLACE") : "WORKPLACE";
            
            recalculateCutStatistics();
        }

        function getActiveProjectData() { 
            return sovereignDb.projects.find(function(x) { return x.id === sovereignDb.activeProjectId; }); 
        }

        function getActiveSlotData() { 
            const proj = getActiveProjectData();
            return proj ? proj.slots.find(function(x) { return x.id === sovereignDb.activeSlotId; }) : null; 
        }

        // --- 5. 프로젝트 탭 제어 (드래그앤드롭 포함) ---
        function renderProjectTabsList() {
            const listArea = document.getElementById('projectTabContainer');
            listArea.innerHTML = "";
            sovereignDb.projects.sort(function(a, b) { return a.order - b.order; });

            sovereignDb.projects.forEach(function(proj) {
                const isThisActive = (sovereignDb.activeProjectId === proj.id);
                const tabDiv = document.createElement('div');
                tabDiv.className = `tab-item group flex items-center h-full px-6 border-r border-white/5 cursor-move ${isThisActive ? 'tab-active' : 'text-gray-600 hover:bg-white/5'}`;
                tabDiv.draggable = true;
                tabDiv.dataset.dragType = "project";
                tabDiv.dataset.dragId = proj.id;

                // 드래그 이벤트 명시적 바인딩
                tabDiv.ondragstart = handleGlobalDragStartStep;
                tabDiv.ondragover = function(e) { e.preventDefault(); };
                tabDiv.ondrop = handleGlobalDropStep;

                // 타이틀 입력 (가변 너비 적용)
                const titleInput = document.createElement('input');
                titleInput.value = proj.name;
                titleInput.className = "bg-transparent border-none outline-none font-black text-[11px] cursor-text mr-4";
                titleInput.oninput = function() {
                    proj.name = this.value;
                    window.executeAutoTabResize(this);
                    executeSovereignSave();
                };
                titleInput.onclick = function(e) { e.stopPropagation(); };

                // 작품 삭제 버튼
                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = "×";
                deleteBtn.className = "opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 font-black transition-opacity text-sm";
                deleteBtn.onclick = function(e) { 
                    e.stopPropagation(); 
                    executeKillProjectProcess(proj.id); 
                };

                tabDiv.onclick = function() { executeSwitchProjectStep(proj.id); };
                tabDiv.appendChild(titleInput);
                tabDiv.appendChild(deleteBtn);
                listArea.appendChild(tabDiv);
                
                window.executeAutoTabResize(titleInput);
            });
        }

        function executeSwitchProjectStep(targetId) {
            if (sovereignDb.activeProjectId === targetId) return;
            
            // [중요] 전환 전 현재 작업 데이터 완전 격리 저장
            executeCurrentViewCapture(); 
            
            sovereignDb.activeProjectId = targetId;
            const targetP = getActiveProjectData();
            // 해당 작품의 첫 번째 슬롯을 자동으로 선택
            sovereignDb.activeSlotId = targetP.slots[0].id;
            
            executeSovereignSave();
            executeFullUIRefreshEngine();
        }

        function executeKillProjectProcess(id) {
            if (sovereignDb.projects.length <= 1) {
                alert("최소 하나의 작품은 유지되어야 합니다.");
                return;
            }
            if (confirm("이 작품을 삭제하면 포함된 모든 슬롯과 메모가 즉시 소멸합니다. 진행하시겠습니까?")) {
                executeSovereignSnapshot(); // 언두 스택 확보
                sovereignDb.projects = sovereignDb.projects.filter(function(x) { return x.id !== id; });
                if (sovereignDb.activeProjectId === id) {
                    sovereignDb.activeProjectId = sovereignDb.projects[0].id;
                    sovereignDb.activeSlotId = sovereignDb.projects[0].slots[0].id;
                }
                executeSovereignSave();
                executeFullUIRefreshEngine();
            }
        }

        // --- 6. 워크플레이스 슬롯 탭 제어 ---
        function renderSlotTabsList() {
            const container = document.getElementById('slotTabContainer');
            container.innerHTML = "";
            const currentP = getActiveProjectData();
            if (!currentP) return;

            currentP.slots.sort(function(a, b) { return a.order - b.order; });

            currentP.slots.forEach(function(slot) {
                const isThisActive = (sovereignDb.activeSlotId === slot.id);
                const tab = document.createElement('div');
                tab.className = `tab-item group flex items-center h-full px-7 border-r border-white/5 cursor-move text-[10px] font-black tracking-widest ${isThisActive ? 'bg-black text-blue-500 border-t-2 border-t-blue-700' : 'text-gray-700 hover:text-gray-400'}`;
                tab.draggable = true;
                tab.dataset.dragType = "slot";
                tab.dataset.dragId = slot.id;

                tab.ondragstart = handleGlobalDragStartStep;
                tab.ondragover = function(e) { e.preventDefault(); };
                tab.ondrop = handleGlobalDropStep;

                tab.innerHTML = `
                    <span class="mr-4">${slot.title || 'WORKPLACE'}</span>
                    <button onclick="event.stopPropagation(); executeKillSlotProcess(${slot.id})" class="opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 font-black transition-opacity">×</button>
                `;
                
                tab.onclick = function() { executeSwitchSlotStep(slot.id); };
                container.appendChild(tab);
            });
        }

        function executeSwitchSlotStep(targetId) {
            if (sovereignDb.activeSlotId === targetId) return;
            
            // [중요] 전환 전 현재 슬롯 데이터 안전하게 캡처
            executeCurrentViewCapture();
            
            sovereignDb.activeSlotId = targetId;
            executeSovereignSave();
            executeFullUIRefreshEngine();
        }

        function executeCreateNewSlot() {
            const p = getActiveProjectData();
            const newSlotId = Date.now();
            executeCurrentViewCapture(); // 현재 데이터 보호
            
            p.slots.push({ 
                id: newSlotId, 
                title: (p.slots.length + 1) + '화', 
                original: '', 
                cards: [], 
                order: p.slots.length 
            });
            sovereignDb.activeSlotId = newSlotId;
            
            executeSovereignSave();
            executeFullUIRefreshEngine();
        }

        function executeKillSlotProcess(id) {
            const p = getActiveProjectData();
            if (p.slots.length <= 1) {
                alert("작품 내 최소 하나의 워크플레이스는 유지되어야 합니다.");
                return;
            }
            if (confirm("이 슬롯의 모든 원고가 삭제됩니다. 계속하시겠습니까?")) {
                executeSovereignSnapshot();
                p.slots = p.slots.filter(function(x) { return x.id !== id; });
                if (sovereignDb.activeSlotId === id) {
                    sovereignDb.activeSlotId = p.slots[0].id;
                }
                executeSovereignSave();
                executeFullUIRefreshEngine();
            }
        }

        // --- 7. 에디터 엔진: 컷 생성 및 부활 (Rebirth Logic) ---
        function loadBoardContentFromData() {
            const s = getActiveSlotData();
            if (!s) return;
            
            document.getElementById('activeBoardTitle').value = s.title || "";
            document.getElementById('originalLogView').value = s.original || "";
            
            const boardArea = document.getElementById('manuscriptPanelContainer');
            boardArea.innerHTML = "";
            
            // 데이터로부터 컷 생성 및 물리적 배치
            s.cards.forEach(function(cardData) {
                const node = createManuscriptCutNode(cardData.id, cardData.text, cardData.tags, cardData.images);
                boardArea.appendChild(node);
            });
            
            recalculateCutStatistics();
        }

        function executeCurrentViewCapture() {
            const activeS = getActiveSlotData();
            if (!activeS) return;
            
            const collectedCards = [];
            const cardNodes = document.querySelectorAll('.card-unit');
            
            cardNodes.forEach(function(node) {
                collectedCards.push({
                    id: parseFloat(node.dataset.dragId),
                    text: node.querySelector('.c-editor').innerText,
                    tags: Array.from(node.querySelectorAll('.tag-input-item')).map(function(i) { return i.value; }),
                    images: Array.from(node.querySelectorAll('.asset-img-item img')).map(function(img) { return img.src; })
                });
            });
            
            activeS.title = document.getElementById('activeBoardTitle').value;
            activeS.original = document.getElementById('originalLogView').value;
            activeS.cards = collectedCards;
        }

        // 컷 노드 생성 함수: 모든 기능을 직접 주입하여 '먹통' 방지
        function createManuscriptCutNode(uniqueId, contentText, tagArray = [], imageArray = []) {
            const cardFrame = document.createElement('div');
            cardFrame.className = 'card-unit bg-[#0d0d0d] border border-white/5 rounded-[2.5rem] p-10 transition-all group relative cursor-move';
            cardFrame.dataset.dragId = uniqueId;
            cardFrame.dataset.dragType = "card";
            cardFrame.draggable = true;

            // 드래그앤드롭 이벤트 주입
            cardFrame.ondragstart = handleGlobalDragStartStep;
            cardFrame.ondragover = function(e) { e.preventDefault(); };
            cardFrame.ondrop = handleGlobalDropStep;
            
            cardFrame.onclick = function(e) { 
                e.stopPropagation(); 
                executeCardFocusSequence(cardFrame); 
            };

            let tagHtmlList = "";
            tagArray.forEach(function(t) {
                tagHtmlList += `<input class="tag-input-item bg-transparent border-b border-white/10 text-[11px] text-blue-500 outline-none w-28 mr-3" value="${t}" oninput="executeSovereignSave()">`;
            });

            let imageHtmlList = "";
            imageArray.forEach(function(src) {
                imageHtmlList += `<div class="asset-img-item relative w-full aspect-square bg-black rounded-2xl overflow-hidden border border-white/5">
                    <img src="${src}" class="w-full h-full object-cover">
                    <button onclick="executeSovereignSnapshot(); this.parentElement.remove(); executeSovereignSave()" class="absolute top-1 right-1 bg-red-600 text-[9px] p-1.5 font-black rounded-lg">×</button>
                </div>`;
            });

            cardFrame.innerHTML = `
                <div class="flex justify-between items-center mb-8 pointer-events-none">
                    <div class="flex items-center gap-4">
                        <span class="text-blue-900 font-black text-sm opacity-30 select-none">☰</span>
                        <span class="text-[11px] font-black text-gray-700 uppercase tracking-[0.3em] c-cut-badge">Cut 00</span>
                    </div>
                    <div class="flex gap-4 pointer-events-auto">
                        <button onclick="executeAddCardTagStep(this)" class="text-[10px] font-black text-gray-600 hover:text-white uppercase transition-colors">+ TAG</button>
                        <button onclick="executeAddCardImageAsset(this)" class="text-[10px] font-black text-gray-600 hover:text-white uppercase transition-colors">+ IMAGE</button>
                    </div>
                </div>
                <div class="flex gap-10">
                    <div class="card-img-vault-area w-36 grid grid-cols-2 gap-3 empty:hidden">${imageHtmlList}</div>
                    <div class="flex-1 space-y-6">
                        <div class="card-tag-stack flex flex-wrap gap-2">${tagHtmlList}</div>
                        <div class="c-editor text-[18px] leading-[1.8] text-gray-300 outline-none min-h-[1.5em] tracking-tight" contenteditable="true" onblur="executeSovereignSave()">${applyDialogueSyntaxHighlight(contentText)}</div>
                        <div class="flex gap-8 pt-8 border-t border-white/5 opacity-30 group-hover:opacity-100 transition-opacity">
                            <button onclick="executeCopyCutContent(this)" class="text-[11px] font-black text-blue-600 hover:text-blue-400 uppercase tracking-widest">📋 Copy</button>
                            <button onclick="executeMergeWithAboveCut(this)" class="text-[11px] font-black text-gray-600 hover:text-white uppercase tracking-widest">Merge Up</button>
                            <button onclick="executeSplitCutAtCursor(this)" class="text-[11px] font-black text-gray-600 hover:text-white uppercase tracking-widest">Split</button>
                            <button onclick="executeKillCutProcess(this)" class="text-[11px] font-black text-red-900 hover:text-red-600 uppercase tracking-widest ml-auto">Delete</button>
                        </div>
                    </div>
                </div>
            `;
            return cardFrame;
        }

        // --- 8. 원고 처리 엔진 (Split & Logic) ---
        function executeManuscriptSplitProcess(mode) {
            const inputArea = document.getElementById('mainSourceInput');
            const textValue = inputArea.value.trim();
            if (!textValue) return;

            executeSovereignSnapshot(); // 언두 스택 저장
            const activeS = getActiveSlotData();
            
            const timeHeader = `\n[${new Date().toLocaleTimeString()}] 신규 원고 진입:\n${textValue}\n`;
            activeS.original += timeHeader;
            document.getElementById('originalLogView').value = activeS.original;

            // 정밀 문장 부호 분할 엔진 ( . ! ? 기준 )
            const linesArray = textValue.split(/(?<=[.!?])\s+/).filter(function(l) { return l.length > 0; });
            const board = document.getElementById('manuscriptPanelContainer');

            linesArray.forEach(function(sentence) {
                const randomId = Date.now() + Math.random();
                const node = createManuscriptCutNode(randomId, sentence);
                if (mode === 'insert' && focusedCardElement) {
                    focusedCardElement.after(node);
                } else {
                    board.appendChild(node);
                }
            });

            inputArea.value = "";
            executeSovereignSave();
            recalculateCutStatistics();
        }

        function executeMergeWithAboveCut(btn) {
            const currentCard = btn.closest('.card-unit');
            const targetAboveCard = currentCard.previousElementSibling;
            
            if (targetAboveCard && targetAboveCard.classList.contains('card-unit')) {
                executeSovereignSnapshot();
                const targetEditor = targetAboveCard.querySelector('.c-editor');
                const sourceEditor = currentCard.querySelector('.c-editor');
                
                targetEditor.innerText += " " + sourceEditor.innerText;
                targetEditor.innerHTML = applyDialogueSyntaxHighlight(targetEditor.innerText);
                
                // 이미지 에셋 합치기
                currentCard.querySelectorAll('.card-img-vault-area > div').forEach(function(div) {
                    targetAboveCard.querySelector('.card-img-vault-area').appendChild(div);
                });
                
                currentCard.remove();
                executeSovereignSave();
                recalculateCutStatistics();
            }
        }

        function executeSplitCutAtCursor(btn) {
            const currentCard = btn.closest('.card-unit');
            const editorNode = currentCard.querySelector('.c-editor');
            const selectionInstance = window.getSelection();
            if (!selectionInstance.rangeCount) return;
            
            executeSovereignSnapshot();
            const rangeObj = selectionInstance.getRangeAt(0);
            const extraRange = document.createRange();
            extraRange.setStart(rangeObj.endContainer, rangeObj.endOffset);
            extraRange.setEnd(editorNode, editorNode.childNodes.length);
            
            const extraContentText = extraRange.toString();
            extraRange.deleteContents();
            editorNode.innerHTML = applyDialogueSyntaxHighlight(editorNode.innerText);
            
            const newNode = createManuscriptCutNode(Date.now(), extraContentText);
            currentCard.after(newNode);
            
            executeSovereignSave();
            recalculateCutStatistics();
        }

        function executeKillCutProcess(btn) {
            if (confirm("이 컷을 영구히 삭제하시겠습니까? (Undo 가능)")) {
                executeSovereignSnapshot();
                btn.closest('.card-unit').remove();
                executeSovereignSave();
                recalculateCutStatistics();
            }
        }

        // --- 9. 드래그 앤 드롭 통합 핸들러 (PC 전용 물리적 정렬) ---
        function handleGlobalDragStartStep(event) {
            currentDragSourceId = parseFloat(this.dataset.dragId);
            currentDragSourceType = this.dataset.dragType;
            this.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
        }

        function handleGlobalDropStep(event) {
            event.preventDefault();
            this.classList.remove('dragging');
            const targetIdVal = parseFloat(this.dataset.dragId);
            const targetTypeVal = this.dataset.dragType;

            if (currentDragSourceType !== targetTypeVal || currentDragSourceId === targetIdVal) return;

            executeSovereignSnapshot(); // 순서 변경 전 상태 저장

            if (currentDragSourceType === 'project') {
                const sIdx = sovereignDb.projects.findIndex(function(x) { return x.id === currentDragSourceId; });
                const tIdx = sovereignDb.projects.findIndex(function(x) { return x.id === targetIdVal; });
                const [movedProj] = sovereignDb.projects.splice(sIdx, 1);
                sovereignDb.projects.splice(tIdx, 0, movedProj);
                // 물리적 order 속성 재정의
                sovereignDb.projects.forEach(function(p, i) { p.order = i; });
                renderProjectTabsList();
            } else if (currentDragSourceType === 'slot') {
                const activeP = getActiveProjectData();
                const sIdx = activeP.slots.findIndex(function(x) { return x.id === currentDragSourceId; });
                const tIdx = activeP.slots.findIndex(function(x) { return x.id === targetIdVal; });
                const [movedSlot] = activeP.slots.splice(sIdx, 1);
                activeP.slots.splice(tIdx, 0, movedSlot);
                activeP.slots.forEach(function(s, i) { s.order = i; });
                renderSlotTabsList();
            } else if (currentDragSourceType === 'card') {
                const boardParent = document.getElementById('manuscriptPanelContainer');
                const srcNodeEl = boardParent.querySelector(`[data-drag-id="${currentDragSourceId}"]`);
                const allNodesArr = Array.from(boardParent.querySelectorAll('.card-unit'));
                const sIdx = allNodesArr.indexOf(srcNodeEl);
                const tIdx = allNodesArr.indexOf(this);
                if (sIdx < tIdx) this.after(srcNodeEl);
                else boardParent.insertBefore(srcNodeEl, this);
            }
            
            executeSovereignSave();
            recalculateCutStatistics();
        }

        // --- 10. 공유 메모 엔진 (Project-wide Memos) ---
        function renderSharedMemosArea() {
            const stackArea = document.getElementById('memoStackContainer');
            stackArea.innerHTML = "";
            const currentP = getActiveProjectData();
            if (!currentP || !currentP.memos) return;

            currentP.memos.forEach(function(memo, idx) {
                const memoDiv = document.createElement('div');
                memoDiv.className = "bg-white/5 border border-white/10 rounded-3xl overflow-hidden shadow-lg transition-all hover:border-white/20";
                memoDiv.innerHTML = `
                    <div class="flex items-center justify-between p-5 bg-white/5 cursor-pointer" onclick="executeToggleMemoFold(${idx})">
                        <input value="${memo.title}" class="bg-transparent border-none outline-none font-black text-[11px] text-blue-500 w-full" 
                               oninput="executeSyncMemoData(${idx}, 'title', this.value)" onclick="event.stopPropagation()">
                        <button onclick="event.stopPropagation(); executeKillProjectMemoStep(${idx})" class="text-red-900 font-black ml-3 active:scale-125 transition-transform">×</button>
                    </div>
                    <div class="p-5 ${memo.folded ? 'hidden' : ''}">
                        <textarea class="w-full bg-transparent text-[11px] text-gray-500 outline-none h-48 leading-relaxed resize-none" 
                                  oninput="executeSyncMemoData(${idx}, 'content', this.value)" placeholder="설정 내용을 기록하세요...">${memo.content}</textarea>
                    </div>
                `;
                stackArea.appendChild(memoDiv);
            });
        }

        function executeAddNewProjectMemo() {
            const p = getActiveProjectData();
            if (!p.memos) p.memos = [];
            p.memos.unshift({ title: '신규 설정 항목', content: '', folded: false });
            executeSovereignSave();
            renderSharedMemosArea();
        }

        window.executeSyncMemoData = function(index, key, val) {
            const p = getActiveProjectData();
            p.memos[index][key] = val;
            executeSovereignSave();
        };

        window.executeToggleMemoFold = function(index) {
            const p = getActiveProjectData();
            p.memos[index].folded = !p.memos[index].folded;
            executeSovereignSave();
            renderSharedMemosArea();
        };

        window.executeKillProjectMemoStep = function(index) {
            if (confirm("이 메모 항목을 삭제하시겠습니까?")) {
                const p = getActiveProjectData();
                p.memos.splice(index, 1);
                executeSovereignSave();
                renderSharedMemosArea();
            }
        };

        // --- 11. 저장 및 데이터 관리 엔진 (The Sovereign Disk) ---
        function executeSovereignSave() {
            // [중요] 저장 시점에 화면의 컷 상태를 데이터에 강제 동기화
            const currentS = getActiveSlotData();
            if (currentS) {
                const cardsArr = [];
                document.querySelectorAll('.card-unit').forEach(function(node) {
                    cardsArr.push({
                        id: parseFloat(node.dataset.dragId),
                        text: node.querySelector('.c-editor').innerText,
                        tags: Array.from(node.querySelectorAll('.tag-input-item')).map(function(i) { return i.value; }),
                        images: Array.from(node.querySelectorAll('.asset-img-item img')).map(function(img) { return img.src; })
                    });
                });
                currentS.cards = cardsArr;
                currentS.title = document.getElementById('activeBoardTitle').value;
                currentS.original = document.getElementById('originalLogView').value;
            }
            
            localStorage.setItem('dragon_v1_sovereign_db', JSON.stringify(sovereignDb));
        }

        window.syncActiveTitleToTabEngine = function() {
            const newTitle = document.getElementById('activeBoardTitle').value;
            const s = getActiveSlotData();
            s.title = newTitle;
            document.getElementById('breadcrumbSlot').innerText = newTitle || "WORKPLACE";
            renderSlotTabsList(); // 상단 탭 제목 즉시 동기화
            executeSovereignSave();
        };

        // --- 12. 언두/리두 엔진 (Deep Snapshot) ---
        function executeSovereignSnapshot() {
            executeCurrentViewCapture();
            sovereignUndoStack.push(JSON.stringify(sovereignDb));
            if (sovereignUndoStack.length > MAX_HISTORY_LIMIT) sovereignUndoStack.shift();
            sovereignRedoStack = []; // 새로운 액션 발생 시 리두 스택 초기화
        }

        window.executeUndoStep = function() {
            if (sovereignUndoStack.length === 0) return;
            executeCurrentViewCapture();
            sovereignRedoStack.push(JSON.stringify(sovereignDb));
            sovereignDb = JSON.parse(sovereignUndoStack.pop());
            executeSovereignSave();
            executeFullUIRefreshEngine();
        };

        window.executeRedoStep = function() {
            if (sovereignRedoStack.length === 0) return;
            executeCurrentViewCapture();
            sovereignUndoStack.push(JSON.stringify(sovereignDb));
            sovereignDb = JSON.parse(sovereignRedoStack.pop());
            executeSovereignSave();
            executeFullUIRefreshEngine();
        };

        // --- 13. 파일 시스템 제어 (Save As & Restore) ---
        window.executeSaveAsDialog = async function() {
            executeCurrentViewCapture();
            const p = getActiveProjectData();
            const s = getActiveSlotData();
            const suggestedName = `[${p.name}] ${s.title || 'Draft'}_${new Date().toLocaleDateString()}.json`;

            // 최신 브라우저 파일 피커 API 지원 확인
            if ('showSaveFilePicker' in window) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: suggestedName,
                        types: [{ description: 'JSON File', accept: { 'application/json': ['.json'] } }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(JSON.stringify(sovereignDb, null, 2));
                    await writable.close();
                    alert("원고 금고가 지정된 위치에 안전하게 보관되었습니다.");
                } catch (e) { console.error("피커 취소됨."); }
            } else {
                // 구형 브라우저 및 아이패드 사파리용 대체 다운로드 로직
                const blob = new Blob([JSON.stringify(sovereignDb)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = suggestedName;
                a.click();
            }
        };

        window.triggerImportFullBackup = function() {
            const picker = document.createElement('input');
            picker.type = 'file';
            picker.accept = '.json';
            picker.onchange = function(e) {
                const reader = new FileReader();
                reader.onload = function(re) {
                    try {
                        const importedData = JSON.parse(re.target.result);
                        if (confirm("기존 데이터가 모두 덮어씌워집니다. 복구하시겠습니까?")) {
                            sovereignDb = importedData;
                            executeSovereignSave();
                            window.location.reload();
                        }
                    } catch(err) { alert("잘못된 파일 형식입니다."); }
                };
                reader.readAsText(e.target.files[0]);
            };
            picker.click();
        };

        // --- 14. 유틸리티 함수 모음 ---
        function recalculateCutStatistics() {
            const allNodes = document.querySelectorAll('.card-unit');
            allNodes.forEach(function(node, index) {
                const badge = node.querySelector('.c-cut-badge');
                if (badge) badge.innerText = `Cut ${String(index + 1).padStart(2, '0')}`;
            });
            document.getElementById('statsDisplay').innerText = `${allNodes.length} Cuts Sovereign Guarded`;
        }

        function executeCardFocusSequence(node) {
            document.querySelectorAll('.card-unit').forEach(function(c) { c.classList.remove('card-focused'); });
            node.classList.add('card-focused');
            focusedCardElement = node;
        }

        window.clearActiveFocusStep = function() {
            document.querySelectorAll('.card-unit').forEach(function(c) { c.classList.remove('card-focused'); });
            focusedCardElement = null;
        };

        function triggerSearchFilterEngine() {
            const q = document.getElementById('engineSearchInput').value.toLowerCase();
            document.querySelectorAll('.card-unit').forEach(function(card) {
                const content = card.querySelector('.c-editor').innerText.toLowerCase();
                card.style.display = content.includes(q) ? "block" : "none";
            });
        }

        function executeBoardClearProcess() {
            if (confirm("현재 보드의 모든 내용을 초기화하시겠습니까? (Undo 가능)")) {
                executeSovereignSnapshot();
                document.getElementById('manuscriptPanelContainer').innerHTML = "";
                executeSovereignSave();
                recalculateCutStatistics();
            }
        }

        function applyDialogueSyntaxHighlight(t) {
            if (!t) return "";
            return t.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, '<span class="hl-dialog">$&</span>')
                    .replace(/[\(\[][가-힣a-zA-Z\s]+[\)\]]/g, '<span class="hl-sfx">$&</span>');
        }

        window.executeAutoTabResize = function(input) {
            const c = document.createElement("canvas");
            const x = c.getContext("2d");
            x.font = window.getComputedStyle(input).font;
            input.style.width = (x.measureText(input.value).width + 35) + "px";
        };

        function applyGlobalHotkeys() {
            window.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') executeManuscriptSplitProcess('append');
                if (e.ctrlKey && e.key === 'z') { e.preventDefault(); executeUndoStep(); }
                if (e.ctrlKey && e.key === 'y') { e.preventDefault(); executeRedoStep(); }
            });
        }
        applyGlobalHotkeys();

        // 컷 내부 부가 기능들
        window.executeCopyCutContent = function(btn) {
            const text = btn.closest('.card-unit').querySelector('.c-editor').innerText;
            navigator.clipboard.writeText(text);
            alert("대사가 복사되었습니다.");
        };

        window.executeAddCardTagStep = function(btn) {
            const area = btn.closest('.card-unit').querySelector('.card-tag-stack');
            const i = document.createElement('input');
            i.className = 'tag-input-item bg-transparent border-b border-white/10 text-[11px] text-blue-500 outline-none w-28 mr-3';
            i.placeholder = "태그 입력...";
            i.oninput = executeSovereignSave;
            area.appendChild(i);
            i.focus();
        };

        window.executeAddCardImageAsset = function(btn) {
            const fileIn = document.createElement('input');
            fileIn.type = 'file';
            fileIn.accept = 'image/*';
            fileIn.onchange = function(e) {
                const reader = new FileReader();
                reader.onload = function(re) {
                    const vault = btn.closest('.card-unit').querySelector('.card-img-vault-area');
                    const div = document.createElement('div');
                    div.className = "asset-img-item relative w-full aspect-square bg-black rounded-2xl overflow-hidden border border-white/5";
                    div.innerHTML = `<img src="${re.target.result}" class="w-full h-full object-cover">
                                     <button onclick="executeSovereignSnapshot(); this.parentElement.remove(); executeSovereignSave()" class="absolute top-1 right-1 bg-red-600 text-[9px] p-1.5 font-black rounded-lg">×</button>`;
                    vault.appendChild(div);
                    executeSovereignSave();
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            fileIn.click();
        };

        function copyRawLogToClipboard() {
            const log = document.getElementById('originalLogView').value;
            navigator.clipboard.writeText(log);
            alert("기록 전체가 복사되었습니다.");
        }

    </script>
</body>
</html>
