<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>지혜의 용 | Sovereign Workstation v20.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* [공통 테마] */
        body { background-color: #050505; color: #e2e8f0; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        
        /* [스크롤바 제어] */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* [카드 포커스 및 하이라이트] */
        .card-focused { border-color: #3b82f6 !important; background: #0a0a0a !important; box-shadow: 0 0 30px rgba(59,130,246,0.15); }
        .hl-dialog { color: #60a5fa; font-weight: 700; }
        .hl-sfx { color: #fbbf24; font-style: italic; }
        
        /* [탭 디자인] */
        .tab-active { background-color: #0f172a !important; color: #3b82f6 !important; border-top: 3px solid #3b82f6; }
        .tab-item { transition: all 0.2s ease; white-space: nowrap; min-width: 140px; }
        
        /* [드래그 상태 시각화] */
        .dragging { opacity: 0.3; transform: scale(0.98); border: 2px dashed #3b82f6; }
        .drag-over { border-top: 4px solid #3b82f6 !important; }

        /* [기타 설정] */
        [contenteditable]:focus { outline: none; background: rgba(30, 41, 59, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .memo-sidebar { width: 320px; }
    </style>
</head>
<body class="h-screen flex flex-col" onclick="clearActiveFocus()">

    <nav class="h-12 border-b border-white/10 flex items-center px-4 bg-black/60 shrink-0">
        <div class="flex items-center gap-2 mr-6">
            <span class="text-blue-500 font-black italic tracking-tighter text-base">DRAGON v20.0</span>
        </div>
        
        <div id="projectTabList" class="flex h-full items-center overflow-x-auto no-scrollbar">
            </div>
        
        <button onclick="createNewProject()" class="ml-4 w-7 h-7 flex items-center justify-center bg-white/5 hover:bg-blue-600 rounded-full text-gray-400 transition-colors">+</button>

        <div class="ml-auto flex items-center gap-3">
            <div class="flex items-center bg-white/5 rounded-lg px-2 mr-2">
                <span class="text-[10px] text-gray-600 uppercase font-black mr-2">Search</span>
                <input type="text" id="boardSearch" placeholder="대사 검색..." oninput="filterCardsEngine()" class="bg-transparent border-none outline-none text-xs p-1 w-32">
            </div>
            <button onclick="exportDataWithDialog()" class="text-[10px] font-black text-blue-500 hover:text-blue-300 uppercase tracking-widest border border-blue-900/30 px-3 py-1.5 rounded-lg">Save As</button>
            <button onclick="importFullData()" class="text-[10px] font-bold text-gray-500 hover:text-gray-200 uppercase tracking-widest">Restore</button>
        </div>
    </nav>

    <nav class="h-10 border-b border-white/5 flex items-center px-4 bg-[#0a0a0a] shrink-0">
        <div id="slotTabList" class="flex h-full items-center overflow-x-auto no-scrollbar">
            </div>
        <button onclick="createNewSlot()" class="ml-4 px-3 h-full text-gray-600 hover:text-white font-bold text-lg">+</button>
        
        <div class="ml-auto flex gap-6 items-center">
            <div class="flex gap-2">
                <button onclick="triggerUndo()" class="text-[10px] font-black text-gray-600 hover:text-yellow-500 uppercase">Undo</button>
                <button onclick="triggerRedo()" class="text-[10px] font-black text-gray-600 hover:text-yellow-500 uppercase">Redo</button>
            </div>
            <button onclick="clearCurrentBoard()" class="text-[10px] font-black text-red-900 hover:text-red-500 uppercase">Reset Board</button>
        </div>
    </nav>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="w-80 flex flex-col border-r border-white/5 bg-black/20">
            <div class="h-1/2 flex flex-col border-b border-white/5">
                <div class="p-3 text-[9px] font-black text-gray-600 uppercase bg-white/5 flex justify-between">
                    History Log
                    <button onclick="copyHistoryToClipboard()" class="text-blue-500 hover:text-blue-300">Copy</button>
                </div>
                <textarea id="originalView" class="flex-1 bg-transparent p-4 outline-none resize-none text-[11px] leading-relaxed text-gray-600" readonly></textarea>
            </div>
            <div class="h-1/2 flex flex-col p-5 gap-4">
                <div class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Script Input Engine</div>
                <textarea id="sourceInput" class="flex-1 bg-white/5 rounded-2xl p-4 outline-none text-sm focus:ring-1 ring-blue-500 transition-all border border-white/5" placeholder="원고 내용을 입력하세요..."></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="processManuscriptScript('append')" class="py-3 bg-blue-600 rounded-xl text-[10px] font-black uppercase">맨 뒤 추가</button>
                    <button onclick="processManuscriptScript('insert')" class="py-3 bg-yellow-600 text-black rounded-xl text-[10px] font-black uppercase">컷 뒤 삽입</button>
                </div>
            </div>
        </section>

        <section class="flex-1 flex flex-col overflow-hidden bg-black/5">
            <div class="p-10 pb-4 flex items-end gap-6 shrink-0">
                <div class="flex-1">
                    <div class="text-[10px] font-bold text-blue-900 uppercase mb-2">
                        <span id="labelProject">PROJECT</span> / <span id="labelSlot">WORKPLACE</span>
                    </div>
                    <input type="text" id="boardTitle" class="w-full bg-transparent text-5xl font-black outline-none tracking-tighter placeholder-gray-900" placeholder="회차 제목 입력..." oninput="syncBoardTitleToTab()">
                </div>
                <div id="statsDisplay" class="text-[10px] font-mono text-blue-500 mb-2 px-4 py-1.5 border border-blue-900/30 rounded-full">0 Cuts Locked</div>
            </div>
            <div id="panelContainer" class="flex-1 overflow-y-auto p-10 pt-4 space-y-12 no-scrollbar">
                </div>
        </section>

        <aside class="memo-sidebar border-l border-white/5 bg-black/30 p-5 shrink-0 flex flex-col gap-6">
            <div class="flex justify-between items-center border-b border-white/10 pb-4">
                <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Project Memos</h4>
                <button onclick="addNewProjectMemo()" class="w-7 h-7 flex items-center justify-center bg-blue-600 rounded-full text-white font-bold shadow-lg">+</button>
            </div>
            <div id="memoContainer" class="flex-1 overflow-y-auto no-scrollbar space-y-4">
                </div>
        </aside>
    </main>

    <script>
        // -----------------------------------------------------------------------------------------
        // [SOVEREIGN SCRIPT] v20.0 - 정직한 무결성 코딩
        // -----------------------------------------------------------------------------------------
        
        // --- 1. 시스템 전역 상태 ---
        let db = JSON.parse(localStorage.getItem('dragon_v20_local_db')) || {
            projects: [],
            activeProjectId: null,
            activeSlotId: null
        };

        let undoStack = [];
        let redoStack = [];
        let dragSrcId = null;
        let dragSrcType = null;
        let activeCardRef = null;

        // --- 2. 시스템 초기화 ---
        window.onload = function() {
            if (db.projects.length === 0) {
                const pId = Date.now();
                const sId = pId + 1;
                db.projects.push({
                    id: pId,
                    name: "새 작품",
                    order: 0,
                    memos: [{ title: '작품 설정', content: '', folded: false }],
                    slots: [{ id: sId, title: '1화', original: '', cards: [], order: 0 }]
                });
                db.activeProjectId = pId;
                db.activeSlotId = sId;
                saveToLocalStorage();
            }
            refreshAllUI();
        };

        // --- 3. UI 갱신 엔진 (정밀 설계) ---
        function refreshAllUI() {
            renderProjectTabsUI();
            renderSlotTabsUI();
            renderMemosUI();
            loadWorkspaceContent();
            
            const p = getProject();
            const s = getSlot();
            document.getElementById('labelProject').innerText = p ? p.name : "UNKNOWN";
            document.getElementById('labelSlot').innerText = s ? (s.title || "Untitled") : "WORKPLACE";
        }

        function getProject() { return db.projects.find(x => x.id === db.activeProjectId); }
        function getSlot() { const p = getProject(); return p ? p.slots.find(x => x.id === db.activeSlotId) : null; }

        // --- 4. 작품 탭 엔진 ---
        function renderProjectTabsUI() {
            const list = document.getElementById('projectTabList');
            list.innerHTML = "";
            db.projects.sort((a, b) => a.order - b.order);

            db.projects.forEach(p => {
                const active = (db.activeProjectId === p.id);
                const tab = document.createElement('div');
                tab.className = `tab-item group flex items-center h-full px-5 border-r border-white/5 cursor-move ${active ? 'tab-active' : 'text-gray-500 hover:bg-white/5'}`;
                tab.draggable = true;
                tab.dataset.dragType = "project";
                tab.dataset.dragId = p.id;

                // 드래그앤드롭 (PC 최적화)
                tab.ondragstart = handleGlobalDragStart;
                tab.ondragover = (e) => e.preventDefault();
                tab.ondrop = handleGlobalDrop;

                const input = document.createElement('input');
                input.value = p.name;
                input.className = "bg-transparent border-none outline-none font-black text-[11px] cursor-text mr-4";
                input.oninput = function() {
                    p.name = this.value;
                    window.executeAutoTabResize(this);
                    saveToLocalStorage();
                };
                input.onclick = (e) => e.stopPropagation();

                const del = document.createElement('button');
                del.innerHTML = "×";
                del.className = "opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 font-black";
                del.onclick = (e) => { e.stopPropagation(); deleteProjectStep(p.id); };

                tab.onclick = () => switchProjectStep(p.id);
                tab.appendChild(input);
                tab.appendChild(del);
                list.appendChild(tab);
                window.executeAutoTabResize(input);
            });
        }

        function switchProjectStep(id) {
            if (db.activeProjectId === id) return;
            saveCurrentEditorState(); // 전환 전 현재 데이터 저장 (중요)
            db.activeProjectId = id;
            const p = getProject();
            db.activeSlotId = p.slots[0].id;
            saveToLocalStorage();
            refreshAllUI();
        }

        function deleteProjectStep(id) {
            if (db.projects.length <= 1) return;
            if (confirm("작품 전체를 삭제하시겠습니까?")) {
                db.projects = db.projects.filter(x => x.id !== id);
                if (db.activeProjectId === id) {
                    db.activeProjectId = db.projects[0].id;
                    db.activeSlotId = db.projects[0].slots[0].id;
                }
                saveToLocalStorage();
                refreshAllUI();
            }
        }

        // --- 5. 워크플레이스 탭 엔진 ---
        function renderSlotTabsUI() {
            const list = document.getElementById('slotTabList');
            list.innerHTML = "";
            const p = getProject();
            if (!p) return;

            p.slots.sort((a, b) => a.order - b.order);

            p.slots.forEach(s => {
                const active = (db.activeSlotId === s.id);
                const tab = document.createElement('div');
                tab.className = `tab-item group flex items-center h-full px-6 border-r border-white/5 cursor-move text-[10px] font-bold ${active ? 'bg-black text-blue-400 border-t-2 border-t-blue-600' : 'text-gray-600 hover:text-gray-300'}`;
                tab.draggable = true;
                tab.dataset.dragType = "slot";
                tab.dataset.dragId = s.id;

                tab.ondragstart = handleGlobalDragStart;
                tab.ondragover = (e) => e.preventDefault();
                tab.ondrop = handleGlobalDrop;

                tab.innerHTML = `
                    <span class="mr-4">${s.title || 'WORKPLACE'}</span>
                    <button onclick="event.stopPropagation(); deleteSlotStep(${s.id})" class="opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 font-black">×</button>
                `;
                tab.onclick = () => switchSlotStep(s.id);
                list.appendChild(tab);
            });
        }

        function switchSlotStep(id) {
            if (db.activeSlotId === id) return;
            saveCurrentEditorState();
            db.activeSlotId = id;
            saveToLocalStorage();
            refreshAllUI();
        }

        function createNewSlot() {
            const p = getProject();
            const sid = Date.now();
            p.slots.push({ id: sid, title: '새 슬롯', original: '', cards: [], order: p.slots.length });
            db.activeSlotId = sid;
            saveToLocalStorage();
            refreshAllUI();
        }

        function deleteSlotStep(id) {
            const p = getProject();
            if (p.slots.length <= 1) return;
            if (confirm("슬롯을 삭제할까요?")) {
                p.slots = p.slots.filter(x => x.id !== id);
                if (db.activeSlotId === id) db.activeSlotId = p.slots[0].id;
                saveToLocalStorage();
                refreshAllUI();
            }
        }

        // --- 6. 에디터 메인 엔진 (Rebirth Logic) ---
        function loadWorkspaceContent() {
            const s = getSlot();
            if (!s) return;
            
            document.getElementById('boardTitle').value = s.title || "";
            document.getElementById('originalView').value = s.original || "";
            
            const board = document.getElementById('panelContainer');
            board.innerHTML = "";
            
            s.cards.forEach(cData => {
                board.appendChild(createManuscriptNode(cData.id, cData.text, cData.tags, cData.images));
            });
            
            recalculateCutStats();
        }

        function saveCurrentEditorState() {
            const s = getSlot();
            if (!s) return;
            
            const cards = [];
            document.querySelectorAll('.card-unit').forEach(node => {
                cards.push({
                    id: parseFloat(node.dataset.dragId),
                    text: node.querySelector('.c-editor').innerText,
                    tags: Array.from(node.querySelectorAll('.tag-input')).map(i => i.value),
                    images: Array.from(node.querySelectorAll('.img-item img')).map(img => img.src)
                });
            });
            
            s.title = document.getElementById('boardTitle').value;
            s.original = document.getElementById('originalView').value;
            s.cards = cards;
        }

        // --- 7. 원고 컷 생성 및 기능 로직 ---
        function createManuscriptNode(id, text, tags = [], images = []) {
            const card = document.createElement('div');
            card.className = 'card-unit bg-[#0d0d0d] border border-white/5 rounded-3xl p-8 transition-all group relative cursor-move';
            card.dataset.dragId = id;
            card.dataset.dragType = "card";
            card.draggable = true;

            card.ondragstart = handleGlobalDragStart;
            card.ondragover = (e) => e.preventDefault();
            card.ondrop = handleGlobalDrop;
            
            card.onclick = (e) => { e.stopPropagation(); focusCardStep(card); };

            let tHtml = "";
            tags.forEach(t => {
                tHtml += `<input class="tag-input bg-transparent border-b border-white/10 text-[11px] text-blue-400 outline-none w-24 mr-2" value="${t}" oninput="saveToLocalStorage()">`;
            });

            let iHtml = "";
            images.forEach(src => {
                iHtml += `<div class="img-item relative w-full aspect-square bg-black rounded overflow-hidden">
                    <img src="${src}" class="w-full h-full object-cover">
                    <button onclick="takeSnapshot(); this.parentElement.remove(); saveToLocalStorage()" class="absolute top-0 right-0 bg-red-600 text-[8px] p-1 font-black">×</button>
                </div>`;
            });

            card.innerHTML = `
                <div class="flex justify-between items-center mb-6 pointer-events-none">
                    <div class="flex items-center gap-3">
                        <span class="text-blue-900 font-black text-xs opacity-40">☰</span>
                        <span class="text-[10px] font-black text-gray-700 uppercase c-cut-badge">Cut 00</span>
                    </div>
                    <div class="flex gap-4 pointer-events-auto">
                        <button onclick="addCardTag(this)" class="text-[9px] font-black text-gray-500 hover:text-white uppercase">+ TAG</button>
                        <button onclick="addCardImage(this)" class="text-[9px] font-black text-gray-500 hover:text-white uppercase">+ IMAGE</button>
                    </div>
                </div>
                <div class="flex gap-8">
                    <div class="card-img-vault w-32 grid grid-cols-2 gap-2 empty:hidden">${iHtml}</div>
                    <div class="flex-1 space-y-4">
                        <div class="card-tag-area flex flex-wrap gap-2">${tHtml}</div>
                        <div class="c-editor text-[17px] leading-relaxed text-gray-300 outline-none min-h-[1.5em]" contenteditable="true" onblur="saveToLocalStorage()">${applySyntaxHighlight(text)}</div>
                        <div class="flex gap-6 pt-6 border-t border-white/5 opacity-30 group-hover:opacity-100 transition-opacity">
                            <button onclick="copyManuscript(this)" class="text-[10px] font-black text-blue-500 uppercase">Copy</button>
                            <button onclick="mergeManuscript(this)" class="text-[10px] font-black text-gray-600 hover:text-white uppercase">Merge Up</button>
                            <button onclick="splitManuscript(this)" class="text-[10px] font-black text-gray-600 hover:text-white uppercase">Split</button>
                            <button onclick="deleteManuscript(this)" class="text-[10px] font-black text-red-900 hover:text-red-500 uppercase ml-auto">Delete</button>
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        // --- 8. 핵심 기능 로직 (Merge, Split, Process) ---
        function processManuscriptScript(mode) {
            const input = document.getElementById('sourceInput');
            const rawText = input.value.trim();
            if (!rawText) return;

            takeSnapshot();
            const s = getSlot();
            s.original += `\n[${new Date().toLocaleTimeString()}] 추가:\n${rawText}\n`;
            document.getElementById('originalView').value = s.original;

            // 정밀 문장 분리 엔진
            const sentences = rawText.split(/(?<=[.!?])\s+/).filter(l => l.length > 0);
            const board = document.getElementById('panelContainer');

            sentences.forEach(line => {
                const node = createManuscriptNode(Date.now() + Math.random(), line);
                if (mode === 'insert' && activeCardRef) activeCardRef.after(node);
                else board.appendChild(node);
            });

            input.value = "";
            saveToLocalStorage();
            recalculateCutStats();
        }

        function mergeManuscript(btn) {
            const cur = btn.closest('.card-unit');
            const prev = cur.previousElementSibling;
            if (prev && prev.classList.contains('card-unit')) {
                takeSnapshot();
                const target = prev.querySelector('.c-editor');
                target.innerText += " " + cur.querySelector('.c-editor').innerText;
                target.innerHTML = applySyntaxHighlight(target.innerText);
                cur.querySelectorAll('.card-img-vault > div').forEach(div => prev.querySelector('.card-img-vault').appendChild(div));
                cur.remove();
                saveToLocalStorage();
                recalculateCutStats();
            }
        }

        function splitManuscript(btn) {
            const cur = btn.closest('.card-unit');
            const ed = cur.querySelector('.c-editor');
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            
            takeSnapshot();
            const range = sel.getRangeAt(0);
            const extra = document.createRange();
            extra.setStart(range.endContainer, range.endOffset);
            extra.setEnd(ed, ed.childNodes.length);
            
            const text = extra.toString();
            extra.deleteContents();
            ed.innerHTML = applySyntaxHighlight(ed.innerText);
            
            const newNode = createManuscriptNode(Date.now(), text);
            cur.after(newNode);
            saveToLocalStorage();
            recalculateCutStats();
        }

        function deleteManuscript(btn) {
            if (confirm("컷을 삭제하시겠습니까?")) {
                takeSnapshot();
                btn.closest('.card-unit').remove();
                saveToLocalStorage();
                recalculateCutStats();
            }
        }

        // --- 9. 드래그 앤 드롭 통합 핸들러 ---
        function handleGlobalDragStart(e) {
            dragSrcId = parseInt(this.dataset.dragId);
            dragSrcType = this.dataset.dragType;
            this.classList.add('dragging');
        }

        function handleGlobalDrop(e) {
            e.preventDefault();
            this.classList.remove('dragging');
            const targetId = parseInt(this.dataset.dragId);
            const targetType = this.dataset.dragType;

            if (dragSrcType !== targetType || dragSrcId === targetId) return;

            takeSnapshot();
            if (dragSrcType === 'project') {
                const f = db.projects.findIndex(x => x.id === dragSrcId);
                const t = db.projects.findIndex(x => x.id === targetId);
                const [moved] = db.projects.splice(f, 1);
                db.projects.splice(t, 0, moved);
                db.projects.forEach((p, i) => p.order = i);
                renderProjectTabsUI();
            } else if (dragSrcType === 'slot') {
                const p = getProject();
                const f = p.slots.findIndex(x => x.id === dragSrcId);
                const t = p.slots.findIndex(x => x.id === targetId);
                const [moved] = p.slots.splice(f, 1);
                p.slots.splice(t, 0, moved);
                p.slots.forEach((s, i) => s.order = i);
                renderSlotTabsUI();
            } else if (dragSrcType === 'card') {
                const board = document.getElementById('panelContainer');
                const srcNode = board.querySelector(`[data-drag-id="${dragSrcId}"]`);
                const all = Array.from(board.querySelectorAll('.card-unit'));
                if (all.indexOf(srcNode) < all.indexOf(this)) this.after(srcNode);
                else board.insertBefore(srcNode, this);
            }
            saveToLocalStorage();
            recalculateCutStats();
        }

        // --- 10. 언두/리두 및 스냅샷 엔진 ---
        function takeSnapshot() {
            saveCurrentEditorState();
            undoStack.push(JSON.stringify(db));
            if (undoStack.length > MAX_HISTORY_LIMIT) undoStack.shift();
            redoStack = [];
        }

        window.triggerUndo = function() {
            if (undoStack.length === 0) return;
            saveCurrentEditorState();
            redoStack.push(JSON.stringify(db));
            db = JSON.parse(undoStack.pop());
            saveToLocalStorage();
            refreshAllUI();
        };

        window.triggerRedo = function() {
            if (redoStack.length === 0) return;
            saveCurrentEditorState();
            undoStack.push(JSON.stringify(db));
            db = JSON.parse(redoStack.pop());
            saveToLocalStorage();
            refreshAllUI();
        };

        // --- 11. 공유 메모 엔진 ---
        function renderMemosUI() {
            const container = document.getElementById('memoContainer');
            container.innerHTML = "";
            const p = getProject();
            if (!p || !p.memos) return;

            p.memos.forEach((m, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white/5 border border-white/10 rounded-2xl overflow-hidden";
                div.innerHTML = `
                    <div class="flex items-center justify-between p-4 cursor-pointer hover:bg-white/10 transition-colors" onclick="toggleMemoFoldStep(${idx})">
                        <input value="${m.title}" class="bg-transparent border-none outline-none font-black text-[11px] text-blue-400 w-full" 
                               oninput="updateMemoContent(${idx}, 'title', this.value)" onclick="event.stopPropagation()">
                        <button onclick="event.stopPropagation(); deleteProjectMemoStep(${idx})" class="text-red-900 font-black ml-2">×</button>
                    </div>
                    <div class="p-4 ${m.folded ? 'hidden' : ''}">
                        <textarea class="w-full bg-transparent text-[11px] text-gray-500 outline-none h-40 leading-relaxed resize-none" 
                                  oninput="updateMemoContent(${idx}, 'content', this.value)">${m.content}</textarea>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function addNewProjectMemo() {
            const p = getProject();
            if (!p.memos) p.memos = [];
            p.memos.unshift({ title: '신규 메모', content: '', folded: false });
            saveToLocalStorage();
            renderMemosUI();
        }

        window.updateMemoContent = function(idx, key, val) {
            getProject().memos[idx][key] = val;
            saveToLocalStorage();
        };

        window.toggleMemoFoldStep = function(idx) {
            getProject().memos[idx].folded = !getProject().memos[idx].folded;
            saveToLocalStorage();
            renderMemosUI();
        };

        window.deleteProjectMemoStep = function(idx) {
            if (confirm("메모를 삭제할까요?")) {
                getProject().memos.splice(idx, 1);
                saveToLocalStorage();
                renderMemosUI();
            }
        };

        // --- 12. 저장 및 시스템 유틸리티 ---
        function saveToLocalStorage() {
            localStorage.setItem('dragon_v20_local_db', JSON.stringify(db));
        }

        window.syncBoardTitleToTab = function() {
            const title = document.getElementById('boardTitle').value;
            const s = getSlot();
            s.title = title;
            document.getElementById('labelSlot').innerText = title || "WORKPLACE";
            renderSlotTabsUI();
            saveToLocalStorage();
        };

        window.exportDataWithDialog = function() {
            saveCurrentEditorState();
            const p = getProject();
            const s = getSlot();
            const fileName = `[${p.name}] ${s.title || '원고'}_${new Date().toLocaleDateString()}.json`;
            
            const blob = new Blob([JSON.stringify(db)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click(); // 이 명령어가 브라우저의 저장 위치 팝업을 트리거합니다.
        };

        window.importFullData = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = re => {
                    db = JSON.parse(re.target.result);
                    saveToLocalStorage();
                    window.location.reload();
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        };

        function recalculateCutStats() {
            const all = document.querySelectorAll('.card-unit');
            all.forEach((n, i) => {
                const b = n.querySelector('.c-cut-badge');
                if (b) b.innerText = `Cut ${String(i + 1).padStart(2, '0')}`;
            });
            document.getElementById('statsDisplay').innerText = `${all.length} Cuts Locked`;
        }

        function filterCardsEngine() {
            const q = document.getElementById('boardSearch').value.toLowerCase();
            document.querySelectorAll('.card-unit').forEach(card => {
                const text = card.querySelector('.c-editor').innerText.toLowerCase();
                card.style.display = text.includes(q) ? "block" : "none";
            });
        }

        function clearCurrentBoard() {
            if (confirm("현재 보드를 초기화하시겠습니까? (Undo 가능)")) {
                takeSnapshot();
                document.getElementById('panelContainer').innerHTML = "";
                saveToLocalStorage();
                recalculateCutStats();
            }
        }

        function focusCardStep(node) {
            document.querySelectorAll('.card-unit').forEach(c => c.classList.remove('card-focused'));
            node.classList.add('card-focused');
            activeCardRef = node;
        }

        function clearActiveFocus() {
            document.querySelectorAll('.card-unit').forEach(c => c.classList.remove('card-focused'));
            activeCardRef = null;
        }

        function applySyntaxHighlight(t) {
            if (!t) return "";
            return t.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, '<span class="hl-dialog">$&</span>')
                    .replace(/[\(\[][가-힣a-zA-Z\s]+[\)\]]/g, '<span class="hl-sfx">$&</span>');
        }

        window.executeAutoTabResize = function(i) {
            const c = document.createElement("canvas");
            const x = c.getContext("2d");
            x.font = window.getComputedStyle(i).font;
            i.style.width = (x.measureText(i.value).width + 30) + "px";
        };

        function applyHotkeys() {
            window.addEventListener('keydown', e => {
                if (e.ctrlKey && e.key === 'Enter') processManuscriptScript('append');
                if (e.ctrlKey && e.key === 'z') { e.preventDefault(); triggerUndo(); }
                if (e.ctrlKey && e.key === 'y') { e.preventDefault(); triggerRedo(); }
            });
        }
        applyHotkeys();

    </script>
</body>
</html>
