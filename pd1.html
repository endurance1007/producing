<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>지혜의 용 | 워크스테이션 v1.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* [Pretendard 폰트 로드] */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        /* [공통 스타일링] */
        body { 
            background-color: #050505; 
            color: #e5e7eb; 
            font-family: 'Pretendard', sans-serif; 
            overflow: hidden; 
            margin: 0;
            padding: 0;
        }

        /* [스크롤바: 작가님의 시야를 방해하지 않는 정밀 디자인] */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* [카드 포커스: 집중을 위한 발광 효과] */
        .card-focused { 
            border-color: #3b82f6 !important; 
            background: #0a0a0a !important; 
            box-shadow: 0 0 35px rgba(59,130,246,0.18); 
            transform: translateY(-2px);
        }

        /* [대사 하이라이팅] */
        .hl-dialog { color: #60a5fa; font-weight: 700; text-shadow: 0 0 5px rgba(96,165,250,0.2); }
        .hl-sfx { color: #fbbf24; font-style: italic; }
        
        /* [탭 디자인: 무결성 노출] */
        .tab-active { 
            background-color: #0f172a !important; 
            color: #3b82f6 !important; 
            border-top: 3px solid #3b82f6; 
        }
        .tab-item { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            white-space: nowrap; 
            min-width: 150px; 
            cursor: pointer;
        }
        
        /* [드래그 앤 드롭 시각화] */
        .dragging { opacity: 0.1 !important; transform: scale(0.96); border: 2px dashed #3b82f6 !important; }
        .drag-over { border-top: 5px solid #3b82f6 !important; }

        /* [에디터 설정] */
        [contenteditable]:focus { outline: none; background: rgba(30, 41, 59, 0.15); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* [레이아웃 고정] */
        .memo-sidebar { width: 340px; }
    </style>
</head>
<body class="h-screen flex flex-col" onclick="window.globalClearFocus()">

    <nav class="h-12 border-b border-white/10 flex items-center px-4 bg-black/80 shrink-0">
        <div class="flex items-center gap-2 mr-6 shrink-0">
            <span class="text-blue-600 font-black italic tracking-tighter text-lg select-none">SOVEREIGN v1.1</span>
        </div>
        
        <div id="projectTabContainer" class="flex h-full items-center overflow-x-auto no-scrollbar">
            </div>
        
        <button id="btnCreateProject" class="ml-4 w-7 h-7 flex items-center justify-center bg-white/5 hover:bg-blue-600 rounded-full text-gray-400 transition-all active:scale-90">+</button>

        <div class="ml-auto flex items-center gap-4">
            <div class="flex items-center bg-white/5 rounded-xl px-3 border border-white/5">
                <span class="text-[9px] text-gray-600 uppercase font-black mr-2">Search</span>
                <input type="text" id="engineSearchInput" placeholder="컷 검색..." class="bg-transparent border-none outline-none text-xs p-2 w-40 text-gray-300">
            </div>
            <button id="btnSaveAs" class="text-[10px] font-black text-blue-500 hover:text-white uppercase tracking-widest border border-blue-900/40 px-4 py-2 rounded-xl transition-colors">Save As</button>
            <button id="btnRestore" class="text-[10px] font-bold text-gray-600 hover:text-gray-200 uppercase tracking-widest">Restore</button>
        </div>
    </nav>

    <nav class="h-10 border-b border-white/5 flex items-center px-4 bg-[#070707] shrink-0">
        <div id="slotTabContainer" class="flex h-full items-center overflow-x-auto no-scrollbar">
            </div>
        <button id="btnCreateSlot" class="ml-4 px-4 h-full text-gray-700 hover:text-white font-bold text-xl transition-colors">+</button>
        
        <div class="ml-auto flex gap-6 items-center pr-2">
            <div class="flex gap-5 border-r border-white/10 pr-6">
                <button id="btnUndo" class="text-[10px] font-black text-gray-600 hover:text-yellow-500 uppercase tracking-widest transition-colors">Undo</button>
                <button id="btnRedo" class="text-[10px] font-black text-gray-600 hover:text-yellow-500 uppercase tracking-widest transition-colors">Redo</button>
            </div>
            <button id="btnResetBoard" class="text-[10px] font-black text-red-900 hover:text-red-500 uppercase tracking-widest">Reset Board</button>
        </div>
    </nav>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="w-80 flex flex-col border-r border-white/5 bg-black/20">
            <div class="h-1/2 flex flex-col border-b border-white/5">
                <div class="p-3 text-[9px] font-black text-gray-600 uppercase bg-white/5 flex justify-between items-center tracking-widest italic">
                    Original Record
                    <button id="btnCopyLog" class="text-blue-700 hover:text-blue-400 font-bold text-[10px]">COPY ALL</button>
                </div>
                <textarea id="originalLogView" class="flex-1 bg-transparent p-5 outline-none resize-none text-[11px] leading-relaxed text-gray-600 font-mono" readonly></textarea>
            </div>
            <div class="h-1/2 flex flex-col p-6 gap-4 bg-black/10">
                <div class="text-[9px] font-black text-blue-800 uppercase tracking-widest mb-1 italic">Manuscript Input Engine</div>
                <textarea id="mainSourceInput" class="flex-1 bg-white/5 rounded-3xl p-5 outline-none text-sm focus:ring-2 ring-blue-900/40 transition-all border border-white/5 placeholder-gray-800 text-gray-300" placeholder="새 원고 내용을 입력하세요..."></textarea>
                <div class="grid grid-cols-2 gap-3">
                    <button id="btnAppendManuscript" class="py-3.5 bg-blue-700 rounded-2xl text-[10px] font-black uppercase shadow-xl hover:bg-blue-600 transition-all">맨 뒤 추가</button>
                    <button id="btnInsertManuscript" class="py-3.5 bg-yellow-600 text-black rounded-2xl text-[10px] font-black uppercase shadow-xl hover:bg-yellow-500 transition-all">컷 뒤 삽입</button>
                </div>
            </div>
        </section>

        <section class="flex-1 flex flex-col overflow-hidden bg-black/5 relative">
            <div class="p-12 pb-6 flex items-end gap-10 shrink-0 bg-transparent">
                <div class="flex-1">
                    <div class="text-[10px] font-bold text-blue-950 uppercase mb-3 tracking-[0.3em]">
                        <span id="displayProjectName">PROJECT</span> / <span id="displaySlotName">WORKPLACE</span>
                    </div>
                    <input type="text" id="activeBoardTitle" class="w-full bg-transparent text-5xl font-black outline-none tracking-tighter placeholder-gray-900 text-white" placeholder="회차 제목 입력...">
                </div>
                <div id="displayCutCount" class="text-[10px] font-mono text-blue-500 mb-2 px-5 py-2 border border-blue-900/20 rounded-full bg-blue-900/5 select-none">0 Cuts Secured</div>
            </div>
            <div id="manuscriptPanelContainer" class="flex-1 overflow-y-auto p-12 pt-6 space-y-16 no-scrollbar">
                </div>
        </section>

        <aside class="memo-sidebar border-l border-white/5 bg-black/40 p-6 shrink-0 flex flex-col gap-6">
            <div class="flex justify-between items-center border-b border-white/10 pb-5">
                <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Shared Workspace Memos</h4>
                <button id="btnAddProjectMemo" class="w-8 h-8 flex items-center justify-center bg-blue-700 rounded-full text-white font-bold shadow-2xl hover:bg-blue-600 transition-transform active:scale-90">+</button>
            </div>
            <div id="memoStackContainer" class="flex-1 overflow-y-auto no-scrollbar space-y-5">
                </div>
        </aside>
    </main>

    <script>
        // -----------------------------------------------------------------------------------------
        // [CORE LOGIC] Sovereign v1.1 - 무결성 복구 스크립트
        // 모든 함수를 명시적으로 window 객체에 연결하여 버튼 작동을 보장합니다.
        // -----------------------------------------------------------------------------------------
        
        // --- [1] 시스템 전역 상태 관리 ---
        window.sovereignDb = JSON.parse(localStorage.getItem('dragon_v1_1_final_db')) || {
            projects: [],
            activeProjectId: null,
            activeSlotId: null
        };

        window.undoStack = [];
        window.redoStack = [];
        window.dragSourceId = null;
        window.dragSourceType = null;
        window.focusedCardNode = null;

        // --- [2] 초기화 기동 엔진 ---
        window.bootSovereignSystem = function() {
            console.log("Sovereign Engine v1.1 Initializing...");
            
            // 데이터가 비어있을 경우 초기 구조 강제 생성
            if (window.sovereignDb.projects.length === 0) {
                const initialProjectId = Date.now();
                const initialSlotId = initialProjectId + 1;
                
                const firstProject = {
                    id: initialProjectId,
                    name: "첫 작품",
                    order: 0,
                    memos: [{ title: '기본 설정', content: '', folded: false }],
                    slots: [{ 
                        id: initialSlotId, 
                        title: '1화', 
                        original: '', 
                        cards: [], 
                        order: 0 
                    }]
                };
                
                window.sovereignDb.projects.push(firstProject);
                window.sovereignDb.activeProjectId = initialProjectId;
                window.sovereignDb.activeSlotId = initialSlotId;
                window.executeInternalSave();
            }
            
            window.executeFullUIRenderCycle();
            window.bindStaticEventListeners();
        };

        // --- [3] UI 갱신 사이클 (The Rebirth Cycle) ---
        window.executeFullUIRenderCycle = function() {
            window.renderProjectTabs();
            window.renderSlotTabs();
            window.renderProjectMemos();
            window.loadEditorFromMemory();
            
            const p = window.getActiveProject();
            const s = window.getActiveSlot();
            
            document.getElementById('displayProjectName').innerText = p ? p.name : "PROJECT";
            document.getElementById('displaySlotName').innerText = s ? (s.title || "WORKPLACE") : "WORKPLACE";
            
            window.recountManuscriptStats();
        };

        window.getActiveProject = function() {
            return window.sovereignDb.projects.find(function(x) { return x.id === window.sovereignDb.activeProjectId; });
        };

        window.getActiveSlot = function() {
            const p = window.getActiveProject();
            if (!p) return null;
            return p.slots.find(function(x) { return x.id === window.sovereignDb.activeSlotId; });
        };

        // --- [4] 데이터 수호 로직 (Data Protection) ---
        window.executeCurrentStateCapture = function() {
            const activeS = window.getActiveSlot();
            if (!activeS) return;
            
            const cardCollection = [];
            const currentCardNodes = document.querySelectorAll('.card-unit');
            
            for (let i = 0; i < currentCardNodes.length; i++) {
                const node = currentCardNodes[i];
                const cardText = node.querySelector('.c-editor').innerText;
                const cardTags = [];
                const tagInputs = node.querySelectorAll('.tag-input-field');
                for (let j = 0; j < tagInputs.length; j++) {
                    cardTags.push(tagInputs[j].value);
                }
                
                const cardImages = [];
                const imgNodes = node.querySelectorAll('.asset-img-item img');
                for (let k = 0; k < imgNodes.length; k++) {
                    cardImages.push(imgNodes[k].src);
                }
                
                cardCollection.push({
                    id: parseFloat(node.dataset.dragId),
                    text: cardText,
                    tags: cardTags,
                    images: cardImages
                });
            }
            
            activeS.title = document.getElementById('activeBoardTitle').value;
            activeS.original = document.getElementById('originalLogView').value;
            activeS.cards = cardCollection;
        };

        window.executeInternalSave = function() {
            localStorage.setItem('dragon_v1_1_final_db', JSON.stringify(window.sovereignDb));
        };

        // --- [5] 프로젝트 및 슬롯 탭 시스템 ---
        window.renderProjectTabs = function() {
            const container = document.getElementById('projectTabContainer');
            container.innerHTML = "";
            window.sovereignDb.projects.sort(function(a, b) { return a.order - b.order; });

            for (let i = 0; i < window.sovereignDb.projects.length; i++) {
                const proj = window.sovereignDb.projects[i];
                const isActive = (window.sovereignDb.activeProjectId === proj.id);
                
                const tabDiv = document.createElement('div');
                tabDiv.className = "tab-item group flex items-center h-full px-6 border-r border-white/5 cursor-move " + (isActive ? 'tab-active' : 'text-gray-600 hover:bg-white/5');
                tabDiv.draggable = true;
                tabDiv.dataset.dragType = "project";
                tabDiv.dataset.dragId = proj.id;

                // [드래그 이벤트 바인딩]
                tabDiv.ondragstart = window.handleGlobalDragStart;
                tabDiv.ondragover = function(e) { e.preventDefault(); };
                tabDiv.ondrop = window.handleGlobalDrop;

                const inputNode = document.createElement('input');
                inputNode.value = proj.name;
                inputNode.className = "bg-transparent border-none outline-none font-black text-[11px] cursor-text mr-4 text-inherit";
                inputNode.oninput = function() {
                    proj.name = this.value;
                    window.executeAutoTabResize(this);
                    window.executeInternalSave();
                };
                inputNode.onclick = function(e) { e.stopPropagation(); };

                const delBtn = document.createElement('button');
                delBtn.innerHTML = "×";
                delBtn.className = "opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 font-black transition-opacity text-sm";
                delBtn.onclick = function(e) {
                    e.stopPropagation();
                    window.deleteProjectStep(proj.id);
                };

                tabDiv.onclick = function() { window.switchProjectStep(proj.id); };
                tabDiv.appendChild(inputNode);
                tabDiv.appendChild(delBtn);
                container.appendChild(tabDiv);
                
                window.executeAutoTabResize(inputNode);
            }
        };

        window.switchProjectStep = function(id) {
            if (window.sovereignDb.activeProjectId === id) return;
            // 격리 저장
            window.executeCurrentStateCapture();
            window.sovereignDb.activeProjectId = id;
            const p = window.getActiveProject();
            window.sovereignDb.activeSlotId = p.slots[0].id;
            window.executeInternalSave();
            window.executeFullUIRenderCycle();
        };

        window.renderSlotTabs = function() {
            const container = document.getElementById('slotTabContainer');
            container.innerHTML = "";
            const p = window.getActiveProject();
            if (!p) return;

            p.slots.sort(function(a, b) { return a.order - b.order; });

            for (let i = 0; i < p.slots.length; i++) {
                const slot = p.slots[i];
                const isActive = (window.sovereignDb.activeSlotId === slot.id);
                const tab = document.createElement('div');
                tab.className = "tab-item group flex items-center h-full px-7 border-r border-white/5 cursor-move text-[10px] font-black tracking-widest " + (isActive ? 'bg-black text-blue-500 border-t-2 border-t-blue-700 shadow-xl' : 'text-gray-700 hover:text-gray-400');
                tab.draggable = true;
                tab.dataset.dragType = "slot";
                tab.dataset.dragId = slot.id;

                tab.ondragstart = window.handleGlobalDragStart;
                tab.ondragover = function(e) { e.preventDefault(); };
                tab.ondrop = window.handleGlobalDrop;

                const titleSpan = document.createElement('span');
                titleSpan.className = "mr-4";
                titleSpan.innerText = slot.title || 'WORKPLACE';
                
                const delBtn = document.createElement('button');
                delBtn.innerHTML = "×";
                delBtn.className = "opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 font-black transition-opacity";
                delBtn.onclick = function(e) {
                    e.stopPropagation();
                    window.deleteSlotStep(slot.id);
                };

                tab.onclick = function() { window.switchSlotStep(slot.id); };
                tab.appendChild(titleSpan);
                tab.appendChild(delBtn);
                container.appendChild(tab);
            }
        };

        window.switchSlotStep = function(id) {
            if (window.sovereignDb.activeSlotId === id) return;
            window.executeCurrentStateCapture();
            window.sovereignDb.activeSlotId = id;
            window.executeInternalSave();
            window.executeFullUIRenderCycle();
        };

        // --- [6] 에디터 및 원고 분할 시스템 ---
        window.loadEditorFromMemory = function() {
            const s = window.getActiveSlot();
            if (!s) return;
            
            document.getElementById('activeBoardTitle').value = s.title || "";
            document.getElementById('originalLogView').value = s.original || "";
            
            const board = document.getElementById('manuscriptPanelContainer');
            board.innerHTML = "";
            
            for (let i = 0; i < s.cards.length; i++) {
                const cData = s.cards[i];
                const cardNode = window.createCardNodePhysical(cData.id, cData.text, cData.tags, cData.images);
                board.appendChild(cardNode);
            }
            
            window.recountManuscriptStats();
        };

        window.createCardNodePhysical = function(id, text, tags, images) {
            const card = document.createElement('div');
            card.className = 'card-unit bg-[#0d0d0d] border border-white/5 rounded-[2.5rem] p-10 transition-all group relative cursor-move';
            card.dataset.dragId = id;
            card.dataset.dragType = "card";
            card.draggable = true;

            // 드래그 이벤트
            card.ondragstart = window.handleGlobalDragStart;
            card.ondragover = function(e) { e.preventDefault(); };
            card.ondrop = window.handleGlobalDrop;
            
            card.onclick = function(e) { 
                e.stopPropagation(); 
                window.globalFocusCard(card); 
            };

            // 상단 도구 레이아웃
            const topRow = document.createElement('div');
            topRow.className = "flex justify-between items-center mb-8 pointer-events-none";
            
            const badgeBox = document.createElement('div');
            badgeBox.className = "flex items-center gap-4";
            const dragIcon = document.createElement('span');
            dragIcon.className = "text-blue-900 font-black text-sm opacity-30 select-none";
            dragIcon.innerText = "☰";
            const badge = document.createElement('span');
            badge.className = "text-[11px] font-black text-gray-700 uppercase tracking-[0.3em] c-cut-badge";
            badge.innerText = "Cut 00";
            badgeBox.appendChild(dragIcon);
            badgeBox.appendChild(badge);
            
            const toolBox = document.createElement('div');
            toolBox.className = "flex gap-4 pointer-events-auto";
            const tagBtn = document.createElement('button');
            tagBtn.className = "text-[10px] font-black text-gray-600 hover:text-white uppercase";
            tagBtn.innerText = "+ TAG";
            tagBtn.onclick = function() { window.addTagToCard(card); };
            const imgBtn = document.createElement('button');
            imgBtn.className = "text-[10px] font-black text-gray-600 hover:text-white uppercase";
            imgBtn.innerText = "+ IMAGE";
            imgBtn.onclick = function() { window.addImageToCard(card); };
            toolBox.appendChild(tagBtn);
            toolBox.appendChild(imgBtn);
            
            topRow.appendChild(badgeBox);
            topRow.appendChild(toolBox);
            card.appendChild(topRow);

            // 본체 레이아웃
            const mainBody = document.createElement('div');
            mainBody.className = "flex gap-10";
            
            const imgVault = document.createElement('div');
            imgVault.className = "card-img-vault-area w-36 grid grid-cols-2 gap-3 empty:hidden";
            if (images) {
                for (let i = 0; i < images.length; i++) {
                    const imgDiv = document.createElement('div');
                    imgDiv.className = "asset-img-item relative w-full aspect-square bg-black rounded-2xl overflow-hidden border border-white/5";
                    const img = document.createElement('img');
                    img.src = images[i];
                    img.className = "w-full h-full object-cover";
                    const del = document.createElement('button');
                    del.innerText = "×";
                    del.className = "absolute top-1 right-1 bg-red-600 text-[9px] p-1.5 font-black rounded-lg";
                    del.onclick = function() { 
                        window.executeDeepSnapshot();
                        imgDiv.remove(); 
                        window.executeInternalSave(); 
                    };
                    imgDiv.appendChild(img);
                    imgDiv.appendChild(del);
                    imgVault.appendChild(imgDiv);
                }
            }
            
            const contentWrap = document.createElement('div');
            contentWrap.className = "flex-1 space-y-6";
            
            const tagStack = document.createElement('div');
            tagStack.className = "card-tag-stack flex flex-wrap gap-2";
            if (tags) {
                for (let j = 0; j < tags.length; j++) {
                    const tagIn = document.createElement('input');
                    tagIn.className = "tag-input-field bg-transparent border-b border-white/10 text-[11px] text-blue-500 outline-none w-28 mr-3";
                    tagIn.value = tags[j];
                    tagIn.oninput = window.executeInternalSave;
                    tagStack.appendChild(tagIn);
                }
            }
            
            const editor = document.createElement('div');
            editor.className = "c-editor text-[18px] leading-[1.8] text-gray-300 outline-none min-h-[1.5em] tracking-tight";
            editor.contentEditable = true;
            editor.innerHTML = window.applySyntaxHighlightEngine(text);
            editor.onblur = function() { 
                window.executeInternalSave(); 
            };
            editor.onpaste = function(e) { window.handleCardPaste(e, editor); };
            
            const footerTools = document.createElement('div');
            footerTools.className = "flex gap-8 pt-8 border-t border-white/5 opacity-30 group-hover:opacity-100 transition-opacity";
            
            const copyBtn = document.createElement('button');
            copyBtn.className = "text-[11px] font-black text-blue-600 hover:text-blue-400 uppercase tracking-widest";
            copyBtn.innerText = "📋 Copy";
            copyBtn.onclick = function() { window.copyCardText(editor.innerText); };
            
            const mergeBtn = document.createElement('button');
            mergeBtn.className = "text-[11px] font-black text-gray-600 hover:text-white uppercase tracking-widest";
            mergeBtn.innerText = "Merge Up";
            mergeBtn.onclick = function() { window.mergeCardUp(card); };
            
            const splitBtn = document.createElement('button');
            splitBtn.className = "text-[11px] font-black text-gray-600 hover:text-white uppercase tracking-widest";
            splitBtn.innerText = "Split";
            splitBtn.onclick = function() { window.splitCardAtCursor(card, editor); };
            
            const killBtn = document.createElement('button');
            killBtn.className = "text-[11px] font-black text-red-900 hover:text-red-600 uppercase tracking-widest ml-auto";
            killBtn.innerText = "Delete";
            killBtn.onclick = function() { window.deleteCardStep(card); };

            footerTools.appendChild(copyBtn);
            footerTools.appendChild(mergeBtn);
            footerTools.appendChild(splitBtn);
            footerTools.appendChild(killBtn);
            
            contentWrap.appendChild(tagStack);
            contentWrap.appendChild(editor);
            contentWrap.appendChild(footerTools);
            
            mainBody.appendChild(imgVault);
            mainBody.appendChild(contentWrap);
            card.appendChild(mainBody);
            
            return card;
        };

        // --- [7] 원고 가공 및 컷 편집 로직 (Sovereign Script Engine) ---
        window.processScriptEngine = function(mode) {
            const input = document.getElementById('mainSourceInput');
            const text = input.value.trim();
            if (!text) {
                alert("원고 내용을 입력해 주세요.");
                return;
            }

            window.executeDeepSnapshot();
            const s = window.getActiveSlot();
            s.original += `\n[${new Date().toLocaleTimeString()}] 추가:\n${text}\n`;
            document.getElementById('originalLogView').value = s.original;

            // 문장 부호 기반 자동 분리
            const sentences = text.split(/(?<=[.!?])\s+/).filter(function(l) { return l.length > 0; });
            const board = document.getElementById('manuscriptPanelContainer');

            for (let i = 0; i < sentences.length; i++) {
                const node = window.createCardNodePhysical(Date.now() + Math.random(), sentences[i], [], []);
                if (mode === 'insert' && window.focusedCardNode) {
                    window.focusedCardNode.after(node);
                } else {
                    board.appendChild(node);
                }
            }

            input.value = "";
            window.executeInternalSave();
            window.recountManuscriptStats();
        };

        window.mergeCardUp = function(card) {
            const prev = card.previousElementSibling;
            if (prev && prev.classList.contains('card-unit')) {
                window.executeDeepSnapshot();
                const targetEditor = prev.querySelector('.c-editor');
                const sourceEditor = card.querySelector('.c-editor');
                
                targetEditor.innerText += " " + sourceEditor.innerText;
                targetEditor.innerHTML = window.applySyntaxHighlightEngine(targetEditor.innerText);
                
                const sourceImgs = card.querySelectorAll('.asset-img-item');
                const targetVault = prev.querySelector('.card-img-vault-area');
                for (let i = 0; i < sourceImgs.length; i++) {
                    targetVault.appendChild(sourceImgs[i]);
                }
                
                card.remove();
                window.executeInternalSave();
                window.recountManuscriptStats();
            }
        };

        window.splitCardAtCursor = function(card, editor) {
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            
            window.executeDeepSnapshot();
            const range = sel.getRangeAt(0);
            const extra = document.createRange();
            extra.setStart(range.endContainer, range.endOffset);
            extra.setEnd(editor, editor.childNodes.length);
            
            const extraText = extra.toString();
            extra.deleteContents();
            editor.innerHTML = window.applySyntaxHighlightEngine(editor.innerText);
            
            const newNode = window.createCardNodePhysical(Date.now(), extraText, [], []);
            card.after(newNode);
            
            window.executeInternalSave();
            window.recountManuscriptStats();
        };

        window.deleteCardStep = function(card) {
            if (confirm("이 컷을 삭제할까요?")) {
                window.executeDeepSnapshot();
                card.remove();
                window.executeInternalSave();
                window.recountManuscriptStats();
            }
        };

        // --- [8] 드래그 앤 드롭 하이 레벨 핸들러 ---
        window.handleGlobalDragStart = function(e) {
            window.dragSourceId = parseFloat(this.dataset.dragId);
            window.dragSourceType = this.dataset.dragType;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        };

        window.handleGlobalDrop = function(e) {
            e.preventDefault();
            this.classList.remove('dragging');
            const targetId = parseFloat(this.dataset.dragId);
            const targetType = this.dataset.dragType;

            if (window.dragSourceType !== targetType || window.dragSourceId === targetId) return;

            window.executeDeepSnapshot();

            if (window.dragSourceType === 'project') {
                const sIdx = window.sovereignDb.projects.findIndex(function(x) { return x.id === window.dragSourceId; });
                const tIdx = window.sovereignDb.projects.findIndex(function(x) { return x.id === targetId; });
                const [moved] = window.sovereignDb.projects.splice(sIdx, 1);
                window.sovereignDb.projects.splice(tIdx, 0, moved);
                for (let i = 0; i < window.sovereignDb.projects.length; i++) { window.sovereignDb.projects[i].order = i; }
                window.renderProjectTabs();
            } else if (window.dragSourceType === 'slot') {
                const activeP = window.getActiveProject();
                const sIdx = activeP.slots.findIndex(function(x) { return x.id === window.dragSourceId; });
                const tIdx = activeP.slots.findIndex(function(x) { return x.id === targetId; });
                const [movedSlot] = activeP.slots.splice(sIdx, 1);
                activeP.slots.splice(tIdx, 0, movedSlot);
                for (let j = 0; j < activeP.slots.length; j++) { activeP.slots[j].order = j; }
                window.renderSlotTabs();
            } else if (window.dragSourceType === 'card') {
                const board = document.getElementById('manuscriptPanelContainer');
                const srcNode = board.querySelector(`[data-drag-id="${window.dragSourceId}"]`);
                const allNodes = Array.from(board.querySelectorAll('.card-unit'));
                const sIdx = allNodes.indexOf(srcNode);
                const tIdx = allNodes.indexOf(this);
                if (sIdx < tIdx) this.after(srcNode);
                else board.insertBefore(srcNode, this);
            }
            
            window.executeInternalSave();
            window.recountManuscriptStats();
        };

        // --- [9] 언두/리두 및 스냅샷 엔진 (The Sovereign Undo) ---
        window.executeDeepSnapshot = function() {
            window.executeCurrentStateCapture();
            window.undoStack.push(JSON.stringify(window.sovereignDb));
            if (window.undoStack.length > 80) window.undoStack.shift();
            window.redoStack = []; 
        };

        window.executeUndoAction = function() {
            if (window.undoStack.length === 0) return;
            window.executeCurrentStateCapture();
            window.redoStack.push(JSON.stringify(window.sovereignDb));
            window.sovereignDb = JSON.parse(window.undoStack.pop());
            window.executeInternalSave();
            window.executeFullUIRenderCycle();
        };

        window.executeRedoAction = function() {
            if (window.redoStack.length === 0) return;
            window.executeCurrentStateCapture();
            window.undoStack.push(JSON.stringify(window.sovereignDb));
            window.sovereignDb = JSON.parse(window.redoStack.pop());
            window.executeInternalSave();
            window.executeFullUIRenderCycle();
        };

        // --- [10] 파일 시스템 및 보조 기능 ---
        window.executeSaveAsFile = async function() {
            window.executeCurrentStateCapture();
            const p = window.getActiveProject();
            const s = window.getActiveSlot();
            const fileName = `[${p.name}] ${s.title || 'Draft'}_${new Date().toLocaleDateString()}.json`;

            if ('showSaveFilePicker' in window) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: fileName,
                        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(JSON.stringify(window.sovereignDb, null, 2));
                    await writable.close();
                    alert("파일이 성공적으로 보관되었습니다.");
                } catch (e) {}
            } else {
                const blob = new Blob([JSON.stringify(window.sovereignDb)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = fileName; a.click();
            }
        };

        window.executeProjectCreation = function() {
            const id = Date.now();
            window.executeCurrentStateCapture();
            window.sovereignDb.projects.push({
                id: id,
                name: "새 작품",
                order: window.sovereignDb.projects.length,
                memos: [],
                slots: [{ id: id + 1, title: '1화', original: '', cards: [], order: 0 }]
            });
            window.sovereignDb.activeProjectId = id;
            window.sovereignDb.activeSlotId = id + 1;
            window.executeInternalSave();
            window.executeFullUIRenderCycle();
        };

        // --- [11] 정적인 이벤트 리스너 바인딩 ---
        window.bindStaticEventListeners = function() {
            document.getElementById('btnCreateProject').onclick = window.executeProjectCreation;
            document.getElementById('btnCreateSlot').onclick = window.executeCreateNewSlot;
            document.getElementById('btnSaveAs').onclick = window.executeSaveAsFile;
            document.getElementById('btnRestore').onclick = window.triggerImportFullBackup;
            document.getElementById('btnUndo').onclick = window.executeUndoAction;
            document.getElementById('btnRedo').onclick = window.executeRedoAction;
            document.getElementById('btnResetBoard').onclick = window.executeBoardClearProcess;
            document.getElementById('btnAppendManuscript').onclick = function() { window.processScriptEngine('append'); };
            document.getElementById('btnInsertManuscript').onclick = function() { window.processScriptEngine('insert'); };
            document.getElementById('btnCopyLog').onclick = function() {
                const log = document.getElementById('originalLogView').value;
                navigator.clipboard.writeText(log); alert("로그 복사됨.");
            };
        };

        // --- [12] 유틸리티 및 인터페이스 미세 조정 ---
        window.recountManuscriptStats = function() {
            const all = document.querySelectorAll('.card-unit');
            for (let i = 0; i < all.length; i++) {
                const b = all[i].querySelector('.c-cut-badge');
                if (b) b.innerText = "Cut " + String(i + 1).padStart(2, '0');
            }
            document.getElementById('displayCutCount').innerText = all.length + " Cuts Secured";
        };

        window.globalFocusCard = function(node) {
            const all = document.querySelectorAll('.card-unit');
            for (let i = 0; i < all.length; i++) { all[i].classList.remove('card-focused'); }
            node.classList.add('card-focused');
            window.focusedCardNode = node;
        };

        window.globalClearFocus = function() {
            const all = document.querySelectorAll('.card-unit');
            for (let i = 0; i < all.length; i++) { all[i].classList.remove('card-focused'); }
            window.focusedCardNode = null;
        };

        window.executeAutoTabResize = function(i) {
            const c = document.createElement("canvas");
            const x = c.getContext("2d");
            x.font = window.getComputedStyle(i).font;
            i.style.width = (x.measureText(i.value).width + 35) + "px";
        };

        window.applySyntaxHighlightEngine = function(t) {
            if (!t) return "";
            return t.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, '<span class="hl-dialog">$&</span>')
                    .replace(/[\(\[][가-힣a-zA-Z\s]+[\)\]]/g, '<span class="hl-sfx">$&</span>');
        };

        window.renderProjectMemos = function() {
            const container = document.getElementById('memoStackContainer');
            container.innerHTML = "";
            const p = window.getActiveProject();
            if (!p || !p.memos) return;
            for (let i = 0; i < p.memos.length; i++) {
                const m = p.memos[i];
                const div = document.createElement('div');
                div.className = "bg-white/5 border border-white/10 rounded-3xl overflow-hidden";
                div.innerHTML = `
                    <div class="flex items-center justify-between p-5 bg-white/5 cursor-pointer" onclick="window.toggleMemo(${i})">
                        <input value="${m.title}" class="bg-transparent border-none outline-none font-black text-[11px] text-blue-500 w-full" oninput="window.saveMemo(${i}, 'title', this.value)" onclick="event.stopPropagation()">
                        <button onclick="event.stopPropagation(); window.deleteMemo(${i})" class="text-red-900 font-black ml-3">×</button>
                    </div>
                    <div class="p-5 ${m.folded ? 'hidden' : ''}">
                        <textarea class="w-full bg-transparent text-[11px] text-gray-500 outline-none h-48 resize-none" oninput="window.saveMemo(${i}, 'content', this.value)">${m.content}</textarea>
                    </div>`;
                container.appendChild(div);
            }
        };

        window.toggleMemo = function(i) { const p = window.getActiveProject(); p.memos[i].folded = !p.memos[i].folded; window.executeInternalSave(); window.renderProjectMemos(); };
        window.saveMemo = function(i, k, v) { const p = window.getActiveProject(); p.memos[i][k] = v; window.executeInternalSave(); };
        window.deleteMemo = function(i) { if(confirm("메모 삭제?")) { window.getActiveProject().memos.splice(i, 1); window.executeInternalSave(); window.renderProjectMemos(); } };
        window.executeAddNewProjectMemo = function() { const p = window.getActiveProject(); if(!p.memos) p.memos = []; p.memos.unshift({title:'새 메모', content:'', folded:false}); window.executeInternalSave(); window.renderProjectMemos(); };

        // 시스템 단축키
        window.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') window.processScriptEngine('append');
            if (e.ctrlKey && e.key === 'z') { e.preventDefault(); window.executeUndoAction(); }
            if (e.ctrlKey && e.key === 'y') { e.preventDefault(); window.executeRedoAction(); }
        });

        // 부팅 시작
        window.bootSovereignSystem();

    </script>
</body>
</html>
